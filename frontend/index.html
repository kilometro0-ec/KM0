    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2362/2362252.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: white; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0; overflow-x: hidden; }
        .border-gradient-shop { border: 1.5px solid transparent; background: linear-gradient(#000, #000) padding-box, linear-gradient(90deg, #0047AB, #FF00FF) border-box; }
        .text-gradient-shop { background: linear-gradient(90deg, #0047AB, #FF00FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bg-gradient-shop { background: linear-gradient(90deg, #0047AB, #FF00FF); }
        .border-motorizado { border: 1.5px solid rgba(236, 19, 19, 0.4); }
        @keyframes logoEntrance { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .animate-logo { animation: logoEntrance 0.8s ease-out forwards; }
        
        /* Botón de instalación forzado */
        #installBtn { display: none; position: fixed; bottom: 20px; background: #0047AB; color: white; padding: 15px 30px; border-radius: 50px; font-weight: bold; z-index: 999; box-shadow: 0 0 20px rgba(0,71,171,0.5); }
    </style>
</head>
<body class="p-6">

    <button id="installBtn">📦 INSTALAR KM0 APP</button>

    <div class="w-full max-w-[360px] flex flex-col items-center">
        <div class="mb-10 animate-logo">
            <img src="assets/images/logo-trans.png" alt="Logo KM0" class="w-64 h-64 object-contain drop-shadow-[0_0_15px_rgba(236,19,19,0.3)]">
        </div>

        <div class="w-full mb-10">
            <button onclick="window.location.href='views/auth/login.html'" class="w-full bg-[#EC1313] text-white py-5 rounded-2xl font-black text-sm tracking-[0.2em] uppercase active:scale-95 transition-all shadow-lg shadow-red-900/40">
                Iniciar Sesión
            </button>
        </div>

        <div class="w-full mb-6">
            <div class="border-gradient-shop p-6 rounded-[2.5rem] flex flex-col items-center text-center space-y-4 shadow-[0_0_20px_rgba(255,0,255,0.1)]">
                <div class="flex items-center justify-center space-x-2">
                    <span class="material-symbols-outlined text-[#0047AB] !text-3xl">storefront</span>
                    <h3 class="text-[11px] font-black uppercase tracking-[0.2em] text-gradient-shop">¿Eres un comercio?</h3>
                </div>
                <button onclick="window.location.href='views/auth/registro-tienda.html'" class="w-full py-4 bg-gradient-shop text-white font-black text-xs tracking-[0.15em] uppercase rounded-xl active:scale-95 transition-all shadow-[0_4px_15px_rgba(255,0,255,0.2)]">
                    Registra tu Tienda aquí
                </button>
            </div>
        </div>

        <div class="w-full mb-10">
            <div class="border-motorizado bg-zinc-900/20 p-6 rounded-[2.5rem] flex flex-col items-center text-center space-y-4">
                <h3 class="text-[11px] font-bold uppercase tracking-widest text-zinc-200">¿Quieres ser parte del equipo?</h3>
                <button onclick="window.location.href='views/auth/registro-motorizado.html'" class="w-full py-4 border border-[#EC1313] text-[#EC1313] font-bold text-[11px] tracking-[0.2em] uppercase rounded-xl hover:bg-[#EC1313]/10 active:scale-95 transition-all">
                    Regístrate como Motorizado
                </button>
            </div>
        </div>

        <div class="text-center opacity-40">
            <p class="text-[9px] font-bold uppercase tracking-[0.1em]">2026 KM0® by CORPORACIÓN 360</p>
        </div>
    </div>

    <script>
      let deferredPrompt;
      const installBtn = document.getElementById('installBtn');

      // Escuchar el evento de instalación
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Mostrar el botón manual
        installBtn.style.display = 'block';
      });

      installBtn.addEventListener('click', (e) => {
        installBtn.style.display = 'none';
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
          if (choiceResult.outcome === 'accepted') {
            console.log('Usuario instaló la App');
          }
          deferredPrompt = null;
        });
      });

      // Registro del Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const swCode = "self.addEventListener('fetch', function(event) {});";
          const blob = new Blob([swCode], {type: 'text/javascript'});
          const url = URL.createObjectURL(blob);
          navigator.serviceWorker.register(url, { scope: '/KM0/' });
        });
      }
    </script>
</body>
</html>
