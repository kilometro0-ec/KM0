<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KM0 - Registro de Tienda</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.materialsoft.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <link rel="stylesheet" href="../../assets/css/roles.css">
</head>

<body class="theme-shop-body">

    <div id="contenedorForm" class="max-w-[480px] mx-auto flex flex-col min-h-screen">
        
        <header class="p-6 flex items-center justify-between">
            <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10 active:scale-90 transition-all">
                <span class="material-symbols-outlined !text-white">arrow_back_ios_new</span>
            </button>
            <div class="text-right">
                <p class="text-[15px] font-black text-[#FF00FF] tracking-widest uppercase italic">KILÓMETRO CERO</p>
                <p class="text-[9px] text-white/30 font-bold uppercase tracking-tighter">Store Registry</p>
            </div>
        </header>

        <main class="flex-1 px-8 pt-4 pb-48">
            <div class="mb-8">
                <h1 class="text-2xl font-extrabold italic tracking-tighter leading-tight uppercase text-white">
                    REGISTRA TU <br/>
                    <span class="shop-text-gradient text-4xl font-black">TIENDA</span>
                </h1>
                <div class="h-1 w-12 shop-btn-fusion mt-3 rounded-full"></div>
            </div>

            <form id="formTienda" autocomplete="off">
                <div class="km0-input-container">
                    <span class="material-symbols-outlined !text-[#0070FF] mr-4">store</span>
                    <input id="nombreTienda" required class="km0-input-field" placeholder="Nombre Comercial" type="text">
                </div>
                
                <div class="km0-input-container">
                    <span class="material-symbols-outlined !text-[#0070FF] mr-4">person</span>
                    <input id="representante" required class="km0-input-field" placeholder="Representante Legal" type="text">
                </div>

                <div class="km0-input-container">
                    <span class="material-symbols-outlined !text-[#0070FF] mr-4">badge</span>
                    <input id="identificacion" minlength="10" maxlength="13" required class="km0-input-field" placeholder="RUC o Cédula" type="text">
                </div>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="km0-input-container !mb-0">
                        <select id="provincia" required class="km0-input-field !text-[15px] appearance-none cursor-pointer">
                            <option value="" disabled selected>Provincia</option>
                            <option value="Pichincha">Pichincha</option>
                            <option value="Guayas">Guayas</option>
                        </select>
                    </div>
                    <div class="km0-input-container !mb-0">
                        <input id="ciudad" required class="km0-input-field" placeholder="Ciudad" type="text">
                    </div>
                </div>

                <div class="km0-input-container">
                    <span class="material-symbols-outlined !text-[#0070FF] mr-4">chat</span>
                    <input id="telefono" required pattern="^\+593[0-9]{9}$" class="km0-input-field" placeholder="WhatsApp (+593...)" type="tel">
                </div>

                <div class="km0-input-container">
                    <span class="material-symbols-outlined !text-[#0070FF] mr-4">mail</span>
                    <input id="correo" required class="km0-input-field" placeholder="Email Corporativo" type="email">
                </div>
            </form>
        </main>

        <div class="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-[#020D1F] via-[#020D1F]/90 to-transparent">
            <div class="max-w-[480px] mx-auto">
                <button type="submit" form="formTienda" id="btnEnviar" disabled 
                        class="shop-btn-fusion w-full h-16 text-white font-black tracking-widest uppercase flex items-center justify-center gap-4">
                    <span>FINALIZAR REGISTRO</span>
                    <span class="material-symbols-outlined !text-white">rocket_launch</span>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
