<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KM0 - Registro de Tienda</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <link rel="stylesheet" href="../../assets/css/roles.css">
</head>

<body class="p-6 overflow-x-hidden">
    <div class="fixed top-0 left-0 w-full h-[500px] shop-glow -z-10"></div>

    <div class="max-w-[420px] mx-auto flex flex-col min-h-screen">
        
        <header class="flex items-center justify-between mb-10 mt-2">
            <button onclick="window.history.back()" class="w-11 h-11 rounded-2xl bg-zinc-900 border border-zinc-800 flex items-center justify-center text-white hover:bg-zinc-800 transition-all">
                <span class="material-symbols-outlined !mr-0">arrow_back_ios_new</span>
            </button>
            <div class="text-right">
                <p class="text-[12px] font-black text-[#FF00FF] tracking-widest uppercase italic">KM0</p>
                <p class="text-[8px] text-zinc-500 font-bold uppercase tracking-widest">Tiendas Aliadas</p>
            </div>
        </header>

        <main class="flex-1">
            <div class="mb-8">
                <h1 class="text-3xl font-black italic tracking-tighter uppercase leading-none text-white">
                    REGISTRA TU <br/>
                    <span class="shop-text-gradient text-5xl">TIENDA</span>
                </h1>
                <div class="h-1.5 w-16 shop-bg-gradient mt-4 rounded-full shadow-[0_0_15px_rgba(0,112,255,0.4)]"></div>
            </div>

            <form id="formTienda" autocomplete="off" class="space-y-4">
                <div class="space-y-3">
                    <div class="km0-input-group">
                        <span class="material-symbols-outlined text-[#0070FF] mr-3">store</span>
                        <input id="nombreTienda" required class="km0-input-field" placeholder="Nombre Comercial">
                    </div>
                    <div class="km0-input-group">
                        <span class="material-symbols-outlined text-[#0070FF] mr-3">person</span>
                        <input id="representante" required class="km0-input-field" placeholder="Representante Legal">
                    </div>
                    <div class="km0-input-group">
                        <span class="material-symbols-outlined text-[#0070FF] mr-3">badge</span>
                        <input id="identificacion" required class="km0-input-field" placeholder="RUC o Cédula (10-13 dígitos)">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="km0-input-group">
                        <select id="provincia" required class="km0-input-field !text-[13px] cursor-pointer">
                            <option value="" disabled selected>Provincia</option>
                            <option value="Azuay">Azuay</option><option value="Bolívar">Bolívar</option>
                            <option value="Cañar">Cañar</option><option value="Carchi">Carchi</option>
                            <option value="Chimborazo">Chimborazo</option><option value="Cotopaxi">Cotopaxi</option>
                            <option value="El Oro">El Oro</option><option value="Esmeraldas">Esmeraldas</option>
                            <option value="Galápagos">Galápagos</option><option value="Guayas">Guayas</option>
                            <option value="Imbabura">Imbabura</option><option value="Loja">Loja</option>
                            <option value="Los Ríos">Los Ríos</option><option value="Manabí">Manabí</option>
                            <option value="Morona Santiago">Morona Santiago</option><option value="Napo">Napo</option>
                            <option value="Orellana">Orellana</option><option value="Pastaza">Pastaza</option>
                            <option value="Pichincha">Pichincha</option><option value="Santa Elena">Santa Elena</option>
                            <option value="Santo Domingo">Santo Domingo</option><option value="Sucumbíos">Sucumbíos</option>
                            <option value="Tungurahua">Tungurahua</option><option value="Zamora Chinchipe">Zamora Chinchipe</option>
                        </select>
                    </div>
                    <div class="km0-input-group">
                        <input id="ciudad" required class="km0-input-field" placeholder="Ciudad">
                    </div>
                </div>

                <div class="space-y-3">
                    <div class="km0-input-group">
                        <span class="material-symbols-outlined text-[#0070FF] mr-3">chat</span>
                        <input id="telefono" required pattern="^\+593[0-9]{9}$" class="km0-input-field" placeholder="WhatsApp (+593...)">
                    </div>
                    <div class="km0-input-group">
                        <span class="material-symbols-outlined text-[#0070FF] mr-3">mail</span>
                        <input id="correo" required type="email" class="km0-input-field" placeholder="Email Corporativo">
                    </div>
                </div>
            </form>
        </main>

        <footer class="mt-10 pb-12">
            <button type="submit" form="formTienda" id="btnEnviar" disabled 
                    class="shop-bg-gradient w-full h-16 rounded-[24px] text-white font-extrabold tracking-widest uppercase flex items-center justify-center gap-4 transition-all opacity-30 cursor-not-allowed active:scale-95 shadow-lg">
                <span>Finalizar Registro</span>
                <span class="material-symbols-outlined !mr-0">rocket_launch</span>
            </button>
            <p class="text-center text-[10px] text-zinc-600 mt-8 font-bold tracking-[0.2em]">
                2026 KM0® | CORPORACIÓN 360
            </p>
        </footer>
    </div>

    <script>
        const form = document.getElementById('formTienda');
        const btn = document.getElementById('btnEnviar');

        form.addEventListener('input', () => {
            if (form.checkValidity()) {
                btn.disabled = false;
                btn.classList.remove('opacity-30', 'cursor-not-allowed');
            } else {
                btn.disabled = true;
                btn.classList.add('opacity-30', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
