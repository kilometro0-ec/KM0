<!DOCTYPE html>
<html class="dark" lang="es" style="background-color: #020D1F;">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>KM0 - Registro de Tienda v12.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <script src="../../assets/js/config.js"></script>

    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-[#020D1F] text-white overflow-x-hidden font-['Plus_Jakarta_Sans']; min-height: 100dvh; }
        }

        /* Animación KM0 Logo */
        @keyframes flyIn {
            0% { opacity: 0; transform: translateX(-80px) translateY(15px) rotate(-5deg); }
            100% { opacity: 1; transform: translateX(0) translateY(0) rotate(0deg); }
        }
        .km0-logo-anim { animation: flyIn 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }

        .input-group {
            @apply flex items-center bg-[#0A192F] border border-white/10 rounded-2xl px-4 h-16 mb-4 focus-within:border-[#0070FF] transition-all;
        }

        .input-field { @apply bg-transparent border-none outline-none w-full text-white placeholder:text-white/20 focus:ring-0 text-base p-0; }
        
        .btn-fusion {
            background: linear-gradient(90deg, #0070FF 0%, #FF00FF 100%);
            @apply shadow-lg active:scale-95 disabled:opacity-30 transition-all font-black tracking-widest text-white;
        }

        .material-symbols-outlined { @apply text-[#0070FF] text-2xl mr-4 opacity-80; }
        
        select.input-field option { background: #0A192F; color: white; }
    </style>
</head>

<body>
    <div id="contenedorForm" class="max-w-[480px] mx-auto flex flex-col min-h-screen">
        
        <header class="p-6 flex items-center justify-between">
            <button onclick="window.history.back()" class="size-11 rounded-2xl bg-white/5 flex items-center justify-center border border-white/10">
                <span class="material-symbols-outlined !text-white !mr-0 !text-xl">arrow_back_ios_new</span>
            </button>
            <div class="text-right km0-logo-anim">
                <p class="text-[18px] font-extrabold text-[#FF00FF] tracking-[0.3em] uppercase italic leading-none">KM0</p>
                <p class="text-[8px] text-white/30 font-bold uppercase tracking-tighter mt-1">Air Logistics</p>
            </div>
        </header>

        <main class="flex-1 px-8 pt-4 pb-44">
            <div class="mb-10">
                <h1 class="text-2xl font-extrabold italic tracking-tighter uppercase text-white">
                    REGISTRA TU <br/>
                    <span style="background: linear-gradient(90deg, #0070FF, #FF00FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent;" class="text-4xl font-black">TIENDA</span>
                </h1>
                <div class="h-1 w-12 bg-gradient-to-r from-[#0070FF] to-[#FF00FF] mt-3 rounded-full"></div>
            </div>

            <form id="formTienda" autocomplete="off">
                <div class="input-group">
                    <span class="material-symbols-outlined">store</span>
                    <input id="nombre" required class="input-field" placeholder="Nombre Comercial de la Tienda">
                </div>

                <div class="input-group">
                    <span class="material-symbols-outlined">person</span>
                    <input id="representante" required class="input-field" placeholder="Nombre del Propietario">
                </div>

                <div class="input-group">
                    <span class="material-symbols-outlined">badge</span>
                    <input id="ruc" minlength="10" maxlength="13" required class="input-field" placeholder="RUC o Cédula">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="input-group">
                        <select id="provincia" required class="input-field !text-[12px] cursor-pointer">
                            <option value="" disabled selected>Provincia</option>
                            <option value="Azuay">Azuay</option><option value="Bolívar">Bolívar</option><option value="Cañar">Cañar</option><option value="Carchi">Carchi</option><option value="Chimborazo">Chimborazo</option><option value="Cotopaxi">Cotopaxi</option><option value="El Oro">El Oro</option><option value="Esmeraldas">Esmeraldas</option><option value="Galápagos">Galápagos</option><option value="Guayas">Guayas</option><option value="Imbabura">Imbabura</option><option value="Loja">Loja</option><option value="Los Ríos">Los Ríos</option><option value="Manabí">Manabí</option><option value="Morona Santiago">Morona Santiago</option><option value="Napo">Napo</option><option value="Orellana">Orellana</option><option value="Pastaza">Pastaza</option><option value="Pichincha">Pichincha</option><option value="Santa Elena">Santa Elena</option><option value="Santo Domingo">Santo Domingo</option><option value="Sucumbíos">Sucumbíos</option><option value="Tungurahua">Tungurahua</option><option value="Zamora Chinchipe">Zamora Chinchipe</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <input id="ciudad" required class="input-field" placeholder="Ciudad">
                    </div>
                </div>

                <div class="input-group">
                    <span class="material-symbols-outlined">chat</span>
                    <span class="text-[#0070FF] font-bold mr-2 text-sm">+593</span>
                    <input id="telefono" required pattern="[0-9]{9}" maxlength="9" class="input-field" placeholder="98401XXXX">
                </div>

                <div class="input-group">
                    <span class="material-symbols-outlined">mail</span>
                    <input id="correo" required class="input-field" placeholder="Correo Electrónico" type="email">
                </div>
            </form>
        </main>

        <div class="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-[#020D1F] to-transparent">
            <button type="submit" form="formTienda" id="btnEnviar" disabled 
                    class="btn-fusion w-full h-16 rounded-[24px] flex items-center justify-center gap-4 transition-all">
                <span id="btnText">FINALIZAR REGISTRO</span>
                <span id="btnIcon" class="material-symbols-outlined !mr-0 !text-white">rocket_launch</span>
            </button>
        </div>
    </div>

    <div id="successScreen" class="fixed inset-0 bg-[#020D1F] z-[100] hidden flex-col items-center justify-center p-10 text-center">
        <span class="material-symbols-outlined !text-green-500 !text-7xl mb-6">verified</span>
        <h2 class="text-3xl font-black italic mb-2">¡SOLICITUD ENVIADA!</h2>
        <p class="text-white/60 mb-8">Tu tienda está en proceso de verificación. Recibirás tu clave por correo.</p>
        <button onclick="location.href='../../index.html'" class="px-10 h-14 bg-white/5 border border-white/10 rounded-2xl font-bold uppercase tracking-widest text-xs">Volver al Inicio</button>
    </div>

    <script>
    const form = document.getElementById('formTienda');
    const btn = document.getElementById('btnEnviar');
    const btnText = document.getElementById('btnText');

    // Validación visual
    form.addEventListener('input', () => {
        btn.disabled = !form.checkValidity();
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        btn.disabled = true;
        btnText.innerText = 'CONECTANDO...';

        const payload = {
            accion: 'registro_tienda',
            token: typeof API_KEY_SECRET !== 'undefined' ? API_KEY_SECRET : "KM0_SECURE_TOKEN_2026_XYZ",
            nombre: document.getElementById('nombre').value,
            representante: document.getElementById('representante').value,
            ruc: document.getElementById('ruc').value,
            provincia: document.getElementById('provincia').value,
            ciudad: document.getElementById('ciudad').value,
            telefono: "+593" + document.getElementById('telefono').value,
            correo: document.getElementById('correo').value
        };

        try {
            // Nota: Usamos la API_URL definida en assets/js/config.js
            const response = await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors', // Necesario para Google Apps Script
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            // Mostramos éxito (no-cors no permite leer respuesta, pero el envío se procesa)
            document.getElementById('contenedorForm').classList.add('hidden');
            document.getElementById('successScreen').classList.remove('hidden');
            document.getElementById('successScreen').classList.add('flex');

        } catch (err) {
            console.error(err);
            alert("Error de conexión. Revisa tu internet.");
            btn.disabled = false;
            btnText.innerText = 'REINTENTAR REGISTRO';
        }
    });
    </script>
</body>
</html>
