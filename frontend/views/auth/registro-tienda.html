<!DOCTYPE html>
<html class="dark" lang="es" style="background-color: #020D1F;">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>KM0 - Registro de Tienda</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-[#020D1F] text-white overflow-x-hidden;
                font-family: 'Plus Jakarta Sans', sans-serif;
                min-height: 100dvh;
            }
        }

        /* Bloqueo de cuadros blancos en Inputs y Autocompletado */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus {
            -webkit-text-fill-color: white !important;
            -webkit-box-shadow: 0 0 0px 1000px #0A192F inset !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .input-group {
            @apply flex items-center bg-[#0A192F] border border-white/10 rounded-2xl px-4 h-16 mb-4 transition-all duration-300 focus-within:border-[#0070FF] focus-within:shadow-[0_0_15px_rgba(0,112,255,0.2)];
        }

        .input-field {
            @apply bg-transparent border-none outline-none w-full text-white placeholder:text-white/20 focus:ring-0 text-base;
        }

        .shop-gradient-text {
            background: linear-gradient(90deg, #0070FF, #FF00FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-fusion {
            background: linear-gradient(90deg, #0070FF 0%, #FF00FF 100%);
            @apply shadow-lg active:scale-95 disabled:opacity-40 disabled:grayscale transition-all duration-300;
        }

        .material-symbols-outlined {
            @apply text-[#0070FF] text-2xl mr-4 opacity-80 select-none;
        }

        /* Spinner para carga */
        .spinner {
            @apply w-5 h-5 border-2 border-white/20 border-t-white rounded-full animate-spin;
        }
    </style>
</head>

<body>
    <div id="app-container" class="max-w-[480px] mx-auto flex flex-col min-h-screen relative">
        
        <header class="p-6 flex items-center justify-between">
            <button onclick="window.history.back()" class="size-11 rounded-2xl bg-white/5 flex items-center justify-center border border-white/10 active:scale-90 transition-all">
                <span class="material-symbols-outlined !text-white !mr-0 !text-xl">arrow_back_ios_new</span>
            </button>
            <div class="text-right">
                <p class="text-[15px] font-black text-[#FF00FF] tracking-widest uppercase italic leading-none">KM0</p>
                <p class="text-[8px] text-white/30 font-bold uppercase tracking-tighter mt-1">Store Network</p>
            </div>
        </header>

        <main class="flex-1 px-8 pt-4 pb-40">
            <div class="mb-10 animate-fade-in">
                <h1 class="text-2xl font-extrabold italic tracking-tighter leading-tight uppercase text-white">
                    REGISTRA TU <br/>
                    <span class="shop-gradient-text text-4xl font-black">TIENDA</span>
                </h1>
                <div class="h-1 w-12 bg-gradient-to-r from-[#0070FF] to-[#FF00FF] mt-3 rounded-full shadow-[0_0_10px_rgba(0,112,255,0.5)]"></div>
            </div>

            <form id="formTienda" autocomplete="off">
                <div class="input-group">
                    <span class="material-symbols-outlined">store</span>
                    <input id="nombreTienda" required class="input-field" placeholder="Nombre Comercial" type="text">
                </div>

                <div class="input-group">
                    <span class="material-symbols-outlined">person</span>
                    <input id="representante" required class="input-field" placeholder="Representante Legal" type="text">
                </div>

                <div class="input-group">
                    <span class="material-symbols-outlined">badge</span>
                    <input id="identificacion" minlength="10" maxlength="13" required class="input-field" placeholder="RUC o Cédula" type="text">
                </div>

                <div class="grid grid-cols-2 gap-3 mb-0">
                    <div class="input-group">
                        <span class="material-symbols-outlined !mr-2 !text-xl">map</span>
                        <select id="provincia" required class="input-field !text-[13px] appearance-none cursor-pointer">
                            <option value="" disabled selected>Provincia</option>
                            <option value="Azuay">Azuay</option><option value="Bolívar">Bolívar</option><option value="Cañar">Cañar</option><option value="Carchi">Carchi</option><option value="Chimborazo">Chimborazo</option><option value="Cotopaxi">Cotopaxi</option><option value="El Oro">El Oro</option><option value="Esmeraldas">Esmeraldas</option><option value="Galápagos">Galápagos</option><option value="Guayas">Guayas</option><option value="Imbabura">Imbabura</option><option value="Loja">Loja</option><option value="Los Ríos">Los Ríos</option><option value="Manabí">Manabí</option><option value="Morona Santiago">Morona Santiago</option><option value="Napo">Napo</option><option value="Orellana">Orellana</option><option value="Pastaza">Pastaza</option><option value="Pichincha">Pichincha</option><option value="Santa Elena">Santa Elena</option><option value="Santo Domingo">Santo Domingo</option><option value="Sucumbíos">Sucumbíos</option><option value="Tungurahua">Tungurahua</option><option value="Zamora Chinchipe">Zamora Chinchipe</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <input id="ciudad" required class="input-field" placeholder="Ciudad" type="text">
                    </div>
                </div>

                <div class="input-group">
                    <span class="material-symbols-outlined">chat</span>
                    <input id="telefono" required pattern="^\+593[0-9]{9}$" class="input-field" placeholder="WhatsApp (+593...)" type="tel">
                </div>

                <div class="input-group">
                    <span class="material-symbols-outlined">mail</span>
                    <input id="correo" required class="input-field" placeholder="Email Corporativo" type="email">
                </div>
            </form>
        </main>

        <div class="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-[#020D1F] via-[#020D1F]/90 to-transparent">
            <div class="max-w-[480px] mx-auto">
                <button type="submit" form="formTienda" id="btnEnviar" disabled 
                        class="btn-fusion w-full h-16 rounded-[24px] text-white font-black tracking-widest uppercase flex items-center justify-center gap-4 group">
                    <div id="loading" class="hidden"><div class="spinner"></div></div>
                    <span id="btnText">FINALIZAR REGISTRO</span>
                    <span id="btnIcon" class="material-symbols-outlined !mr-0 !text-white group-hover:translate-x-1 transition-transform">rocket_launch</span>
                </button>
                
                <p class="text-[10px] text-center text-white/20 mt-6 uppercase tracking-[0.4em] font-bold">
                    KM0 BY <span class="text-[#0070FF]">CORPORACIÓN</span> <span class="text-[#FF00FF]">360</span>
                </p>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('formTienda');
        const btn = document.getElementById('btnEnviar');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loading');
        const icon = document.getElementById('btnIcon');

        // Habilitar botón solo si el formulario es válido
        form.addEventListener('input', () => {
            btn.disabled = !form.checkValidity();
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Estado de carga
            btn.disabled = true;
            btnText.innerText = 'PROCESANDO...';
            loader.classList.remove('hidden');
            icon.classList.add('hidden');

            // Aquí iría tu integración con Google Sheets
            // Por ahora simulamos éxito
            setTimeout(() => {
                alert('¡Registro enviado con éxito! KM0 se contactará pronto.');
                window.location.href = '../../index.html';
            }, 2000);
        });
    </script>
</body>
</html>
