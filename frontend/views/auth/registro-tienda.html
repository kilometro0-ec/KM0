<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KM0 - Registro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <link rel="stylesheet" href="../../assets/css/roles.css">
</head>

<body class="p-6 bg-black">
    <div class="fixed top-0 left-1/2 -translate-x-1/2 w-full h-[400px] shop-glow -z-10"></div>

    <div class="relative z-10 w-full max-w-[400px] mx-auto min-h-screen flex flex-col">
        
        <header class="flex items-center justify-between mb-12 mt-4">
            <button onclick="window.history.back()" class="w-12 h-12 rounded-2xl bg-zinc-900/50 border border-zinc-800 flex items-center justify-center text-white">
                <span class="material-symbols-outlined">arrow_back_ios_new</span>
            </button>
            <div class="text-right">
                <p class="text-[14px] font-black shop-gradient-text tracking-widest italic">KM0</p>
            </div>
        </header>

        <main class="flex-1">
            <h1 class="text-3xl font-black italic uppercase text-white">
                REGISTRA TU <br/>
                <span class="shop-gradient-text text-5xl">TIENDA</span>
            </h1>
            <div class="h-1.5 w-16 shop-gradient-bg mt-4 rounded-full"></div>
    
            <form id="formTienda" class="mt-10 space-y-4">
                <div class="km0-input-group">
                    <span class="material-symbols-outlined text-blue-500 mr-4">store</span>
                    <input id="nombreTienda" required class="km0-input-field" placeholder="Nombre Comercial" type="text">
                </div>

                <div class="km0-input-group">
                    <span class="material-symbols-outlined text-blue-500 mr-4">mail</span>
                    <input id="correo" required class="km0-input-field" placeholder="Email" type="email">
                </div>
            </form>
        </main>

        <footer class="mt-12 pb-10">
            <button type="submit" form="formTienda" class="shop-gradient-bg w-full h-16 rounded-[24px] text-white font-black uppercase tracking-widest">
                Finalizar Registro
            </button>
        </footer>
    </div>
</body>
</html>
