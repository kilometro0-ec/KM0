<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KM0 - Registro de Tienda</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <link rel="stylesheet" href="../../assets/css/roles.css">
</head>

<body class="p-6 overflow-x-hidden">
    <div class="fixed top-0 left-1/2 -translate-x-1/2 w-[500px] h-[500px] glow-blue-fuchsia -z-10"></div>

    <div id="contenedorForm" class="w-full max-w-[400px] mx-auto flex flex-col min-h-screen">
        
        <header class="flex items-center justify-between mb-10 mt-4">
            <button onclick="window.history.back()" class="w-11 h-11 rounded-2xl bg-zinc-900 border border-zinc-800 flex items-center justify-center active:scale-90 transition-all text-white">
                <span class="material-symbols-outlined !mr-0">arrow_back_ios_new</span>
            </button>
            <div class="text-right">
                <p class="text-[12px] font-black text-[#FF00FF] tracking-[0.2em] uppercase italic">KM0</p>
                <p class="text-[8px] text-zinc-500 font-bold uppercase tracking-widest">Store Registry</p>
            </div>
        </header>

        <main class="flex-1">
            <div class="mb-8">
                <h1 class="text-2xl font-black italic tracking-tighter uppercase leading-none text-white">
                    REGISTRA TU <br/>
                    <span class="theme-shop-text text-4xl font-black">TIENDA</span>
                </h1>
                <div class="h-1 w-14 theme-shop-btn mt-3 rounded-full"></div>
            </div>
    
            <form id="formTienda" class="space-y-1" autocomplete="off">
                <div class="input-container">
                    <span class="material-symbols-outlined !text-[#0070FF] !mr-3">store</span>
                    <input id="nombreTienda" required class="input-field" placeholder="Nombre Comercial" type="text">
                </div>
                
                <div class="input-container">
                    <span class="material-symbols-outlined !text-[#0070FF] !mr-3">person</span>
                    <input id="representante" required class="input-field" placeholder="Representante Legal" type="text">
                </div>

                <div class="input-container">
                    <span class="material-symbols-outlined !text-[#0070FF] !mr-3">badge</span>
                    <input id="identificacion" minlength="10" maxlength="13" required class="input-field" placeholder="Cédula o RUC" type="text">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="input-container">
                        <select id="provincia" required class="input-field !text-[13px] appearance-none">
                            <option value="" disabled selected>Provincia</option>
                            <option value="Azuay">Azuay</option>
                            <option value="Guayas">Guayas</option>
                            <option value="Pichincha">Pichincha</option>
                        </select>
                    </div>
                    <div class="input-container">
                        <input id="ciudad" required class="input-field" placeholder="Ciudad" type="text">
                    </div>
                </div>

                <div class="input-container">
                    <span class="material-symbols-outlined !text-[#0070FF] !mr-3">chat</span>
                    <input id="telefono" required pattern="^\+593[0-9]{9}$" class="input-field" placeholder="WhatsApp (+593...)" type="tel">
                </div>

                <div class="input-container">
                    <span class="material-symbols-outlined !text-[#0070FF] !mr-3">mail</span>
                    <input id="correo" required class="input-field" placeholder="Email Corporativo" type="email">
                </div>
            </form>
        </main>

        <footer class="mt-10 pb-10">
            <button type="submit" form="formTienda" id="btnEnviar" disabled 
                    class="theme-shop-btn w-full h-16 rounded-[2rem] text-white font-black tracking-[0.2em] uppercase flex items-center justify-center gap-4 transition-all active:scale-95">
                <span id="btnText">Finalizar Registro</span>
                <span id="btnIcon" class="material-symbols-outlined !mr-0 !text-white">rocket_launch</span>
            </button>
        </footer>
    </div>

    <script>
        const form = document.getElementById('formTienda');
        const btn = document.getElementById('btnEnviar');
        form.addEventListener('input', () => {
            btn.disabled = !form.checkValidity();
        });
    </script>
</body>
</html>
