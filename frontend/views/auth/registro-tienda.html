<!DOCTYPE html>
<html lang="es" style="background-color: #000000;">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>KM0 - Registro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <link rel="stylesheet" href="../../assets/css/roles.css">

    <style>
        /* Ajuste extra para asegurar visibilidad de iconos */
        .material-symbols-outlined { color: #0070FF; font-size: 22px; margin-right: 12px; }
        ::placeholder { color: #52525b !important; opacity: 1; }
    </style>
</head>

<body style="background-color: #000000; padding: 20px;">

    <div style="max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; min-height: 90vh;">
        
        <header style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px; margin-bottom: 40px;">
            <button onclick="window.history.back()" style="background: #18181b; border: 1px solid #27272a; border-radius: 14px; width: 48px; height: 48px; color: white; display: flex; align-items: center; justify-content: center;">
                <span class="material-symbols-outlined" style="color: white; margin-right: 0;">arrow_back_ios_new</span>
            </button>
            <div style="text-align: right;">
                <span style="color: #FF00FF; font-weight: 900; font-style: italic;">KM0</span><br>
                <span style="color: #52525b; font-size: 9px; font-weight: 800; letter-spacing: 1px;">ESTABLECIMIENTOS</span>
            </div>
        </header>

        <section style="margin-bottom: 35px;">
            <h1 style="margin: 0; color: white; font-size: 26px; font-weight: 900; font-style: italic; line-height: 1;">REGISTRA TU</h1>
            <h2 class="shop-text-gradient" style="margin: 0; font-size: 48px; line-height: 1;">TIENDA</h2>
            <div style="height: 4px; width: 50px; background: #0070FF; margin-top: 15px; border-radius: 10px;"></div>
        </section>

        <form id="formTienda">
            <div class="km0-input-group">
                <span class="material-symbols-outlined">store</span>
                <input type="text" placeholder="Nombre de la Tienda" required style="width: 100%;">
            </div>

            <div class="km0-input-group">
                <span class="material-symbols-outlined">person</span>
                <input type="text" placeholder="Dueño o Representante" required style="width: 100%;">
            </div>

            <div class="km0-input-group">
                <span class="material-symbols-outlined">badge</span>
                <input type="text" placeholder="RUC / Cédula" required style="width: 100%;">
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="km0-input-group" style="flex: 1;">
                    <select required style="width: 100%; cursor: pointer;">
                        <option value="" disabled selected>Provincia</option>
                        <option value="Azuay">Azuay</option>
                        <option value="Guayas">Guayas</option>
                        <option value="Pichincha">Pichincha</option>
                        <option value="Manabí">Manabí</option>
                        </select>
                </div>
                <div class="km0-input-group" style="flex: 1;">
                    <input type="text" placeholder="Ciudad" required style="width: 100%;">
                </div>
            </div>

            <div class="km0-input-group">
                <span class="material-symbols-outlined">chat</span>
                <input type="tel" placeholder="WhatsApp (+593...)" required style="width: 100%;">
            </div>

            <div class="km0-input-group">
                <span class="material-symbols-outlined">mail</span>
                <input type="email" placeholder="Correo Electrónico" required style="width: 100%;">
            </div>
        </form>

        <div style="margin-top: 30px; padding-bottom: 50px;">
            <button type="submit" form="formTienda" class="shop-btn-gradient" style="width: 100%; height: 65px; border: none; font-size: 16px; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 12px;">
                CREAR CUENTA <span class="material-symbols-outlined" style="color: white; margin: 0;">rocket_launch</span>
            </button>
            <p style="text-align: center; color: #18181b; font-size: 10px; margin-top: 25px; font-weight: 800;">KM0 BY CORPORACIÓN 360</p>
        </div>
    </div>

</body>
</html>
