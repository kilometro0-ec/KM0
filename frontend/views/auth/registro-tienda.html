<!DOCTYPE html>
<html lang="es" style="background: #000;">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>KM0 - Registro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="../../assets/css/roles.css">
</head>

<body style="padding: 24px; max-width: 400px; margin: auto;">

    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
        <button onclick="window.history.back()" style="background: #18181b; border: 1px solid #27272a; color: white; border-radius: 12px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;">
            <span class="material-symbols-outlined">arrow_back_ios_new</span>
        </button>
        <div style="text-align: right;">
            <span style="color: #FF00FF; font-weight: 900; font-style: italic; font-size: 14px;">KM0</span><br>
            <span style="color: #52525b; font-size: 8px; font-weight: bold; letter-spacing: 1px;">TIENDAS ALIADAS</span>
        </div>
    </header>

    <main>
        <h1 style="color: white; font-size: 24px; font-weight: 900; font-style: italic; margin: 0; line-height: 1;">REGISTRA TU</h1>
        <h2 class="shop-text-gradient" style="font-size: 42px; margin: 0; line-height: 1.1;">TIENDA</h2>
        <div style="height: 5px; width: 60px; background: linear-gradient(90deg, #0070FF, #FF00FF); margin-top: 15px; border-radius: 10px;"></div>

        <form id="formTienda" style="margin-top: 35px;">
            <div class="km0-input-group">
                <span class="material-symbols-outlined" style="color: #0070FF;">store</span>
                <input class="km0-input-field" placeholder="Nombre Comercial" required>
            </div>
            
            <div class="km0-input-group">
                <span class="material-symbols-outlined" style="color: #0070FF;">person</span>
                <input class="km0-input-field" placeholder="Representante Legal" required>
            </div>

            <div class="km0-input-group">
                <span class="material-symbols-outlined" style="color: #0070FF;">badge</span>
                <input class="km0-input-field" placeholder="Cédula o RUC" required>
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="km0-input-group" style="flex: 1;">
                    <select class="km0-input-field" required style="color: #52525b;">
                        <option value="" disabled selected>Provincia</option>
                        <option value="Pichincha">Pichincha</option>
                        <option value="Guayas">Guayas</option>
                    </select>
                </div>
                <div class="km0-input-group" style="flex: 1;">
                    <input class="km0-input-field" placeholder="Ciudad" required>
                </div>
            </div>

            <div class="km0-input-group">
                <span class="material-symbols-outlined" style="color: #0070FF;">chat</span>
                <input class="km0-input-field" placeholder="WhatsApp (+593...)" type="tel" required>
            </div>

            <div class="km0-input-group">
                <span class="material-symbols-outlined" style="color: #0070FF;">mail</span>
                <input class="km0-input-field" placeholder="Email Corporativo" type="email" required>
            </div>
        </form>
    </main>

    <footer style="margin-top: 40px; padding-bottom: 40px;">
        <button type="submit" form="formTienda" class="shop-btn-gradient" style="width: 100%; height: 60px; font-size: 16px; letter-spacing: 2px; display: flex; align-items: center; justify-content: center; gap: 10px;">
            FINALIZAR REGISTRO <span class="material-symbols-outlined">rocket_launch</span>
        </button>
        <p style="text-align: center; color: #27272a; font-size: 9px; margin-top: 20px; font-weight: bold; letter-spacing: 2px;">KM0 BY CORPORACIÓN 360</p>
    </footer>

</body>
</html>
