<main class="flex-1">
    <div class="mb-8">
        <h1 class="text-3xl font-black italic tracking-tighter uppercase leading-none text-white">
            REGISTRA TU <br/>
            <span class="shop-gradient-text text-5xl">TIENDA</span>
        </h1>
        <div class="h-1.5 w-16 shop-gradient-bg mt-4 rounded-full"></div>
    </div>

    <form id="formTienda" autocomplete="off" class="space-y-1">
        
        <p class="text-[10px] font-black text-zinc-600 uppercase tracking-widest mb-2 ml-1">Datos Legales</p>
        
        <div class="km0-input-group">
            <span class="material-symbols-outlined text-blue-500 mr-4">store</span>
            <input id="nombreTienda" required class="km0-input-field" placeholder="Nombre Comercial" type="text">
        </div>
        
        <div class="km0-input-group">
            <span class="material-symbols-outlined text-blue-500 mr-4">person</span>
            <input id="representante" required class="km0-input-field" placeholder="Representante Legal" type="text">
        </div>

        <div class="km0-input-group">
            <span class="material-symbols-outlined text-blue-500 mr-4">badge</span>
            <input id="identificacion" minlength="10" maxlength="13" required class="km0-input-field" placeholder="RUC o Cédula" type="text">
        </div>

        <p class="text-[10px] font-black text-zinc-600 uppercase tracking-widest mb-2 mt-4 ml-1">Ubicación</p>

        <div class="grid grid-cols-2 gap-3">
            <div class="km0-input-group">
                <select id="provincia" required class="km0-input-field !text-[13px] appearance-none cursor-pointer">
                    <option value="" disabled selected>Provincia</option>
                    <option value="Azuay">Azuay</option>
                    <option value="Bolívar">Bolívar</option>
                    <option value="Cañar">Cañar</option>
                    <option value="Carchi">Carchi</option>
                    <option value="Chimborazo">Chimborazo</option>
                    <option value="Cotopaxi">Cotopaxi</option>
                    <option value="El Oro">El Oro</option>
                    <option value="Esmeraldas">Esmeraldas</option>
                    <option value="Galápagos">Galápagos</option>
                    <option value="Guayas">Guayas</option>
                    <option value="Imbabura">Imbabura</option>
                    <option value="Loja">Loja</option>
                    <option value="Los Ríos">Los Ríos</option>
                    <option value="Manabí">Manabí</option>
                    <option value="Morona Santiago">Morona Santiago</option>
                    <option value="Napo">Napo</option>
                    <option value="Orellana">Orellana</option>
                    <option value="Pastaza">Pastaza</option>
                    <option value="Pichincha">Pichincha</option>
                    <option value="Santa Elena">Santa Elena</option>
                    <option value="Santo Domingo">Santo Domingo</option>
                    <option value="Sucumbíos">Sucumbíos</option>
                    <option value="Tungurahua">Tungurahua</option>
                    <option value="Zamora Chinchipe">Zamora Chinchipe</option>
                </select>
            </div>
            <div class="km0-input-group">
                <input id="ciudad" required class="km0-input-field" placeholder="Ciudad" type="text">
            </div>
        </div>

        <p class="text-[10px] font-black text-zinc-600 uppercase tracking-widest mb-2 mt-4 ml-1">Contacto Directo</p>

        <div class="km0-input-group">
            <span class="material-symbols-outlined text-blue-500 mr-4">chat</span>
            <input id="telefono" required pattern="^\+593[0-9]{9}$" class="km0-input-field" placeholder="WhatsApp (+593...)" type="tel">
        </div>

        <div class="km0-input-group">
            <span class="material-symbols-outlined text-blue-500 mr-4">mail</span>
            <input id="correo" required class="km0-input-field" placeholder="Email Corporativo" type="email">
        </div>
    </form>
</main>
