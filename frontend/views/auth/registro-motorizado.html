<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>KM0 - Registro Seguro Motorizado</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap" rel="stylesheet"/>
    
    <script src="../../assets/js/config.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .step-content { display: none; }
        .step-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Estilo idéntico al Login */
        input:focus, select:focus { ring: 2px solid #ec1313 !important; outline: none; border-color: transparent !important; }
        button:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

        .loader-icon::after {
            content: 'sports_motorsports';
            font-family: 'Material Symbols Outlined';
            animation: spin-icons 2s infinite;
            font-size: 5rem;
            color: #ec1313;
        }
        @keyframes spin-icons {
            0% { content: 'sports_motorsports'; }
            25% { content: 'two_wheeler'; }
            50% { content: 'package_2'; }
            75% { content: 'mail'; }
            100% { content: 'sports_motorsports'; }
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">

<div id="loader-modal" class="hidden fixed inset-0 z-[100] bg-slate-900/95 backdrop-blur-md flex flex-col items-center justify-center">
    <div class="loader-icon mb-6"></div>
    <h3 class="text-xl font-black italic uppercase">Procesando Expediente</h3>
</div>

<main class="max-w-md mx-auto px-6 py-10">
    <form id="main-form" autocomplete="off">
        
        <div id="step-1" class="step-content active space-y-6">
            <div class="flex flex-col items-center mb-8">
                <div class="w-20 h-20 bg-red-600/10 rounded-full flex items-center justify-center border border-red-600/30 mb-4">
                    <span class="material-symbols-outlined text-red-600 text-5xl">sports_motorsports</span>
                </div>
                <h2 class="text-2xl font-black italic uppercase tracking-tighter">Registro Motorizado</h2>
            </div>

            <div class="space-y-4">
                <input id="nombre" required type="text" oninput="checkFase1()" class="w-full bg-slate-900 border-none rounded-xl py-4 px-4 text-sm font-medium" placeholder="Nombres Completos *">
                <input id="email" required type="email" oninput="checkFase1()" class="w-full bg-slate-900 border-none rounded-xl py-4 px-4 text-sm font-medium" placeholder="Correo Electrónico *">
                
                <div class="grid grid-cols-2 gap-3">
                    <input id="cedula" required maxlength="10" type="tel" oninput="checkFase1()" class="w-full bg-slate-900 border-none rounded-xl py-4 px-4 text-sm font-bold" placeholder="Cédula *">
                    <div class="relative flex items-center">
                        <span class="absolute left-3 text-xs font-bold text-slate-500">+593</span>
                        <input id="tel" required maxlength="9" type="tel" oninput="checkFase1()" class="w-full bg-slate-900 border-none rounded-xl py-4 pl-12 pr-4 text-sm font-bold" placeholder="987654321">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <select id="provincia" required onchange="checkFase1()" class="w-full bg-slate-900 border-none rounded-xl py-4 px-4 text-xs font-bold uppercase">
                        <option value="" disabled selected>PROVINCIA</option>
                        <option value="AZUAY">AZUAY</option><option value="GUAYAS">GUAYAS</option><option value="PICHINCHA">PICHINCHA</option><option value="MANABI">MANABÍ</option><option value="AZUAY">AZUAY</option><option value="BOLIVAR">BOLÍVAR</option><option value="CANAR">CAÑAR</option><option value="CARCHI">CARCHI</option><option value="CHIMBORAZO">CHIMBORAZO</option><option value="COTOPAXI">COTOPAXI</option><option value="EL ORO">EL ORO</option><option value="ESMERALDAS">ESMERALDAS</option><option value="IMBABURA">IMBABURA</option><option value="LOJA">LOJA</option><option value="LOS RIOS">LOS RÍOS</option><option value="MORONA SANTIAGO">MORONA SANTIAGO</option><option value="NAPO">NAPO</option><option value="ORELLANA">ORELLANA</option><option value="PASTAZA">PASTAZA</option><option value="SANTA ELENA">SANTA ELENA</option><option value="SANTO DOMINGO">SANTO DOMINGO</option><option value="SUCUMBIOS">SUCUMBÍOS</option><option value="TUNGURAHUA">TUNGURAHUA</option><option value="ZAMORA CHINCHIPE">ZAMORA CHINCHIPE</option>
                    </select>
                    <input id="ciudad" required type="text" oninput="checkFase1()" class="w-full bg-slate-900 border-none rounded-xl py-4 px-4 text-sm font-medium" placeholder="Ciudad *">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <input id="marca" required type="text" oninput="checkFase1()" class="w-full bg-slate-900 border-none rounded-xl py-4 px-4 text-sm font-medium" placeholder="Marca Moto *">
                    <input id="placa" required type="text" maxlength="8" oninput="formatearPlaca(this); checkFase1();" class="w-full bg-slate-900 border-none rounded-xl py-4 px-4 text-sm font-bold uppercase" placeholder="ABC-123X">
                </div>
            </div>

            <button type="button" disabled id="btn-next" onclick="validarDuplicados()" class="w-full bg-red-600 text-white font-black py-5 rounded-2xl shadow-xl uppercase italic">
                Verificar y Continuar
            </button>
        </div>

        <div id="step-2" class="step-content space-y-6">
            <h3 class="text-xl font-black italic uppercase text-red-600 text-center">Documentación</h3>
            
            <div class="grid grid-cols-2 gap-3">
                <label class="col-span-2 bg-slate-900 p-4 rounded-xl border border-dashed border-red-600/40 text-center cursor-pointer">
                    <span id="txt-video" class="text-[10px] font-black uppercase">Video Selfie</span>
                    <input type="file" id="fVideo" accept="video/*" capture="user" class="hidden" required onchange="vLabel(this, 'txt-video'); checkFase2();">
                </label>
                <label class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center cursor-pointer">
                    <span id="txt-cf" class="text-[9px] font-black uppercase">Cédula Frontal</span>
                    <input type="file" id="fCedF" accept="image/*" class="hidden" required onchange="vLabel(this, 'txt-cf'); checkFase2();">
                </label>
                <label class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center cursor-pointer">
                    <span id="txt-cp" class="text-[9px] font-black uppercase">Cédula Posterior</span>
                    <input type="file" id="fCedP" accept="image/*" class="hidden" required onchange="vLabel(this, 'txt-cp'); checkFase2();">
                </label>
                <label class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center cursor-pointer">
                    <span id="txt-lf" class="text-[9px] font-black uppercase">Licencia Frontal</span>
                    <input type="file" id="fLicF" accept="image/*" class="hidden" required onchange="vLabel(this, 'txt-lf'); checkFase2();">
                </label>
                <label class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center cursor-pointer">
                    <span id="txt-lp" class="text-[9px] font-black uppercase">Licencia Posterior</span>
                    <input type="file" id="fLicP" accept="image/*" class="hidden" required onchange="vLabel(this, 'txt-lp'); checkFase2();">
                </label>
            </div>

            <div class="space-y-2">
                <label class="flex items-center justify-between p-4 bg-slate-900 rounded-xl">
                    <span class="text-[10px] font-black uppercase">Planilla Luz</span>
                    <input type="file" id="fPlanilla" accept=".pdf" class="hidden" required onchange="vLabel(this, 'st-luz'); checkFase2();">
                    <span id="st-luz" class="bg-red-600 text-[9px] px-3 py-1 rounded-full font-black">SUBIR PDF</span>
                </label>
                <label class="flex items-center justify-between p-4 bg-slate-900 rounded-xl">
                    <span class="text-[10px] font-black uppercase">Antecedentes</span>
                    <input type="file" id="fAnt" accept=".pdf" class="hidden" required onchange="vLabel(this, 'st-ant'); checkFase2();">
                    <span id="st-ant" class="bg-red-600 text-[9px] px-3 py-1 rounded-full font-black">SUBIR PDF</span>
                </label>
                <label class="flex items-center justify-between p-4 bg-slate-900 rounded-xl">
                    <span class="text-[10px] font-black uppercase">Cert. Banco</span>
                    <input type="file" id="fBanco" accept=".pdf" class="hidden" required onchange="vLabel(this, 'st-banco'); checkFase2();">
                    <span id="st-banco" class="bg-red-600 text-[9px] px-3 py-1 rounded-full font-black">SUBIR PDF</span>
                </label>
            </div>

            <button type="submit" disabled id="btn-final" class="w-full bg-green-600 text-white font-black py-5 rounded-2xl uppercase italic">
                Finalizar Registro
            </button>
        </div>

        <div id="step-success" class="step-content text-center py-20">
            <h2 class="text-3xl font-black italic uppercase">¡ÉXITO!</h2>
            <button type="button" onclick="window.close()" class="w-full bg-slate-800 p-4 rounded-xl mt-10 uppercase italic">Cerrar</button>
        </div>
    </form>
</main>

<script>
    function checkFase1() {
        const ids = ['nombre', 'email', 'cedula', 'tel', 'provincia', 'ciudad', 'marca', 'placa'];
        const valid = ids.every(id => document.getElementById(id).value.trim() !== "");
        document.getElementById('btn-next').disabled = !valid;
    }

    function checkFase2() {
        const files = ['fVideo', 'fCedF', 'fCedP', 'fLicF', 'fLicP', 'fPlanilla', 'fAnt', 'fBanco'];
        const valid = files.every(id => document.getElementById(id).files.length > 0);
        document.getElementById('btn-final').disabled = !valid;
    }

    function formatearPlaca(el) {
        let val = el.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        if (val.length > 3) val = val.slice(0, 3) + '-' + val.slice(3);
        el.value = val;
    }

    function vLabel(input, id) {
        if(input.files[0]) {
            const el = document.getElementById(id);
            el.innerText = "LISTO ✅";
            el.classList.add('text-green-500');
        }
    }

    async function validarDuplicados() {
        const btn = document.getElementById('btn-next');
        btn.innerText = "VERIFICANDO...";
        try {
            const resp = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    token: API_KEY,
                    accion: "verificar_duplicado_motorizado",
                    cedula: document.getElementById('cedula').value,
                    telefono: "+593" + document.getElementById('tel').value,
                    correo: document.getElementById('email').value.toLowerCase()
                })
            });
            const res = await resp.json();
            if(res.success) {
                document.getElementById('step-1').classList.remove('active');
                document.getElementById('step-2').classList.add('active');
            } else { alert(res.mensaje); btn.innerText = "Verificar y Continuar"; }
        } catch(e) { alert("Error de conexión"); }
    }

    const toB64 = f => new Promise((res) => {
        const r = new FileReader();
        r.readAsDataURL(f);
        r.onload = () => res(r.result);
    });

    document.getElementById('main-form').onsubmit = async (e) => {
        e.preventDefault();
        document.getElementById('loader-modal').classList.remove('hidden');
        const payload = {
            token: API_KEY, accion: "registro_motorizado",
            nombre: document.getElementById('nombre').value,
            cedula: document.getElementById('cedula').value,
            telefono: "+593" + document.getElementById('tel').value,
            correo: document.getElementById('email').value.toLowerCase(),
            provincia: document.getElementById('provincia').value,
            ciudad: document.getElementById('ciudad').value,
            marca: document.getElementById('marca').value,
            placa: document.getElementById('placa').value,
            fVideo: await toB64(document.getElementById('fVideo').files[0]),
            fCedF: await toB64(document.getElementById('fCedF').files[0]),
            fCedP: await toB64(document.getElementById('fCedP').files[0]),
            fLicF: await toB64(document.getElementById('fLicF').files[0]),
            fLicP: await toB64(document.getElementById('fLicP').files[0]),
            fPlanilla: await toB64(document.getElementById('fPlanilla').files[0]),
            fAnt: await toB64(document.getElementById('fAnt').files[0]),
            fBanco: await toB64(document.getElementById('fBanco').files[0])
        };
        await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        document.getElementById('loader-modal').classList.add('hidden');
        document.getElementById('step-2').classList.remove('active');
        document.getElementById('step-success').classList.add('active');
    };
</script>
</body>
</html>
