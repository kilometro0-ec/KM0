<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KM0 - Registro de Tienda</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <style type="text/tailwindcss">
        body {
            background-color: #000000;
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
            color: white;
        }

        /* Parche Autocompletado */
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px #0a0a0a inset !important;
            -webkit-text-fill-color: white !important;
        }

        .bg-glow {
            position: fixed;
            top: 0%; left: 50%;
            transform: translate(-50%, -20%);
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0, 112, 255, 0.1) 0%, rgba(255, 0, 255, 0.05) 50%, rgba(0, 0, 0, 0) 70%);
            z-index: -1;
        }

        .input-container {
            @apply relative w-full h-14 bg-zinc-900/30 border border-zinc-800 rounded-2xl mb-4 flex items-center px-4 transition-all focus-within:border-electric-blue/50 focus-within:bg-zinc-900/60;
        }

        .input-field {
            @apply bg-transparent border-none w-full text-white placeholder:text-zinc-600 focus:ring-0 text-sm p-0 font-semibold;
        }

        .material-symbols-outlined {
            @apply text-electric-blue text-xl mr-3 opacity-80;
        }

        .btn-fusion {
            background: linear-gradient(90deg, #0070FF 0%, #FF00FF 100%);
            @apply shadow-[0_0_20px_rgba(0,112,255,0.3)] active:scale-95 disabled:opacity-30 transition-all;
        }

        .spinner {
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'electric-blue': '#0070FF',
                        'neon-fuchsia': '#FF00FF',
                    }
                }
            }
        }
    </script>
</head>

<body class="p-6">
    <div class="bg-glow"></div>

    <div id="contenedorForm" class="w-full max-w-[400px] mx-auto flex flex-col">
        
        <header class="flex items-center justify-between mb-10">
            <button onclick="window.history.back()" class="size-11 rounded-2xl bg-zinc-900 border border-zinc-800 flex items-center justify-center active:scale-90 transition-all">
                <span class="material-symbols-outlined !text-white !mr-0 !text-lg">arrow_back_ios_new</span>
            </button>
            <div class="text-right">
                <p class="text-[12px] font-black text-neon-fuchsia tracking-[0.2em] uppercase italic">KM0</p>
                <p class="text-[8px] text-zinc-500 font-bold uppercase tracking-widest">Store Registry</p>
            </div>
        </header>

        <main class="animate-in fade-in slide-in-from-bottom-4 duration-700">
            <div class="mb-8">
                <h1 class="text-2xl font-black italic tracking-tighter uppercase leading-none">
                    REGISTRA TU <br/>
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-electric-blue to-neon-fuchsia text-4xl font-black">TIENDA</span>
                </h1>
                <div class="h-1 w-14 bg-gradient-to-r from-electric-blue to-neon-fuchsia mt-3 rounded-full shadow-[0_0_10px_rgba(0,112,255,0.5)]"></div>
            </div>
    
            <form id="formTienda" autocomplete="off" class="space-y-1">
                <label class="text-[10px] font-black text-zinc-600 uppercase ml-1 tracking-widest">Información Principal</label>
                <div class="input-container">
                    <span class="material-symbols-outlined">store</span>
                    <input id="nombreTienda" required class="input-field" placeholder="Nombre Comercial" type="text">
                </div>
                
                <div class="input-container">
                    <span class="material-symbols-outlined">person</span>
                    <input id="representante" required class="input-field" placeholder="Representante Legal" type="text">
                </div>

                <div class="input-container">
                    <span class="material-symbols-outlined">badge</span>
                    <input id="identificacion" minlength="10" maxlength="13" required class="input-field" placeholder="Cédula o RUC" type="text">
                </div>

                <label class="text-[10px] font-black text-zinc-600 uppercase ml-1 tracking-widest pt-2 block">Ubicación</label>
                <div class="grid grid-cols-2 gap-3">
                    <div class="input-container">
                        <span class="material-symbols-outlined">map</span>
                        <select id="provincia" required class="input-field !text-[13px] appearance-none">
                            <option value="" disabled selected>Provincia</option>
                            <option value="Azuay">Azuay</option><option value="Guayas">Guayas</option><option value="Pichincha">Pichincha</option><option value="Manabí">Manabí</option>
                            </select>
                    </div>
                    <div class="input-container">
                        <span class="material-symbols-outlined">location_city</span>
                        <input id="ciudad" required class="input-field" placeholder="Ciudad" type="text">
                    </div>
                </div>

                <label class="text-[10px] font-black text-zinc-600 uppercase ml-1 tracking-widest pt-2 block">Contacto</label>
                <div class="input-container">
                    <span class="material-symbols-outlined">chat</span>
                    <input id="telefono" required pattern="^\+593[0-9]{9}$" class="input-field" placeholder="WhatsApp (+593...)" type="tel">
                </div>

                <div class="input-container">
                    <span class="material-symbols-outlined">mail</span>
                    <input id="correo" required class="input-field" placeholder="Email Corporativo" type="email">
                </div>
            </form>
        </main>

        <footer class="mt-10 pb-10">
            <button type="submit" form="formTienda" id="btnEnviar" disabled 
                    class="btn-fusion w-full h-16 rounded-[2rem] text-white font-black tracking-[0.2em] uppercase flex items-center justify-center gap-4 transition-all">
                <div id="loading" class="hidden"><div class="spinner"></div></div>
                <span id="btnText">Finalizar Registro</span>
                <span id="btnIcon" class="material-symbols-outlined !mr-0 !text-white !text-2xl">rocket_launch</span>
            </button>
            <p id="errorMsg" class="text-center text-[10px] text-neon-fuchsia font-black mt-4 uppercase hidden bg-neon-fuchsia/10 py-3 rounded-xl border border-neon-fuchsia/20 px-4"></p>
            
            <p class="text-[9px] text-center text-zinc-600 mt-8 uppercase tracking-[0.3em] font-bold">
                2025 KM0® by <span class="text-white">CORPORACIÓN 360</span>
            </p>
        </footer>
    </div>

    <div id="successView" class="fixed inset-0 bg-black z-[100] hidden flex-col items-center justify-center p-10 text-center">
        <div class="flex flex-col items-center">
            <div class="size-24 rounded-full bg-electric-blue/10 border-2 border-electric-blue flex items-center justify-center mb-8 shadow-[0_0_50px_rgba(0,112,255,0.3)]">
                <span class="material-symbols-outlined text-6xl text-electric-blue !mr-0">check_circle</span>
            </div>
            <h2 class="text-3xl font-black italic mb-4 uppercase text-white leading-none">¡SOLICITUD <br><span class="text-neon-fuchsia">ENVIADA!</span></h2>
            <p class="text-zinc-500 text-[11px] font-bold uppercase tracking-widest mb-12 leading-relaxed max-w-[260px]">
                Nuestro equipo revisará tu tienda y se pondrá en contacto pronto.
            </p>
            
            <button onclick="window.location.href='../../index.html'" class="w-full min-w-[240px] h-14 bg-zinc-900 border border-zinc-800 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] text-white active:scale-95 transition-all">
                VOLVER AL INICIO
            </button>
        </div>
    </div>

    <script>
        const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbzileiH-CN1fIYY7J_pPQIg3YHLXy9NKtAS_ULgNT3LtrPRZHrlGo49a58w-jTzmWm2/exec';
        const form = document.getElementById('formTienda');
        const btn = document.getElementById('btnEnviar');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loading');
        const icon = document.getElementById('btnIcon');
        const errorMsg = document.getElementById('errorMsg');

        form.addEventListener('input', () => {
            btn.disabled = !form.checkValidity();
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btnText.innerText = 'PROCESANDO...';
            loader.classList.remove('hidden');
            icon.classList.add('hidden');
            errorMsg.classList.add('hidden');

            const datos = {
                accion: "registro_tienda",
                nombre: document.getElementById('nombreTienda').value,
                representante: document.getElementById('representante').value,
                ruc: document.getElementById('identificacion').value,
                provincia: document.getElementById('provincia').value,
                ciudad: document.getElementById('ciudad').value,
                telefono: document.getElementById('telefono').value,
                correo: document.getElementById('correo').value
            };

            try {
                const response = await fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify(datos) });
                const res = await response.json();

                if (res.success) {
                    document.getElementById('contenedorForm').classList.add('hidden');
                    document.getElementById('successView').classList.remove('hidden');
                    document.getElementById('successView').classList.add('flex');
                } else {
                    throw new Error(res.mensaje);
                }
            } catch (err) {
                btn.disabled = false;
                btnText.innerText = 'FINALIZAR REGISTRO';
                loader.classList.add('hidden');
                icon.classList.remove('hidden');
                errorMsg.innerText = "⚠️ " + err.message;
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
