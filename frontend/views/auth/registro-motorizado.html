<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>KM0 - Registro Seguro Motorizado</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap" rel="stylesheet"/>
    
    <script src="../../assets/js/config.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .step-content { display: none; }
        .step-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .icon-float { animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-10px); } 
        }

        /* Animación Ruleta de Carga */
        .loader-icon::after {
            content: 'sports_motorsports';
            font-family: 'Material Symbols Outlined';
            animation: spin-icons 2.5s infinite;
            font-size: 5rem;
            color: #ec1313;
        }
        @keyframes spin-icons {
            0% { content: 'sports_motorsports'; }
            25% { content: 'two_wheeler'; }
            50% { content: 'package_2'; }
            75% { content: 'mail'; }
            100% { content: 'sports_motorsports'; }
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">

<div id="loader-modal" class="hidden fixed inset-0 z-[100] bg-slate-900/95 backdrop-blur-md flex flex-col items-center justify-center">
    <div class="loader-icon mb-6"></div>
    <h3 class="text-xl font-black italic uppercase tracking-tighter">Subiendo Expediente</h3>
    <p class="text-[10px] text-red-500 font-bold uppercase tracking-[0.4em] animate-pulse">Nube Kilómetro Cero</p>
</div>

<main class="max-w-md mx-auto px-6 py-10">
    <form id="main-form" autocomplete="off">
        
        <div id="step-1" class="step-content active space-y-6">
            <div class="flex flex-col items-center mb-8">
                <div class="w-24 h-24 bg-red-600/10 rounded-full flex items-center justify-center border-2 border-red-600 shadow-[0_0_20px_rgba(236,19,19,0.3)] icon-float">
                    <span class="material-symbols-outlined text-red-600 text-6xl">sports_motorsports</span>
                </div>
                <h2 class="text-3xl font-black italic uppercase tracking-tighter mt-4 text-center">Registro de<br>Motorizados</h2>
            </div>

            <div class="space-y-4">
                <input id="nombre" required type="text" class="w-full bg-slate-900 border-slate-800 rounded-2xl p-4 text-sm font-bold focus:ring-red-600" placeholder="NOMBRES COMPLETOS *">
                <input id="email" required type="email" class="w-full bg-slate-900 border-slate-800 rounded-2xl p-4 text-sm font-bold focus:ring-red-600" placeholder="CORREO ELECTRÓNICO *">
                
                <div class="grid grid-cols-2 gap-3">
                    <input id="cedula" required maxlength="10" type="tel" class="w-full bg-slate-900 border-slate-800 rounded-2xl p-4 text-sm font-bold focus:ring-red-600" placeholder="CÉDULA *">
                    <input id="tel" required maxlength="10" type="tel" class="w-full bg-slate-900 border-slate-800 rounded-2xl p-4 text-sm font-bold focus:ring-red-600" placeholder="TELÉFONO *">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <input id="provincia" required type="text" class="w-full bg-slate-900 border-slate-800 rounded-2xl p-4 text-sm font-bold focus:ring-red-600" placeholder="PROVINCIA *">
                    <input id="ciudad" required type="text" class="w-full bg-slate-900 border-slate-800 rounded-2xl p-4 text-sm font-bold focus:ring-red-600" placeholder="CIUDAD *">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <input id="marca" required type="text" class="w-full bg-slate-900 border-slate-800 rounded-2xl p-4 text-sm font-bold focus:ring-red-600" placeholder="MARCA MOTO *">
                    <input id="placa" required type="text" class="w-full bg-slate-900 border-slate-800 rounded-2xl p-4 text-sm font-bold uppercase focus:ring-red-600" placeholder="PLACA *">
                </div>
            </div>

            <button type="button" onclick="validarDuplicados()" id="btn-next" class="w-full bg-red-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-red-600/20 uppercase italic transition-transform active:scale-95">
                Verificar y Continuar
            </button>
        </div>

        <div id="step-2" class="step-content space-y-6">
            <div class="space-y-1 text-center">
                <h3 class="text-2xl font-black italic uppercase text-red-600">Documentación</h3>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Sube fotos y PDFs originales</p>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <label class="col-span-2 bg-slate-900 p-6 rounded-3xl border-2 border-dashed border-red-600 flex flex-col items-center justify-center cursor-pointer">
                    <span class="material-symbols-outlined text-red-600 text-4xl mb-2">videocam</span>
                    <span id="txt-video" class="text-[10px] font-black uppercase">Grabar Video Selfie</span>
                    <input type="file" id="fVideo" accept="video/*" capture="user" class="hidden" required onchange="vLabel(this, 'txt-video')">
                </label>

                <label class="bg-slate-900 p-4 rounded-2xl border border-slate-800 text-center cursor-pointer">
                    <span id="txt-cf" class="text-[9px] font-black uppercase text-slate-400">Cédula Frontal</span>
                    <input type="file" id="fCedF" accept="image/*" capture="environment" class="hidden" required onchange="vLabel(this, 'txt-cf')">
                </label>
                <label class="bg-slate-900 p-4 rounded-2xl border border-slate-800 text-center cursor-pointer">
                    <span id="txt-cp" class="text-[9px] font-black uppercase text-slate-400">Cédula Posterior</span>
                    <input type="file" id="fCedP" accept="image/*" capture="environment" class="hidden" required onchange="vLabel(this, 'txt-cp')">
                </label>

                <label class="bg-slate-900 p-4 rounded-2xl border border-slate-800 text-center cursor-pointer">
                    <span id="txt-lf" class="text-[9px] font-black uppercase text-slate-400">Licencia Frontal</span>
                    <input type="file" id="fLicF" accept="image/*" capture="environment" class="hidden" required onchange="vLabel(this, 'txt-lf')">
                </label>
                <label class="bg-slate-900 p-4 rounded-2xl border border-slate-800 text-center cursor-pointer">
                    <span id="txt-lp" class="text-[9px] font-black uppercase text-slate-400">Licencia Posterior</span>
                    <input type="file" id="fLicP" accept="image/*" capture="environment" class="hidden" required onchange="vLabel(this, 'txt-lp')">
                </label>
            </div>

            <div class="space-y-2">
                <label class="flex items-center justify-between p-4 bg-slate-900 rounded-2xl border border-slate-800">
                    <span class="text-[10px] font-black uppercase">Planilla de Luz (PDF)</span>
                    <input type="file" id="fPlanilla" accept=".pdf" class="hidden" required onchange="vLabel(this, 'st-luz')">
                    <span id="st-luz" class="bg-red-600 text-[9px] px-3 py-1 rounded-full font-black">SUBIR</span>
                </label>
                <label class="flex items-center justify-between p-4 bg-slate-900 rounded-2xl border border-slate-800">
                    <span class="text-[10px] font-black uppercase">Antecedentes (PDF)</span>
                    <input type="file" id="fAnt" accept=".pdf" class="hidden" required onchange="vLabel(this, 'st-ant')">
                    <span id="st-ant" class="bg-red-600 text-[9px] px-3 py-1 rounded-full font-black">SUBIR</span>
                </label>
                <label class="flex items-center justify-between p-4 bg-slate-900 rounded-2xl border border-slate-800">
                    <span class="text-[10px] font-black uppercase">Cert. Bancario (PDF)</span>
                    <input type="file" id="fBanco" accept=".pdf" class="hidden" required onchange="vLabel(this, 'st-banco')">
                    <span id="st-banco" class="bg-red-600 text-[9px] px-3 py-1 rounded-full font-black">SUBIR</span>
                </label>
            </div>

            <button type="submit" class="w-full bg-green-600 text-white font-black py-5 rounded-2xl shadow-xl uppercase italic">
                Finalizar Registro
            </button>
        </div>

        <div id="step-success" class="step-content text-center py-16 space-y-8">
            <div class="w-24 h-24 bg-green-600/20 rounded-full flex items-center justify-center border-4 border-green-600 mx-auto">
                <span class="material-symbols-outlined text-green-600 text-6xl">verified</span>
            </div>
            <div>
                <h2 class="text-3xl font-black uppercase italic">¡Expediente Recibido!</h2>
                <p class="text-sm text-slate-400 mt-2 px-6">Tu información está bajo revisión técnica. Pronto nos comunicaremos contigo.</p>
            </div>
            <button type="button" onclick="window.close()" class="w-full bg-slate-800 text-white font-black py-4 rounded-xl uppercase italic">Cerrar Aplicación</button>
        </div>

    </form>
</main>

<script>
    function vLabel(input, id) {
        if(input.files[0]) {
            const el = document.getElementById(id);
            el.innerText = "CARGADO ✅";
            el.classList.add('text-green-500');
            if(el.classList.contains('bg-red-600')) el.classList.replace('bg-red-600', 'bg-green-600');
        }
    }

    async function validarDuplicados() {
        const btn = document.getElementById('btn-next');
        const ced = document.getElementById('cedula').value;
        const tel = document.getElementById('tel').value;
        const mail = document.getElementById('email').value.toLowerCase();

        if(!ced || !tel || !mail) { alert("Completa todos los campos"); return; }

        btn.innerText = "VERIFICANDO...";
        btn.disabled = true;

        try {
            const resp = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    token: API_KEY,
                    accion: "verificar_duplicado_motorizado",
                    cedula: ced,
                    telefono: tel,
                    correo: mail
                })
            });
            const res = await resp.json();

            if(res.success) {
                document.getElementById('step-1').classList.remove('active');
                document.getElementById('step-2').classList.add('active');
                window.scrollTo(0,0);
            } else {
                alert(res.mensaje);
                btn.innerText = "Verificar y Continuar";
                btn.disabled = false;
            }
        } catch(e) { 
            alert("Error de conexión"); 
            btn.innerText = "Verificar y Continuar";
            btn.disabled = false;
        }
    }

    const toB64 = f => new Promise((res, rej) => {
        if(!f) res("");
        const r = new FileReader();
        r.readAsDataURL(f);
        r.onload = () => res(r.result);
        r.onerror = e => rej(e);
    });

    document.getElementById('main-form').onsubmit = async (e) => {
        e.preventDefault();
        document.getElementById('loader-modal').classList.remove('hidden');

        const payload = {
            token: API_KEY,
            accion: "registro_motorizado",
            nombre: document.getElementById('nombre').value,
            cedula: document.getElementById('cedula').value,
            telefono: document.getElementById('tel').value,
            correo: document.getElementById('email').value.toLowerCase(),
            provincia: document.getElementById('provincia').value,
            ciudad: document.getElementById('ciudad').value,
            marca: document.getElementById('marca').value,
            placa: document.getElementById('placa').value.toUpperCase(),
            
            // Archivos mapeados al Script de 21 columnas
            fVideo: await toB64(document.getElementById('fVideo').files[0]),
            fCedF: await toB64(document.getElementById('fCedF').files[0]),
            fCedP: await toB64(document.getElementById('fCedP').files[0]),
            fLicF: await toB64(document.getElementById('fLicF').files[0]),
            fLicP: await toB64(document.getElementById('fLicP').files[0]),
            fPlanilla: await toB64(document.getElementById('fPlanilla').files[0]),
            fAnt: await toB64(document.getElementById('fAnt').files[0]),
            fBanco: await toB64(document.getElementById('fBanco').files[0])
        };

        try {
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            document.getElementById('loader-modal').classList.add('hidden');
            document.getElementById('step-2').classList.remove('active');
            document.getElementById('step-success').classList.add('active');
        } catch(err) {
            alert("Error al procesar el envío");
            document.getElementById('loader-modal').classList.add('hidden');
        }
    };
</script>
</body>
</html>
