<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Producto - KM0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "electric-blue": "#2563eb",
                        "dark-bg": "#0f172a"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-bg text-white font-['Inter'] min-h-screen pb-20">

    <header class="p-6 flex items-center gap-4 bg-slate-900/50 border-b border-white/5">
        <button onclick="window.location.href='panel-operativo-tienda.html'" class="text-electric-blue hover:scale-110 transition-transform">
            <span class="material-symbols-outlined text-3xl">arrow_back</span>
        </button>
        <h1 class="text-xl font-black italic uppercase tracking-tighter">Añadir Producto</h1>
    </header>

    <main class="p-6 max-w-md mx-auto">
        <div class="space-y-6">
            
            <div class="flex flex-col items-center justify-center gap-4">
                <div id="preview-container" class="w-full h-48 rounded-2xl border-2 border-dashed border-white/10 flex flex-col items-center justify-center bg-white/5 overflow-hidden">
                    <span id="placeholder-icon" class="material-symbols-outlined text-5xl text-slate-600">add_a_photo</span>
                    <img id="img-preview" class="hidden w-full h-full object-cover">
                </div>
                <label class="bg-electric-blue hover:bg-blue-700 text-white text-xs font-black py-3 px-6 rounded-xl cursor-pointer transition-all uppercase tracking-widest">
                    Seleccionar Imagen
                    <input type="file" id="foto" accept="image/*" class="hidden" onchange="previewFile()">
                </label>
            </div>

            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Nombre del Producto</label>
                    <input type="text" id="nombre" placeholder="Ej: Hamburguesa Doble" class="w-full bg-white/5 border border-white/10 rounded-xl py-4 px-4 outline-none focus:border-electric-blue text-white">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Stock Inicial</label>
                    <input type="number" id="stock" placeholder="Cantidad disponible" class="w-full bg-white/5 border border-white/10 rounded-xl py-4 px-4 outline-none focus:border-electric-blue text-white">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Categoría</label>
                    <input type="text" id="categoria" placeholder="Escriba la categoría (Ej: Snaks, Ropa, etc.)" class="w-full bg-white/5 border border-white/10 rounded-xl py-4 px-4 outline-none focus:border-electric-blue text-white">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Descripción corta</label>
                    <textarea id="descripcion" rows="3" placeholder="Detalles del producto..." class="w-full bg-white/5 border border-white/10 rounded-xl py-4 px-4 outline-none focus:border-electric-blue text-white"></textarea>
                </div>

                <button id="btn-guardar" onclick="subirProducto()" class="w-full bg-electric-blue py-5 rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-blue-500/20 active:scale-95 transition-all flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">save</span>
                    Guardar Producto
                </button>
            </div>

            <p id="msg" class="hidden text-center text-[10px] font-black uppercase p-3 rounded-lg"></p>
        </div>
    </main>

    <script>
        const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbzileiH-CN1fIYY7J_pPQIg3YHLXy9NKtAS_ULgNT3LtrPRZHrlGo49a58w-jTzmWm2/exec';
        let base64Image = "";

        function previewFile() {
            const file = document.getElementById('foto').files[0];
            const reader = new FileReader();
            const preview = document.getElementById('img-preview');
            const placeholder = document.getElementById('placeholder-icon');

            reader.onloadend = function() {
                base64Image = reader.result;
                preview.src = reader.result;
                preview.classList.remove('hidden');
                placeholder.classList.add('hidden');
            }
            if (file) reader.readAsDataURL(file);
        }

        async function subirProducto() {
            const btn = document.getElementById('btn-guardar');
            const msg = document.getElementById('msg');
            const idTienda = localStorage.getItem('km0_user_id');

            const payload = {
                accion: "agregar_producto",
                idTienda: idTienda,
                nombre: document.getElementById('nombre').value,
                precio: "0", // Se envía 0 ya que se quitó del formulario
                stock: document.getElementById('stock').value,
                categoria: document.getElementById('categoria').value,
                descripcion: document.getElementById('descripcion').value,
                imagenBase64: base64Image
            };

            if(!payload.nombre || !idTienda) {
                alert("El nombre del producto es obligatorio");
                return;
            }

            btn.disabled = true;
            btn.innerText = "SUBIENDO...";
            
            try {
                const res = await fetch(URL_SCRIPT, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if(data.success) {
                    msg.innerText = "¡PRODUCTO CREADO EXITOSAMENTE!";
                    msg.className = "text-center text-[10px] font-black uppercase p-3 rounded-lg bg-green-500/20 text-green-500 block";
                    setTimeout(() => window.location.href = 'panel-operativo-tienda.html', 1500);
                }
            } catch (e) {
                btn.disabled = false;
                btn.innerText = "GUARDAR PRODUCTO";
                alert("Error al conectar con el servidor maestro.");
            }
        }
    </script>
</body>
</html>
