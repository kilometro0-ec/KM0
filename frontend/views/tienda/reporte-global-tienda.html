<section class="bg-surface-dark border border-white/5 rounded-[2.5rem] p-6 shadow-xl">
    <div class="flex items-center gap-2 mb-4">
        <span class="material-symbols-outlined text-shop-blue">calendar_month</span>
        <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Filtrar Rendimiento</h3>
    </div>
    
    <div class="grid grid-cols-2 gap-3">
        <div class="space-y-1">
            <label class="text-[8px] font-black text-slate-500 uppercase px-1">Desde</label>
            <input type="date" id="fecha-inicio" class="w-full bg-black/40 border-white/10 rounded-xl p-3 text-xs font-bold focus:ring-shop-blue text-white">
        </div>
        <div class="space-y-1">
            <label class="text-[8px] font-black text-slate-500 uppercase px-1">Hasta</label>
            <input type="date" id="fecha-fin" class="w-full bg-black/40 border-white/10 rounded-xl p-3 text-xs font-bold focus:ring-shop-blue text-white">
        </div>
    </div>

    <div class="flex gap-2 mt-4 overflow-x-auto pb-2 no-scrollbar">
        <button onclick="setRango('hoy')" class="whitespace-nowrap px-4 py-2 rounded-full bg-white/5 border border-white/10 text-[9px] font-black uppercase hover:border-shop-blue transition-all">Hoy</button>
        <button onclick="setRango('semana')" class="whitespace-nowrap px-4 py-2 rounded-full bg-white/5 border border-white/10 text-[9px] font-black uppercase hover:border-shop-blue transition-all">7 Días</button>
        <button onclick="setRango('mes')" class="whitespace-nowrap px-4 py-2 rounded-full bg-shop-blue/20 border border-shop-blue text-[9px] font-black uppercase text-shop-blue">Este Mes</button>
    </div>

    <button onclick="cargarReporte()" class="w-full mt-4 py-4 bg-shop-blue text-white rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg shadow-shop-blue/20 active:scale-95 transition-all">
        Aplicar Filtro
    </button>
</section>

<script>
    // Función para establecer fechas automáticas
    function setRango(tipo) {
        const hoy = new Date();
        let inicio = new Date();
        
        if (tipo === 'hoy') {
            inicio = hoy;
        } else if (tipo === 'semana') {
            inicio.setDate(hoy.getDate() - 7);
        } else if (tipo === 'mes') {
            inicio = new Date(hoy.getFullYear(), hoy.getFullYear() === hoy.getFullYear() ? hoy.getMonth() : 0, 1);
        }

        document.getElementById('fecha-inicio').value = inicio.toISOString().split('T')[0];
        document.getElementById('fecha-fin').value = hoy.toISOString().split('T')[0];
        
        // Animación de feedback
        cargarReporte();
    }

    // CARGAR DATOS REALES CON FILTRO
    async function cargarReporte() {
        const btn = document.querySelector('button[onclick="cargarReporte()"]');
        const fInicio = document.getElementById('fecha-inicio').value;
        const fFin = document.getElementById('fecha-fin').value;
        const idTienda = localStorage.getItem('user_id');

        if(!fInicio || !fFin) return;

        btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-sm">refresh</span>';
        btn.disabled = true;

        const payload = {
            accion: 'obtener_reporte_fechas',
            token: API_KEY,
            idTienda: idTienda,
            fechaInicio: fInicio,
            fechaFin: fFin
        };

        try {
            // Llamada a tu API_URL (de config.js)
            const response = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            const data = await response.json();

            // Actualizar Tarjetas (Ventas y Pedidos)
            document.getElementById('ventas-mes').innerText = `$${data.totalVentas.toFixed(2)}`;
            document.getElementById('pedidos-total').innerText = data.totalPedidos;

            // Mostrar el log de actividad filtrada
            actualizarLista(data.detalles);

        } catch (e) {
            console.error("Error cargando reporte:", e);
        } finally {
            btn.innerText = 'Aplicar Filtro';
            btn.disabled = false;
        }
    }

    function actualizarLista(detalles) {
        const lista = document.getElementById('lista-reporte');
        if (!detalles || detalles.length === 0) {
            lista.innerHTML = '<p class="text-[10px] text-slate-500 uppercase italic">Sin datos en este rango</p>';
            return;
        }
        
        // Aquí construyes el HTML de las filas basado en la respuesta de Google Sheets
        let html = '';
        detalles.forEach(item => {
            html += `
                <div class="flex justify-between items-center p-3 border-b border-white/5">
                    <div>
                        <p class="text-xs font-bold">${item.fecha}</p>
                        <p class="text-[8px] text-slate-500 uppercase">${item.metodo_pago}</p>
                    </div>
                    <p class="font-black text-shop-blue">+$${item.monto}</p>
                </div>
            `;
        });
        lista.innerHTML = html;
    }

    // Al cargar por primera vez, poner el mes actual
    window.onload = () => {
        setRango('mes');
    };
</script>
