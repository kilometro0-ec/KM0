<body class="min-h-screen flex flex-col">

    </div>
    
    <div class="flex items-center gap-2">

</header>

<main class="flex-1 overflow-y-auto pb-44 p-4 space-y-6">

        <button onclick="location.href='finanzas-tienda.html'" class="flex flex-col items-start justify-center p-5 bg-neutral-dark rounded-2xl border border-primary/30 shadow-lg shadow-primary/5 active:scale-95 transition-all">

            <p class="text-[10px] text-slate-400 font-black uppercase italic">Por Cobrar</p>
            <p id="monto-finanzas" class="text-xl font-black italic">$0.00</p>
        </button>
    </div>

    <div class="space-y-4">

                <div class="size-12 rounded-xl bg-primary/10 flex items-center justify-center text-primary border border-primary/20">
                    <p id="total-stock-count" class="text-xl font-black">0</p>
                </div>
                <div>
                    <p class="text-slate-400 text-[10px] font-black uppercase">Inventario Total</p>
                    <p class="text-[11px] text-white font-bold italic uppercase">Productos en Stock</p>
                </div>
            </div>
            <button onclick="location.href='catalogo-tienda.html'" class="text-primary material-symbols-outlined">arrow_forward_ios</button>

        <div class="grid grid-cols-2 gap-3">

                <div class="flex items-center justify-between">
                    <p id="count-entregados" class="text-2xl font-black text-status-green italic">0</p>

            <div class="p-4 rounded-2xl bg-neutral-dark border-l-4 border-accent-fuchsia">
                <p class="text-slate-400 text-[9px] font-black uppercase mb-1 tracking-tighter">En Tránsito</p>
                <div class="flex items-center justify-between">
                    <p id="count-en-camino" class="text-2xl font-black text-white italic">0</p>

</main>

<nav class="fixed bottom-0 left-0 right-0 border-t border-primary/10 bg-background-dark/95 backdrop-blur-xl px-2 pb-8 pt-3 z-50">

        </a>
        <div class="relative -top-12">
            <button onclick="location.href='nuevo-pedido-tienda.html'" class="nav-center-btn size-20 rounded-full flex flex-col items-center justify-center border-[6px] border-background-dark text-white shadow-2xl active:scale-90 transition-transform">
                <span class="material-symbols-outlined text-4xl font-black">add_shopping_cart</span>
                <span class="text-[7px] font-black uppercase mt-1">Vender</span>
            </button>
        </div>
        <a class="flex flex-col items-center gap-1 text-slate-500" href="finanzas-tienda.html">
            <span class="material-symbols-outlined text-2xl">payments</span>
            <span class="text-[8px] font-black uppercase tracking-tighter">Caja</span>
        </a>
        <a class="flex flex-col items-center gap-1 text-slate-500" href="perfil-tienda.html">
            <span class="material-symbols-outlined text-2xl">account_circle</span>
            <span class="text-[8px] font-black uppercase tracking-tighter">Tienda</span>
        </a>
    </div>
</nav>

<script>
    // Funciones globales disponibles para el HTML
    async function sincronizarAhora() {
        const icon = document.getElementById('sync-icon');
        const idTienda = localStorage.getItem('km0_user_id');
        if(!icon) return;
        icon.classList.add('animate-spin');

        try {
            const resp = await fetch(`${API_URL}?accion=obtener_resumen_panel&idTienda=${idTienda}`);
            const data = await resp.json();
            if (data.success) {
                document.getElementById('monto-finanzas').innerText = `$${parseFloat(data.saldo || 0).toFixed(2)}`;
                document.getElementById('total-stock-count').innerText = data.totalStock || '0';
                document.getElementById('count-entregados').innerText = data.entregados || '0';
                document.getElementById('count-en-camino').innerText = data.enCamino || '0';
                window.enviarNotif("KM0 Cloud", "Datos actualizados correctamente");
            }
        } catch (e) {
            console.error("Error sync:", e);
            window.enviarNotif("Error", "No se pudo conectar con el motor");
        } finally {
            icon.classList.remove('animate-spin');
        }
    }

    function cerrarSesion() {
        if(confirm("¿Desea cerrar la sesión operativa?")) {
            localStorage.clear();
            window.location.href = '../auth/login.html';
        }
    }

    function enviarNotif(titulo, msj) {
        const root = document.getElementById('notif-root');
        if(!root) return;
        const card = document.createElement('div');
        card.className = "notif-mobile pointer-events-auto w-full max-w-sm mx-auto bg-neutral-dark/95 backdrop-blur-md rounded-2xl shadow-2xl border-l-4 border-primary p-3 flex items-center gap-4 border border-white/10 transition-opacity duration-500";
        card.innerHTML = `
            <div class="size-10 rounded-full bg-primary flex items-center justify-center text-white">
                <span class="material-symbols-outlined">notifications</span>
            </div>
            <div class="flex-1">
                <div class="flex justify-between items-center text-[10px] font-black uppercase text-primary">
                    <span>${titulo}</span>
                    <span class="text-slate-400 font-normal">Ahora</span>
                </div>
                <p class="text-xs font-bold text-slate-100">${msj}</p>
            </div>
        `;
        root.appendChild(card);
        setTimeout(() => { card.style.opacity = "0"; setTimeout(() => card.remove(), 500); }, 3000);
    }
    
    // Hacerla global para el módulo
    window.enviarNotif = enviarNotif;

    window.onload = async function() {
        const idTienda = localStorage.getItem('km0_user_id');
        const nombreTienda = localStorage.getItem('km0_user_nombre');
        
        if (!idTienda) {
            window.location.href = '../auth/login.html';
            return;
        }
        document.getElementById('shop-name-display').innerText = nombreTienda || "Socio KM0";
        document.getElementById('shop-id-display').innerText = idTienda;
        await sincronizarAhora();
    };
</script>

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB4ozxodUbFz65PIjGVynZpa-mA1BXZnjo",
        authDomain: "km0-web-app.firebaseapp.com",
        projectId: "km0-web-app",
        storageBucket: "km0-web-app.firebasestorage.app",
        messagingSenderId: "685305561021",
        appId: "1:685305561021:web:28a3322aa18c1eee0a9cd4"
    };

    const app = initializeApp(firebaseConfig);
    const messaging = getMessaging(app);

    async function solicitarPermisos() {
        try {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                const currentToken = await getToken(messaging, { 
                    vapidKey: 'TU_VAPID_KEY_AQUÍ' // REEMPLAZA ESTO
                });
                if (currentToken) {
                    console.log("Token de la tienda:", currentToken);
                }
            }
        } catch (error) {
            console.error('Error notificaciones:', error);
        }
    }

    onMessage(messaging, (payload) => {
        // Usamos tu propia función estética de notificación en lugar de un alert feo
        window.enviarNotif(payload.notification.title, payload.notification.body);
        // Sincronizar datos automáticamente al recibir mensaje
        sincronizarAhora();
    });

    solicitarPermisos();
</script>
