<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KM0 Admin: Engine Tiendas</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f4259d", // Fucsia Neón
                        "background-dark": "#0f080c",
                        "surface-dark": "#1a0b14",
                        "neutral-muted": "#2a1622",
                    },
                    fontFamily: { "display": ["Space Grotesk", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0f080c; color: white; -webkit-tap-highlight-color: transparent; }
        .neon-fuchsia { text-shadow: 0 0 10px rgba(244, 37, 157, 0.4); }
        .ios-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0; }
        .filled { font-variation-settings: 'FILL' 1; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-32">

<header class="sticky top-0 z-50 bg-background-dark/80 ios-blur border-b border-primary/20 px-4 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
        <button onclick="window.history.back()" class="size-10 bg-primary/10 rounded-full flex items-center justify-center text-primary">
            <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <div>
            <h1 class="text-lg font-black uppercase tracking-tighter neon-fuchsia">Tiendas Engine</h1>
            <p class="text-[10px] text-primary font-bold uppercase tracking-[0.2em]">Partner Management</p>
        </div>
    </div>
    <button class="size-10 bg-primary text-white rounded-full flex items-center justify-center shadow-lg shadow-primary/20">
        <span class="material-symbols-outlined">add</span>
    </button>
</header>

<main class="p-4 space-y-6">
    
    <div class="relative">
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/50">search</span>
        <input type="text" placeholder="BUSCAR POR RUC O NOMBRE..." class="w-full bg-surface-dark border border-primary/10 rounded-xl py-3 pl-12 pr-4 text-xs font-bold tracking-widest focus:ring-1 focus:ring-primary outline-none uppercase">
    </div>

    <div class="flex gap-2 overflow-x-auto no-scrollbar">
        <button class="flex shrink-0 items-center gap-2 px-4 py-2 rounded-lg bg-surface-dark border border-primary/20 text-[10px] font-black uppercase tracking-widest text-slate-400">
            Sector <span class="material-symbols-outlined text-sm">keyboard_arrow_down</span>
        </button>
        <button class="flex shrink-0 items-center gap-2 px-4 py-2 rounded-lg bg-primary/10 border border-primary/30 text-[10px] font-black uppercase tracking-widest text-primary">
            <span class="material-symbols-outlined text-sm">filter_list</span> Filtros
        </button>
    </div>

    <section class="space-y-4">
        <h2 class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500 px-1">Comercios Registrados</h2>

        <div class="bg-surface-dark border border-primary/10 rounded-2xl p-4 shadow-xl active:scale-[0.98] transition-transform">
            <div class="flex justify-between items-start mb-4">
                <div class="flex gap-3">
                    <div class="size-12 rounded-xl bg-gradient-to-br from-primary/20 to-transparent flex items-center justify-center border border-primary/20">
                        <span class="material-symbols-outlined text-primary text-2xl filled">storefront</span>
                    </div>
                    <div>
                        <h4 class="font-bold text-sm">Pizzería Napoli</h4>
                        <p class="text-[10px] text-primary font-mono tracking-tighter">RUC: 20601234567</p>
                    </div>
                </div>
                <span class="px-2 py-1 rounded-md bg-green-500/10 text-green-400 text-[9px] font-black uppercase border border-green-500/20">Activo</span>
            </div>

            <div class="grid grid-cols-2 gap-4 py-3 border-y border-white/5 mb-4">
                <div>
                    <p class="text-[8px] text-slate-500 uppercase font-black tracking-widest">Sector</p>
                    <p class="text-xs font-bold text-slate-300">Gastronomía</p>
                </div>
                <div class="text-right">
                    <p class="text-[8px] text-slate-500 uppercase font-black tracking-widest">Comisión</p>
                    <p class="text-sm font-black text-primary">12.5%</p>
                </div>
            </div>

            <div class="flex gap-2">
                <button class="flex-1 py-3 bg-neutral-muted rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-sm">percent</span> Comisión
                </button>
                <button class="size-11 bg-neutral-muted rounded-xl flex items-center justify-center text-slate-400">
                    <span class="material-symbols-outlined text-lg">edit</span>
                </button>
            </div>
        </div>

        <div class="bg-surface-dark border border-white/5 rounded-2xl p-4 opacity-70">
            <div class="flex justify-between items-start mb-4">
                <div class="flex gap-3 grayscale">
                    <div class="size-12 rounded-xl bg-slate-800 flex items-center justify-center border border-white/10 text-slate-500">
                        <span class="material-symbols-outlined text-2xl">shopping_basket</span>
                    </div>
                    <div>
                        <h4 class="font-bold text-sm text-slate-500">Market San Juan</h4>
                        <p class="text-[10px] text-slate-600 font-mono">RUC: 20129876543</p>
                    </div>
                </div>
                <span class="px-2 py-1 rounded-md bg-white/5 text-slate-500 text-[9px] font-black uppercase border border-white/10">Bloqueado</span>
            </div>
            <button class="w-full py-3 bg-primary/10 text-primary border border-primary/20 rounded-xl text-[10px] font-black uppercase tracking-widest">Reactivar Comercio</button>
        </div>

    </section>
</main>

<nav class="fixed bottom-0 left-0 right-0 bg-background-dark/95 ios-blur border-t border-primary/20 px-2 pb-6 pt-2 z-50">
    <div class="flex justify-around items-center">
        <a class="flex flex-col items-center gap-1 px-4 py-2 text-slate-500" href="dashboard.html">
            <span class="material-symbols-outlined text-[26px]">dashboard</span>
            <span class="text-[9px] font-black uppercase">Inicio</span>
        </a>
        <a class="flex flex-col items-center gap-1 px-4 py-2 text-primary" href="#">
            <span class="material-symbols-outlined text-[26px] filled">storefront</span>
            <span class="text-[9px] font-black uppercase">Tiendas</span>
        </a>
        <div class="relative -top-6">
            <button class="size-14 bg-primary rounded-full flex items-center justify-center text-white shadow-lg shadow-primary/30 border-4 border-background-dark">
                <span class="material-symbols-outlined text-3xl font-black">add</span>
            </button>
        </div>
        <a class="flex flex-col items-center gap-1 px-4 py-2 text-slate-500" href="pedidos.html">
            <span class="material-symbols-outlined text-[26px]">package_2</span>
            <span class="text-[9px] font-black uppercase">Pedidos</span>
        </a>
        <a class="flex flex-col items-center gap-1 px-4 py-2 text-slate-500" href="configuracion.html">
            <span class="material-symbols-outlined text-[26px]">tune</span>
            <span class="text-[9px] font-black uppercase">Motor</span>
        </a>
    </div>
</nav>

</body>
</html>
