<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KM0 Admin: Engine Tiendas</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "brand-blue": "#0057FF",
                        "brand-fuchsia": "#FF00FF",
                        "background-dark": "#0f080c",
                        "surface-dark": "#1a0b14",
                    },
                    fontFamily: { "display": ["Space Grotesk", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0f080c; color: white; -webkit-tap-highlight-color: transparent; }
        
        /* DEGRADADO EXACTO DE LA IMAGEN */
        .gradient-brand {
            background: linear-gradient(90deg, #0057FF 0%, #FF00FF 100%);
        }
        .text-gradient {
            background: linear-gradient(90deg, #0057FF 0%, #FF00FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .border-gradient {
            border: 1px solid;
            border-image-source: linear-gradient(90deg, #0057FF 0%, #FF00FF 100%);
            border-image-slice: 1;
        }
        
        .ios-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0; }
        .filled { font-variation-settings: 'FILL' 1; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-32">

<header class="sticky top-0 z-50 bg-background-dark/80 ios-blur border-b border-white/10 px-4 py-3 flex items-center justify-between">
    <button onclick="alert('Menú Tiendas')" class="p-2 text-brand-blue">
        <span class="material-symbols-outlined text-3xl">menu</span>
    </button>
    
    <div class="text-center">
        <h1 class="text-[10px] font-black uppercase tracking-[0.3em] text-gradient">Kilómetro Cero</h1>
        <p class="text-xs font-bold text-white uppercase">Engine Tiendas</p>
    </div>

    <div class="flex items-center gap-2">
        <button class="size-9 rounded-full gradient-brand flex items-center justify-center shadow-lg shadow-brand-fuchsia/20">
            <span class="material-symbols-outlined text-white text-xl">add</span>
        </button>
    </div>
</header>

<main class="p-4 space-y-6">
    <div class="relative group">
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-brand-blue">search</span>
        <input type="text" placeholder="BUSCAR COMERCIO..." class="w-full bg-surface-dark border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-[10px] font-black tracking-widest focus:border-brand-fuchsia outline-none uppercase text-white transition-all">
    </div>

    <section class="space-y-4">
        <div class="flex items-center justify-between px-1">
            <h2 class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500">Partners Activos</h2>
            <span class="text-[9px] font-bold text-brand-fuchsia uppercase">Filtros +</span>
        </div>

        <div class="bg-surface-dark border border-white/10 rounded-[2rem] p-5 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 h-1 w-20 gradient-brand"></div>
            
            <div class="flex justify-between items-start mb-6">
                <div class="flex gap-4">
                    <div class="size-14 rounded-2xl gradient-brand p-[1px]">
                        <div class="w-full h-full bg-surface-dark rounded-2xl flex items-center justify-center">
                            <span class="material-symbols-outlined text-brand-fuchsia text-3xl filled">storefront</span>
                        </div>
                    </div>
                    <div>
                        <h4 class="font-black text-base uppercase tracking-tighter text-white">Pizzería Napoli</h4>
                        <p class="text-[10px] text-brand-blue font-bold tracking-widest uppercase">ID: 20601234</p>
                    </div>
                </div>
                <span class="bg-green-500/10 text-green-400 text-[8px] font-black px-2 py-1 rounded border border-green-500/20 uppercase">Online</span>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-black/20 p-3 rounded-xl">
                    <p class="text-[8px] text-slate-500 uppercase font-black mb-1">Comisión</p>
                    <p class="text-lg font-black text-white">12.5%</p>
                </div>
                <div class="bg-black/20 p-3 rounded-xl">
                    <p class="text-[8px] text-slate-500 uppercase font-black mb-1">Ventas Hoy</p>
                    <p class="text-lg font-black text-brand-fuchsia">$420.00</p>
                </div>
            </div>

            <button class="w-full py-4 gradient-brand rounded-2xl text-[11px] font-black uppercase tracking-[0.2em] text-white shadow-xl shadow-brand-blue/20 active:scale-95 transition-transform">
                Gestionar Comercio
            </button>
        </div>
    </section>
</main>

<nav class="fixed bottom-0 left-0 right-0 bg-background-dark/95 ios-blur border-t border-white/10 px-2 pb-6 pt-2 z-50">
    <div class="flex justify-between items-center max-w-lg mx-auto">
        <a class="flex flex-1 flex-col items-center gap-1 text-slate-500" href="dashboard.html">
            <span class="material-symbols-outlined text-[24px]">dashboard</span>
            <span class="text-[9px] font-black uppercase">Panel</span>
        </a>
        <a class="flex flex-1 flex-col items-center gap-1 text-brand-fuchsia" href="tiendas.html">
            <span class="material-symbols-outlined text-[24px] filled">storefront</span>
            <span class="text-[9px] font-black uppercase">Tiendas</span>
        </a>
        <a class="flex flex-1 flex-col items-center gap-1 text-slate-500" href="motorizados.html">
            <span class="material-symbols-outlined text-[24px]">pedal_bike</span>
            <span class="text-[9px] font-black uppercase">Flota</span>
        </a>
        <a class="flex flex-1 flex-col items-center gap-1 text-slate-500" href="pedidos.html">
            <span class="material-symbols-outlined text-[24px]">package_2</span>
            <span class="text-[9px] font-black uppercase">Pedidos</span>
        </a>
        <a class="flex flex-1 flex-col items-center gap-1 text-slate-500" href="configuracion.html">
            <span class="material-symbols-outlined text-[24px]">tune</span>
            <span class="text-[9px] font-black uppercase">Motor</span>
        </a>
    </div>
</nav>

</body>
</html>
