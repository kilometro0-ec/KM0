<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Dashboard Admin - KM0</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df26c", // Verde Admin
                        "background-dark": "#0d140a",
                        "surface-dark": "#162512",
                    },
                    fontFamily: { "display": ["Space Grotesk", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0d140a; color: white; -webkit-tap-highlight-color: transparent; }
        .ios-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0; }
        .filled { font-variation-settings: 'FILL' 1; }
        .spin-anim:active { transform: rotate(180deg); transition: 0.4s; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-24">

<header class="sticky top-0 z-50 bg-background-dark/80 ios-blur border-b border-primary/20 px-4 py-3">
    <div class="flex items-center justify-between">
        <button onclick="toggleExtraMenu()" class="p-2 text-primary">
            <span class="material-symbols-outlined text-3xl">menu</span>
        </button>

        <div class="text-center">
            <h1 class="text-[10px] font-black uppercase tracking-[0.3em] text-primary">Kilómetro Cero</h1>
            <p class="text-xs font-bold text-white uppercase">Panel Principal</p>
        </div>

        <div class="flex items-center gap-1">
            <button onclick="fetchData()" class="p-2 text-slate-400 spin-anim">
                <span class="material-symbols-outlined text-2xl">refresh</span>
            </button>
            <button onclick="cerrarSesion()" class="p-2 text-red-500">
                <span class="material-symbols-outlined text-2xl">logout</span>
            </button>
        </div>
    </div>
</header>

<main class="p-4 space-y-6">
    <div class="bg-surface-dark border border-primary/10 rounded-2xl p-6 shadow-lg">
        <div class="flex justify-between items-center mb-2">
            <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">Ingresos Proyectados</p>
            <span class="material-symbols-outlined text-primary filled">payments</span>
        </div>
        <div class="flex items-baseline gap-2">
            <h2 id="total-ventas" class="text-4xl font-black">$0.00</h2>
            <span class="text-[10px] text-primary font-bold">+12% hoy</span>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div class="bg-surface-dark border border-white/5 rounded-2xl p-4">
            <p class="text-[9px] font-black uppercase text-slate-500 mb-1">Solicitudes</p>
            <div class="flex items-center justify-between">
                <span id="total-pendientes" class="text-2xl font-black">0</span>
                <span class="material-symbols-outlined text-primary">person_add</span>
            </div>
        </div>
        <div class="bg-surface-dark border border-white/5 rounded-2xl p-4">
            <p class="text-[9px] font-black uppercase text-slate-500 mb-1">Alertas Motor</p>
            <div class="flex items-center justify-between">
                <span id="total-alertas" class="text-2xl font-black">0</span>
                <span class="material-symbols-outlined text-orange-500">warning</span>
            </div>
        </div>
    </div>

    <section class="space-y-4">
        <div class="flex items-center justify-between px-1">
            <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-500">Pendientes de Aprobación</h3>
            <a href="gestion-usuarios.html" class="text-[10px] font-black text-primary uppercase">Ver todos</a>
        </div>
        
        <div class="bg-surface-dark border border-white/5 rounded-2xl overflow-hidden divide-y divide-white/5" id="lista-dashboard">
            <div class="p-8 text-center">
                <div class="inline-block size-6 border-2 border-primary/30 border-t-primary rounded-full animate-spin"></div>
                <p class="text-[10px] text-slate-500 mt-2 uppercase font-black tracking-widest">Sincronizando Engine...</p>
            </div>
        </div>
    </section>
</main>

<nav class="fixed bottom-0 left-0 right-0 bg-background-dark/95 ios-blur border-t border-white/10 px-2 pb-6 pt-2 z-50">
    <div class="flex justify-between items-center max-w-lg mx-auto">
        <a class="flex flex-1 flex-col items-center gap-1 text-primary transition-colors" href="dashboard.html">
            <span class="material-symbols-outlined text-[24px] filled">dashboard</span>
            <span class="text-[9px] font-black uppercase">Panel</span>
        </a>
        <a class="flex flex-1 flex-col items-center gap-1 text-slate-500 transition-colors" href="tiendas.html">
            <span class="material-symbols-outlined text-[24px]">storefront</span>
            <span class="text-[9px] font-black uppercase">Tiendas</span>
        </a>
        <a class="flex flex-1 flex-col items-center gap-1 text-slate-500 transition-colors" href="motorizados.html">
            <span class="material-symbols-outlined text-[24px]">pedal_bike</span>
            <span class="text-[9px] font-black uppercase">Flota</span>
        </a>
        <a class="flex flex-1 flex-col items-center gap-1 text-slate-500 transition-colors" href="pedidos.html">
            <span class="material-symbols-outlined text-[24px]">receipt_long</span>
            <span class="text-[9px] font-black uppercase">Pedidos</span>
        </a>
        <a class="flex flex-1 flex-col items-center gap-1 text-slate-500 transition-colors" href="configuracion.html">
            <span class="material-symbols-outlined text-[24px]">tune</span>
            <span class="text-[9px] font-black uppercase">Ajustes</span>
        </a>
    </div>
</nav>

<script>
    // Lógica de Datos y Sesión
    function cerrarSesion() {
        if(confirm("¿Cerrar sesión del Panel Administrativo?")) {
            localStorage.clear();
            window.location.href = '../auth/login.html';
        }
    }

    function toggleExtraMenu() {
        // Aquí podrías abrir un Sidebar o un Modal
        alert("Opciones de Sistema:\n1. Gestión de Usuarios\n2. Finanzas Globales\n3. Logs de Actividad");
    }

    async function fetchData() {
        const listado = document.getElementById('lista-dashboard');
        // Simulación de carga desde API_URL (Google Sheets)
        try {
            // Aquí iría tu fetch real: const res = await fetch(API_URL);
            setTimeout(() => {
                document.getElementById('total-pendientes').innerText = "5";
                document.getElementById('total-ventas').innerText = "$1,240.50";
                document.getElementById('total-alertas').innerText = "2";

                listado.innerHTML = `
                    <div class="p-4 flex items-center justify-between">
                        <div>
                            <p class="text-sm font-bold">Market San Juan</p>
                            <p class="text-[9px] text-primary uppercase font-bold">Solicitud: Tienda</p>
                        </div>
                        <button class="bg-primary/10 text-primary px-3 py-1 rounded-full text-[10px] font-black uppercase">Ver</button>
                    </div>
                    <div class="p-4 flex items-center justify-between">
                        <div>
                            <p class="text-sm font-bold">Carlos Rodríguez</p>
                            <p class="text-[9px] text-primary uppercase font-bold">Solicitud: Motorizado</p>
                        </div>
                        <button class="bg-primary/10 text-primary px-3 py-1 rounded-full text-[10px] font-black uppercase">Ver</button>
                    </div>
                `;
            }, 1000);
        } catch (e) {
            console.error(e);
        }
    }

    document.addEventListener('DOMContentLoaded', fetchData);
</script>

</body>
</html>
