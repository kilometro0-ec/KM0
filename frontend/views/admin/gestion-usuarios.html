<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Admin: Control de Usuarios y Flota</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    
    <script src="frontend/assets/js/config.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#56f91f",
                        "accent-cyan": "#00f5ff",
                        "background-light": "#f6f8f5",
                        "background-dark": "#14230f",
                    },
                    fontFamily: { "display": ["Manrope", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Manrope', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen pb-24">

<header class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-primary/10">
    <div class="flex items-center p-4 justify-between">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary">menu</span>
            <h1 class="text-lg font-extrabold tracking-tight">Gestión de Usuarios</h1>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="init()" class="p-2 rounded-full hover:bg-primary/10 transition-colors text-primary">
                <span class="material-symbols-outlined">sync</span>
            </button>
            <div class="relative">
                <span id="notif-badge" class="absolute top-0 right-0 h-2.5 w-2.5 rounded-full bg-primary ring-2 ring-background-dark hidden"></span>
                <span class="material-symbols-outlined">notifications</span>
            </div>
        </div>
    </div>
    <div class="px-4">
        <div class="flex gap-8 border-b border-slate-200 dark:border-primary/5">
            <button onclick="cambiarTab('motorizados')" id="tab-moto" class="border-b-2 border-primary text-primary pb-3 pt-2 text-sm font-bold">Motorizados</button>
            <button onclick="cambiarTab('tiendas')" id="tab-tienda" class="border-b-2 border-transparent text-slate-500 pb-3 pt-2 text-sm font-bold">Tiendas</button>
        </div>
    </div>
</header>

<main id="main-content" class="p-4 space-y-4">
    <div class="flex flex-col items-center justify-center py-20 text-slate-500">
        <span class="material-symbols-outlined animate-spin text-4xl mb-2 text-primary">sync</span>
        <p class="text-xs font-bold uppercase tracking-widest">Sincronizando con Google Sheets...</p>
    </div>
</main>

<nav class="fixed bottom-0 left-0 right-0 z-50 bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl border-t border-slate-200 dark:border-primary/10 px-4 pb-6 pt-2">
    <div class="flex justify-between items-center max-w-lg mx-auto">
        <a class="flex flex-col items-center gap-1 text-primary" href="#"><span class="material-symbols-outlined">group</span><span class="text-[10px] font-bold uppercase">Usuarios</span></a>
        <a class="flex flex-col items-center gap-1 text-slate-400" href="#"><span class="material-symbols-outlined">two_wheeler</span><span class="text-[10px] font-bold uppercase">Flota</span></a>
        <a class="flex flex-col items-center gap-1 text-slate-400" href="#"><span class="material-symbols-outlined">verified_user</span><span class="text-[10px] font-bold uppercase">Auditoría</span></a>
        <a class="flex flex-col items-center gap-1 text-slate-400" href="#"><span class="material-symbols-outlined">settings</span><span class="text-[10px] font-bold uppercase">Ajustes</span></a>
    </div>
</nav>

<script>
    let db = { motorizados: [], tiendas: [] };
    let currentTab = 'motorizados';

    async function init() {
        // Verificar que API_URL existe desde config.js
        if (typeof API_URL === 'undefined') {
            document.getElementById('main-content').innerHTML = `
                <div class="p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-500 text-xs font-bold text-center">
                    ERROR: No se encontró el archivo config.js o la API_URL
                </div>`;
            return;
        }

        try {
            const res = await fetch(API_URL);
            db = await res.json();
            render();
        } catch (e) {
            document.getElementById('main-content').innerHTML = `<p class="text-center py-10 text-red-500 text-xs font-bold uppercase">Error de Conexión</p>`;
        }
    }

    function render() {
        const container = document.getElementById('main-content');
        container.innerHTML = "";
        const list = currentTab === 'motorizados' ? (db.motorizados || []) : (db.tiendas || []);

        if(list.length === 0) {
            container.innerHTML = `<p class="text-center py-10 text-slate-500 text-xs font-bold uppercase tracking-widest">No hay registros</p>`;
            return;
        }

        list.forEach(item => {
            const esMoto = currentTab === 'motorizados';
            const nombre = item.nombre || item.nombreTienda || "Sin Nombre";
            const idDoc = item.cedula || item.id || "KM0-000";
            
            // TU DISEÑO ORIGINAL DE TARJETA
            container.innerHTML += `
            <div class="rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-primary/5 overflow-hidden shadow-sm p-4">
                <div class="flex gap-4">
                    <div class="relative size-16 shrink-0">
                        ${esMoto ? 
                            `<img class="size-16 rounded-lg object-cover grayscale" src="https://ui-avatars.com/api/?name=${nombre}&background=56f91f&color=14230f">` :
                            `<div class="size-16 rounded-lg bg-primary/20 flex items-center justify-center text-primary"><span class="material-symbols-outlined text-3xl">store</span></div>`
                        }
                        <span class="absolute -bottom-1 -right-1 flex h-4 w-4 rounded-full bg-slate-400 border-2 border-white dark:border-slate-900"></span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-slate-900 dark:text-slate-50 truncate">${nombre}</h3>
                                <p class="text-xs text-slate-500 dark:text-slate-400">ID: ${idDoc} • ${item.ciudad || 'Sector'}</p>
                            </div>
                            <span class="material-symbols-outlined text-slate-400">hourglass_empty</span>
                        </div>
                        <div class="mt-2 bg-slate-100 dark:bg-slate-800 rounded-lg h-2 w-full overflow-hidden">
                            <div class="bg-primary h-full w-1/2 rounded-full"></div>
                        </div>
                    </div>
                </div>
                <div class="mt-4 flex gap-2">
                    <button onclick="window.open('https://wa.me/${item.telefono}')" class="flex-1 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 h-9 rounded-lg text-xs font-bold uppercase">WhatsApp</button>
                    <button onclick="aprobar('${item.id}', '${item.telefono}', '${nombre}', '${item.password}', '${idDoc}')" class="flex-1 bg-accent-cyan/10 text-accent-cyan border border-accent-cyan/20 h-9 rounded-lg text-xs font-bold uppercase">Aprobar</button>
                </div>
            </div>`;
        });
    }

    async function aprobar(id, telf, nombre, pass, user) {
        if(!confirm(`¿Aprobar a ${nombre}?`)) return;
        const msg = `*KM0 - ACCESO*%0A👤 *User:* ${user}%0A🔑 *Pass:* ${pass}`;
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ accion: "gestionar_solicitud", id, nuevoEstado: "ACTIVO" }) });
        window.open(`https://api.whatsapp.com/send?phone=${telf}&text=${msg}`, '_blank');
        init();
    }

    function cambiarTab(tab) {
        currentTab = tab;
        document.getElementById('tab-moto').className = tab === 'motorizados' ? 'border-b-2 border-primary text-primary pb-3 pt-2 text-sm font-bold' : 'border-b-2 border-transparent text-slate-500 pb-3 pt-2 text-sm font-bold';
        document.getElementById('tab-tienda').className = tab === 'tiendas' ? 'border-b-2 border-primary text-primary pb-3 pt-2 text-sm font-bold' : 'border-b-2 border-transparent text-slate-500 pb-3 pt-2 text-sm font-bold';
        render();
    }

    init();
</script>
</body>
</html>
