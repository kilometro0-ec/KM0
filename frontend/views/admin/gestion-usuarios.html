<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Admin: Dashboard Gerencial 360</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <script src="frontend/assets/js/config.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#46f20d",
                        "secondary": "#00f5ff",
                        "background-light": "#f6f8f5",
                        "background-dark": "#0a0f08",
                    },
                    fontFamily: { "display": ["Space Grotesk", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Space Grotesk', sans-serif; }
        .glass-panel { background: rgba(70, 242, 13, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(70, 242, 13, 0.1); }
        .neon-border-cyan { border: 1px solid rgba(0, 245, 255, 0.3); box-shadow: 0 0 10px rgba(0, 245, 255, 0.1); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">

<header class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-primary/20 p-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
        <div class="p-2 rounded-lg bg-primary/10 border border-primary/30">
            <span class="material-symbols-outlined text-primary">hub</span>
        </div>
        <div>
            <h1 class="text-lg font-bold tracking-tight">Centro de Mando</h1>
            <p class="text-[10px] uppercase tracking-widest text-secondary font-semibold">Kilómetro Cero v3.0</p>
        </div>
    </div>
    <div class="flex items-center gap-2">
        <button onclick="fetchDashboardData()" class="p-2 rounded-full hover:bg-primary/10 text-primary">
            <span class="material-symbols-outlined">sync</span>
        </button>
        <div class="size-9 rounded-full bg-primary/20 border border-primary/40 overflow-hidden">
            <img src="https://ui-avatars.com/api/?name=Admin&background=0a0f08&color=46f20d" />
        </div>
    </div>
</header>

<main class="flex-1 overflow-y-auto pb-24">
    <section class="grid grid-cols-2 gap-3 p-4">
        <div class="glass-panel p-4 rounded-xl border-l-4 border-l-primary">
            <div class="flex items-center justify-between mb-2">
                <span class="material-symbols-outlined text-primary text-sm">payments</span>
                <span class="text-[10px] font-bold text-primary">+12.5%</span>
            </div>
            <p class="text-xs text-slate-500 font-medium">Ventas Hoy</p>
            <p id="metric-sales" class="text-xl font-bold mt-1">$0.00</p>
        </div>
        <div class="glass-panel p-4 rounded-xl border-l-4 border-l-secondary">
            <div class="flex items-center justify-between mb-2">
                <span class="material-symbols-outlined text-secondary text-sm">local_shipping</span>
                <span class="text-[10px] font-bold text-secondary uppercase">Activos</span>
            </div>
            <p class="text-xs text-slate-500 font-medium">Pedidos</p>
            <p id="metric-orders" class="text-xl font-bold mt-1">0</p>
        </div>
        </section>

    <section class="px-4 py-2">
        <div class="glass-panel p-5 rounded-xl neon-border-cyan relative overflow-hidden">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h2 class="text-sm font-bold text-white uppercase tracking-wider">Rendimiento de Flota</h2>
                    <p class="text-xs text-secondary opacity-80">Actividad 24h</p>
                </div>
                <p class="text-2xl font-bold text-primary">88%</p>
            </div>
            <div class="h-32 w-full">
                <svg class="w-full h-full" preserveAspectRatio="none" viewBox="0 0 400 120">
                    <path d="M0,100 Q40,40 80,80 T160,50 T240,90 T320,30 T400,60" fill="none" stroke="#46f20d" stroke-width="3" stroke-linecap="round"></path>
                </svg>
            </div>
        </div>
    </section>

    <section class="p-4 mt-2">
        <h2 class="text-base font-bold mb-4 flex items-center gap-2">
            <span class="material-symbols-outlined text-primary text-xl">priority_high</span>
            Feed de Prioridades
        </h2>
        <div id="priorities-feed" class="space-y-3">
            <div class="p-8 text-center text-slate-500 text-xs animate-pulse uppercase font-bold">
                Escaneando Red...
            </div>
        </div>
    </section>
</main>

<nav class="fixed bottom-0 left-0 right-0 z-50 bg-background-dark/95 backdrop-blur-xl border-t border-primary/10 pb-6 pt-2 px-4">
    <div class="flex items-center justify-around max-w-lg mx-auto">
        <a class="flex flex-col items-center gap-1 text-primary" href="#">
            <span class="material-symbols-outlined text-2xl">dashboard</span>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Panel</span>
        </a>
        <a class="flex flex-col items-center gap-1 text-slate-400" href="gestion-usuarios.html">
            <span class="material-symbols-outlined text-2xl">group</span>
            <span class="text-[10px] font-medium uppercase tracking-tighter">Usuarios</span>
        </a>
        <div class="relative -mt-10">
            <button class="size-14 rounded-full bg-primary text-black flex items-center justify-center shadow-[0_0_25px_rgba(70,242,13,0.4)] border-4 border-background-dark">
                <span class="material-symbols-outlined text-3xl font-bold">add</span>
            </button>
        </div>
        <a class="flex flex-col items-center gap-1 text-slate-400" href="#"><span class="material-symbols-outlined text-2xl">delivery_dining</span><span class="text-[10px] font-medium uppercase tracking-tighter">Flota</span></a>
        <a class="flex flex-col items-center gap-1 text-slate-400" href="#"><span class="material-symbols-outlined text-2xl">settings</span><span class="text-[10px] font-medium uppercase tracking-tighter">Ajustes</span></a>
    </div>
</nav>

<script>
    async function fetchDashboardData() {
        const feed = document.getElementById('priorities-feed');
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            // 1. Actualizar métricas ficticias basadas en datos reales
            document.getElementById('metric-sales').innerText = `$${(data.motorizados.length * 15.5).toFixed(2)}`;
            document.getElementById('metric-orders').innerText = data.motorizados.length + data.tiendas.length;

            // 2. Limpiar feed y meter solicitudes reales
            feed.innerHTML = "";
            const totalSolicitudes = [...data.motorizados, ...data.tiendas];

            if(totalSolicitudes.length === 0) {
                feed.innerHTML = `<p class="text-center text-slate-600 text-xs py-4 uppercase">No hay prioridades pendientes</p>`;
                return;
            }

            totalSolicitudes.forEach(item => {
                const esMoto = item.nombre !== undefined;
                const nombre = item.nombre || item.nombreTienda;
                
                feed.innerHTML += `
                <div class="flex items-start gap-3 p-4 bg-slate-900/50 rounded-xl border border-primary/10">
                    <div class="size-10 rounded-lg ${esMoto ? 'bg-primary/10' : 'bg-secondary/10'} flex items-center justify-center shrink-0 border border-white/5">
                        <span class="material-symbols-outlined ${esMoto ? 'text-primary' : 'text-secondary'}">${esMoto ? 'moped' : 'storefront'}</span>
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center justify-between">
                            <h3 class="text-sm font-bold">${nombre}</h3>
                            <span class="text-[10px] px-2 py-0.5 rounded-full bg-primary/20 text-primary">NUEVO</span>
                        </div>
                        <p class="text-xs text-slate-500 mt-1">Solicitud de ingreso zona: ${item.ciudad || 'Pendiente'}</p>
                        <div class="mt-3 flex gap-2">
                            <button onclick="window.location.href='gestion-usuarios.html'" class="flex-1 py-1.5 rounded bg-primary text-black text-[10px] font-bold uppercase tracking-wider">Gestionar</button>
                        </div>
                    </div>
                </div>`;
            });

        } catch (e) {
            feed.innerHTML = `<p class="text-red-500 text-center text-xs">Error de conexión con la hoja de solicitudes</p>`;
        }
    }

    // Cargar al iniciar
    document.addEventListener('DOMContentLoaded', fetchDashboardData);
</script>
</body>
</html>
