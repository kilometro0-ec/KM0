<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KM0 - Gestión de Flota (Admin)</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF0000", // ROJO PURO
                        "background-dark": "#1a0505",
                        "surface-dark": "#2d0a0a",
                    },
                    fontFamily: { "display": ["Space Grotesk", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #1a0505; color: white; -webkit-tap-highlight-color: transparent; }
        .ios-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0; }
        .filled { font-variation-settings: 'FILL' 1; }
        .neon-red { text-shadow: 0 0 15px rgba(255, 0, 0, 0.5); }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-28">

<header class="sticky top-0 z-50 bg-background-dark/80 ios-blur border-b border-primary/30 px-4 py-3">
    <div class="flex items-center justify-between">
        <button onclick="alert('Menú de Opciones')" class="p-2 text-primary">
            <span class="material-symbols-outlined text-3xl">menu</span>
        </button>

        <div class="text-center">
            <h1 class="text-[10px] font-black uppercase tracking-[0.3em] text-primary neon-red">Kilómetro Cero</h1>
            <p class="text-xs font-bold text-white uppercase">Gestión de Flota</p>
        </div>

        <div class="flex items-center gap-1">
            <button onclick="window.location.reload()" class="p-2 text-slate-400">
                <span class="material-symbols-outlined text-2xl">refresh</span>
            </button>
            <button onclick="confirmExit()" class="p-2 text-primary">
                <span class="material-symbols-outlined text-2xl">logout</span>
            </button>
        </div>
    </div>
</header>

<main class="p-4 space-y-6">
    <div class="grid grid-cols-2 gap-3">
        <div class="bg-surface-dark border border-primary/20 rounded-2xl p-4">
            <span class="material-symbols-outlined text-primary mb-1">bolt</span>
            <p class="text-2xl font-black">24</p>
            <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest">Activos</p>
        </div>
        <div class="bg-surface-dark border border-primary/20 rounded-2xl p-4">
            <span class="material-symbols-outlined text-primary mb-1">route</span>
            <p class="text-2xl font-black">18</p>
            <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest">En Ruta</p>
        </div>
    </div>

    <section class="space-y-3">
        <h2 class="text-[10px] font-black uppercase tracking-widest text-slate-500 px-1">Monitoreo Real-Time</h2>
        
        <div class="bg-surface-dark border border-primary/10 rounded-2xl overflow-hidden">
            <div class="p-4 flex items-center justify-between border-b border-white/5">
                <div class="flex items-center gap-3">
                    <div class="size-12 rounded-xl border border-primary/40 p-0.5">
                        <img src="https://ui-avatars.com/api/?name=Carlos+M&background=FF0000&color=fff" class="rounded-lg w-full h-full">
                    </div>
                    <div>
                        <h3 class="font-bold text-sm uppercase">Carlos Mendoza</h3>
                        <p class="text-[9px] text-primary font-bold uppercase tracking-tighter">Yamaha FZ-25 • ABC-1234</p>
                    </div>
                </div>
                <span class="material-symbols-outlined text-primary animate-pulse">location_searching</span>
            </div>
            <div class="p-3 bg-black/20 flex gap-2">
                <button class="flex-1 bg-white/5 text-slate-300 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">Detalles</button>
                <button class="flex-1 bg-primary text-white py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-primary/30">Rastrear</button>
            </div>
        </div>
    </section>
</main>

<nav class="fixed bottom-0 left-0 right-0 bg-background-dark/95 ios-blur border-t border-white/10 px-2 pb-6 pt-2 z-50">
    <div class="flex justify-between items-center max-w-lg mx-auto">
        <a class="flex flex-1 flex-col items-center gap-1 text-slate-500" href="dashboard.html">
            <span class="material-symbols-outlined text-[24px]">dashboard</span>
            <span class="text-[9px] font-black uppercase">Panel</span>
        </a>
        <a class="flex flex-1 flex-col items-center gap-1 text-slate-500" href="tiendas.html">
            <span class="material-symbols-outlined text-[24px]">storefront</span>
            <span class="text-[9px] font-black uppercase">Tiendas</span>
        </a>
        <a class="flex flex-1 flex-col items-center gap-1 text-primary" href="motorizados.html">
            <span class="material-symbols-outlined text-[24px] filled">pedal_bike</span>
            <span class="text-[9px] font-black uppercase">Flota</span>
        </a>
        <a class="flex flex-1 flex-col items-center gap-1 text-slate-500" href="pedidos.html">
            <span class="material-symbols-outlined text-[24px]">receipt_long</span>
            <span class="text-[9px] font-black uppercase">Pedidos</span>
        </a>
        <a class="flex flex-1 flex-col items-center gap-1 text-slate-500" href="configuracion.html">
            <span class="material-symbols-outlined text-[24px]">tune</span>
            <span class="text-[9px] font-black uppercase">Ajustes</span>
        </a>
    </div>
</nav>

<script>
    function confirmExit() {
        if(confirm("¿Cerrar sesión administrativa?")) window.location.href = "../auth/login.html";
    }
</script>

</body>
</html>
