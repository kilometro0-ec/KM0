<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Configuración Avanzada - KM0</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <script src="../../assets/js/config.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#46f20d",
                        "accent-cyan": "#00f5ff",
                        "background-dark": "#142210",
                        "surface-dark": "#1e2b1a",
                        "border-dark": "#2c3e27",
                    },
                    fontFamily: { "display": ["Space Grotesk", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #142210; color: white; }
        .neon-border { box-shadow: 0 0 15px rgba(70, 242, 13, 0.1); }
        input[type="checkbox"]:checked { background-color: #46f20d; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-32">

<header class="sticky top-0 z-50 bg-background-dark/90 backdrop-blur-md border-b border-border-dark px-4 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
        <div class="relative group">
            <img id="admin-photo" src="https://ui-avatars.com/api/?name=Admin+KM0&background=1e2b1a&color=46f20d" class="size-12 rounded-full border-2 border-primary object-cover">
            <label for="upload-photo" class="absolute bottom-0 right-0 size-5 bg-primary rounded-full flex items-center justify-center cursor-pointer border-2 border-background-dark">
                <span class="material-symbols-outlined text-[10px] text-black font-bold">edit</span>
            </label>
            <input type="file" id="upload-photo" class="hidden" accept="image/*" onchange="previewImage(event)">
        </div>
        <div>
            <h1 class="text-sm font-black uppercase tracking-tighter">Motor Control Center</h1>
            <p class="text-[9px] uppercase tracking-[0.3em] text-primary font-bold">Identidad & Operaciones</p>
        </div>
    </div>
</header>

<main class="p-4 space-y-8">
    
    <section class="space-y-4">
        <div class="flex items-center justify-between px-1">
            <h2 class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500">Horario de Operación</h2>
            <span class="text-[9px] bg-red-500/10 text-red-500 px-2 py-0.5 rounded border border-red-500/20 font-bold uppercase">Feriados: Cerrado</span>
        </div>

        <div class="bg-surface-dark border border-border-dark rounded-2xl overflow-hidden shadow-2xl">
            <div id="schedule-list" class="divide-y divide-border-dark">
                <script>
                    const dias = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
                    dias.forEach(dia => {
                        document.write(`
                            <div class="p-4 flex items-center justify-between">
                                <div class="flex items-center gap-3">
                                    <span class="text-xs font-bold w-16 text-slate-300">${dia}</span>
                                    <input type="time" value="08:00" class="bg-transparent border-none text-primary text-xs font-bold focus:ring-0 p-0">
                                    <span class="text-slate-600 text-[10px]">A</span>
                                    <input type="time" value="22:00" class="bg-transparent border-none text-primary text-xs font-bold focus:ring-0 p-0">
                                </div>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" checked class="sr-only peer">
                                    <div class="w-8 h-4 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-primary"></div>
                                </label>
                            </div>
                        `);
                    });
                </script>
            </div>
        </div>
    </section>

    <section class="space-y-3">
        <h2 class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500 ml-1">Suspensión por Feriado</h2>
        <div class="bg-red-500/5 border border-red-500/20 rounded-2xl p-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-red-500">event_busy</span>
                <div>
                    <p class="text-xs font-bold text-white uppercase tracking-tighter">Apagado de Emergencia</p>
                    <p class="text-[9px] text-red-500 font-medium">Deshabilita el motor para todas las tiendas hoy.</p>
                </div>
            </div>
            <button onclick="toggleEmergencyStop()" id="emergency-btn" class="px-4 py-2 bg-red-600 text-white text-[10px] font-black rounded-lg uppercase shadow-lg shadow-red-900/40">APAGAR</button>
        </div>
    </section>

    <section class="space-y-4">
        <h2 class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500 ml-1">Finanzas KM0</h2>
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-surface-dark border border-border-dark rounded-2xl p-4 text-center">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Cobra KM0</p>
                <p class="text-xl font-black text-primary">$4.00</p>
            </div>
            <div class="bg-surface-dark border border-border-dark rounded-2xl p-4 text-center">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Gana Motorizado</p>
                <p class="text-xl font-black text-accent-cyan">$2.75</p>
            </div>
        </div>
    </section>

</main>

<nav class="fixed bottom-0 left-0 right-0 bg-background-dark/95 backdrop-blur-xl border-t border-border-dark px-2 pb-6 pt-2 z-50">
    <div class="flex justify-around items-center">
        <a class="flex flex-col items-center gap-1 px-4 py-2 text-slate-500" href="dashboard.html">
            <span class="material-symbols-outlined text-[28px]">dashboard</span>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Panel</span>
        </a>
        <div class="relative -top-6">
            <button onclick="guardarConfiguracion()" class="size-16 bg-primary rounded-full flex items-center justify-center text-background-dark shadow-[0_0_20px_rgba(70,242,13,0.4)] border-4 border-background-dark active:scale-95 transition-all">
                <span class="material-symbols-outlined text-3xl font-black">cloud_upload</span>
            </button>
        </div>
        <a class="flex flex-col items-center gap-1 px-4 py-2 text-primary" href="#">
            <span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1">tune</span>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Ajustes</span>
        </a>
    </div>
</nav>

<script>
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function(){
            const output = document.getElementById('admin-photo');
            output.src = reader.result;
        };
        reader.readAsDataURL(event.target.files[0]);
    }

    let isStopped = false;
    function toggleEmergencyStop() {
        const btn = document.getElementById('emergency-btn');
        isStopped = !isStopped;
        if(isStopped) {
            btn.innerText = "ENCENDER";
            btn.classList.replace('bg-red-600', 'bg-green-600');
            alert("⚠️ EL MOTOR HA SIDO APAGADO. Ninguna tienda podrá solicitar pedidos.");
        } else {
            btn.innerText = "APAGAR";
            btn.classList.replace('bg-green-600', 'bg-red-600');
            alert("✅ MOTOR REINICIADO. Operaciones normales habilitadas.");
        }
    }

    async function guardarConfiguracion() {
        const btn = event.currentTarget;
        btn.classList.add('animate-spin');
        
        // Simulación de envío a Google Sheets (aquí mapearías los valores de los horarios)
        setTimeout(() => {
            btn.classList.remove('animate-spin');
            alert("🚀 CONFIGURACIÓN GLOBAL SINCRONIZADA\nHorarios y ajustes actualizados en la nube.");
        }, 1500);
    }
</script>

</body>
</html>
