<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Motor Sync - KM0</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-green": "#12c965", 
                        "shop-blue": "#0066FF",      
                        "background-dark": "#0a0f0c",
                        "surface-dark": "#121a15",
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0a0f0c; color: white; -webkit-tap-highlight-color: transparent; }
        .ios-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .neon-glow-green { box-shadow: 0 0 20px rgba(18, 201, 101, 0.15); }
        input[type=range] { appearance: none; width: 100%; background: #1e2923; height: 8px; border-radius: 10px; outline: none; }
        .slider-blue::-webkit-slider-thumb { appearance: none; background: #0066FF; height: 22px; width: 22px; border-radius: 50%; border: 3px solid #0a0f0c; }
        .slider-green::-webkit-slider-thumb { appearance: none; background: #12c965; height: 22px; width: 22px; border-radius: 50%; border: 3px solid #0a0f0c; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-32">

<header class="sticky top-0 z-50 bg-background-dark/80 ios-blur border-b border-white/10 px-4 py-4">
    <div class="flex items-center justify-between max-w-lg mx-auto">
        <div class="flex items-center gap-3">
            <div class="size-10 rounded-full bg-primary-green/20 flex items-center justify-center border border-primary-green/40">
                <span class="material-symbols-outlined text-primary-green animate-pulse">sync</span>
            </div>
            <div>
                <h1 class="text-[10px] font-black uppercase tracking-[0.2em] text-primary-green">KM0 Intelligence</h1>
                <p class="text-xs font-bold text-white">SINCRO GOOGLE CALENDAR</p>
            </div>
        </div>
    </div>
</header>

<main class="p-4 space-y-6 max-w-lg mx-auto w-full">

    <section class="bg-surface-dark border border-white/5 rounded-3xl p-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Google_Calendar_icon_%282020%29.svg" class="w-6 h-6">
            <div>
                <p class="text-[10px] font-black text-slate-500 uppercase">Google API Status</p>
                <p id="calendar-status" class="text-xs font-bold text-primary-green">Sincronizado correctamente</p>
            </div>
        </div>
        <button onclick="syncCalendar()" class="bg-primary-green/10 p-2 rounded-lg text-primary-green active:scale-90 transition-transform">
            <span class="material-symbols-outlined">sync_lock</span>
        </button>
    </section>

    <section class="bg-surface-dark border border-shop-blue/30 rounded-[2.5rem] p-6 shadow-xl">
        <div class="flex justify-between items-start mb-4">
            <div>
                <h3 class="text-[10px] font-black text-shop-blue uppercase tracking-widest">COMISIÓN_KM0</h3>
                <p class="text-4xl font-black">$ <span id="val-tienda">2.50</span></p>
            </div>
            <span class="material-symbols-outlined text-shop-blue/30 text-4xl">storefront</span>
        </div>
        <input type="range" id="input-tienda" min="0" max="10" step="0.5" value="2.50" class="slider-blue" oninput="updateUI()">
    </section>

    <section class="bg-surface-dark border border-primary-green/30 rounded-[2.5rem] p-6 shadow-xl neon-glow-green">
        <div class="flex justify-between items-start mb-4">
            <div>
                <h3 class="text-[10px] font-black text-primary-green uppercase tracking-widest">PAGO_MOTORIZADO</h3>
                <p class="text-4xl font-black">$ <span id="val-driver">1.50</span></p>
            </div>
            <span class="material-symbols-outlined text-primary-green/30 text-4xl">motorcycle</span>
        </div>
        <input type="range" id="input-driver" min="0" max="10" step="0.5" value="1.50" class="slider-green" oninput="updateUI()">
    </section>

    <div class="bg-black/40 border border-white/5 rounded-2xl p-4 flex justify-between items-center">
        <div>
            <p class="text-[9px] font-black text-slate-500 uppercase">Utilidad por Pedido</p>
            <p class="text-2xl font-black text-white">$ <span id="val-utilidad">1.00</span></p>
        </div>
        <div class="text-right">
            <span class="text-[10px] font-bold text-primary-green bg-primary-green/10 px-2 py-1 rounded">Auto-Cálculo Activo</span>
        </div>
    </div>

    <button onclick="saveAndSync()" class="w-full py-5 bg-primary-green text-black rounded-[2rem] font-black uppercase tracking-[0.2em] shadow-lg shadow-primary-green/20 active:scale-95 transition-all">
        Sincronizar Pedidos & Calendario
    </button>

</main>

<nav class="fixed bottom-0 left-0 right-0 bg-background-dark/95 ios-blur border-t border-white/10 px-2 pb-8 pt-2 z-50">
    <div class="flex justify-between items-center max-w-lg mx-auto">
        <a class="flex flex-1 flex-col items-center gap-1 text-slate-500" href="dashboard.html"><span class="material-symbols-outlined">dashboard</span><span class="text-[9px] font-bold">PANEL</span></a>
        <a class="flex flex-1 flex-col items-center gap-1 text-slate-500" href="pedidos.html"><span class="material-symbols-outlined">receipt_long</span><span class="text-[9px] font-bold">PEDIDOS</span></a>
        <a class="flex flex-1 flex-col items-center gap-1 text-primary-green" href="configuracion.html"><span class="material-symbols-outlined filled">calendar_month</span><span class="text-[9px] font-bold">MOTOR</span></a>
    </div>
</nav>

<script>
    function updateUI() {
        const t = parseFloat(document.getElementById('input-tienda').value);
        const d = parseFloat(document.getElementById('input-driver').value);
        document.getElementById('val-tienda').innerText = t.toFixed(2);
        document.getElementById('val-driver').innerText = d.toFixed(2);
        document.getElementById('val-utilidad').innerText = (t - d).toFixed(2);
    }

    async function syncCalendar() {
        document.getElementById('calendar-status').innerText = "Sincronizando...";
        // Simulación de llamado a Google Apps Script
        setTimeout(() => {
            document.getElementById('calendar-status').innerText = "Horarios de Google Calendar Importados";
            alert("Los horarios operativos ahora se rigen por tu calendario de Google.");
        }, 1500);
    }

    function saveAndSync() {
        const payload = {
            comision: document.getElementById('val-tienda').innerText,
            pago: document.getElementById('val-driver').innerText,
            utilidad: document.getElementById('val-utilidad').innerText,
            timestamp: new Date().toISOString()
        };
        console.log("Enviando a Hoja PEDIDOS:", payload);
        alert("✅ Datos guardados en hoja PEDIDOS y Motor sincronizado con Calendario.");
    }
</script>

</body>
</html>
