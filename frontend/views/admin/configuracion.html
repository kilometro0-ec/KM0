<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Configuración Engine - KM0</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#46f20d",
                        "background-dark": "#0d140a",
                        "surface-dark": "#162512",
                    },
                    fontFamily: { "display": ["Space Grotesk", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0d140a; color: white; -webkit-tap-highlight-color: transparent; }
        .ios-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0; }
        .filled { font-variation-settings: 'FILL' 1; }
        /* Animación sutil para el botón de actualizar */
        .spin-hover:active { transform: rotate(180deg); transition: 0.3s; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-24">

<header class="sticky top-0 z-50 bg-background-dark/80 ios-blur border-b border-primary/20 px-4 py-3">
    <div class="flex items-center justify-between">
        <button onclick="alert('Menú de Opciones Avanzadas')" class="p-2 text-primary">
            <span class="material-symbols-outlined text-3xl">menu</span>
        </button>

        <div class="text-center">
            <h1 class="text-[10px] font-black uppercase tracking-[0.3em] text-primary">Sistema KM0</h1>
            <p class="text-xs font-bold text-white">CONFIGURACIÓN</p>
        </div>

        <div class="flex items-center gap-1">
            <button onclick="window.location.reload()" class="p-2 text-slate-400 spin-hover">
                <span class="material-symbols-outlined text-2xl">refresh</span>
            </button>
            <button onclick="confirmExit()" class="p-2 text-red-500">
                <span class="material-symbols-outlined text-2xl">logout</span>
            </button>
        </div>
    </div>
</header>

<main class="p-4 space-y-6">
    <div class="bg-surface-dark border border-primary/10 rounded-2xl p-4 flex items-center gap-4 shadow-lg">
        <div class="size-14 rounded-full border-2 border-primary/30 p-1">
            <img src="https://ui-avatars.com/api/?name=Admin&background=46f20d&color=000" class="rounded-full">
        </div>
        <div>
            <h2 class="font-bold text-base">Super Administrador</h2>
            <p class="text-[9px] text-primary font-black uppercase tracking-widest">Estado: En Línea</p>
        </div>
    </div>

    <section class="space-y-3">
        <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-500 px-1">Horarios Operativos</h3>
        <div class="bg-surface-dark border border-white/5 rounded-2xl overflow-hidden divide-y divide-white/5" id="lista-horarios">
            </div>
    </section>

    <button class="w-full py-4 bg-primary/10 border border-primary/30 text-primary rounded-xl font-black uppercase tracking-widest active:bg-primary active:text-black transition-all">
        Sincronizar Datos
    </button>
</main>

<nav class="fixed bottom-0 left-0 right-0 bg-background-dark/95 ios-blur border-t border-white/10 px-2 pb-6 pt-2 z-50">
    <div class="flex justify-between items-center max-w-lg mx-auto">
        <a class="flex flex-1 flex-col items-center gap-1 text-slate-500 transition-colors" href="dashboard.html">
            <span class="material-symbols-outlined text-[24px]">dashboard</span>
            <span class="text-[9px] font-bold uppercase">Panel</span>
        </a>
        <a class="flex flex-1 flex-col items-center gap-1 text-slate-500 transition-colors" href="tiendas.html">
            <span class="material-symbols-outlined text-[24px]">storefront</span>
            <span class="text-[9px] font-bold uppercase">Tiendas</span>
        </a>
        <a class="flex flex-1 flex-col items-center gap-1 text-slate-500 transition-colors" href="motorizados.html">
            <span class="material-symbols-outlined text-[24px]">pedal_bike</span>
            <span class="text-[9px] font-bold uppercase">Flota</span>
        </a>
        <a class="flex flex-1 flex-col items-center gap-1 text-slate-500 transition-colors" href="pedidos.html">
            <span class="material-symbols-outlined text-[24px]">receipt_long</span>
            <span class="text-[9px] font-bold uppercase">Pedidos</span>
        </a>
        <a class="flex flex-1 flex-col items-center gap-1 text-primary transition-colors" href="configuracion.html">
            <span class="material-symbols-outlined text-[24px] filled">tune</span>
            <span class="text-[9px] font-bold uppercase">Ajustes</span>
        </a>
    </div>
</nav>

<script>
    // Generar tabla de horarios
    const dias = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
    const container = document.getElementById('lista-horarios');
    dias.forEach(dia => {
        container.innerHTML += `
            <div class="p-4 flex items-center justify-between">
                <span class="text-xs font-bold text-slate-300 w-16">${dia}</span>
                <div class="flex items-center gap-2 bg-black/30 px-2 py-1 rounded border border-white/5">
                    <input type="time" value="08:00" class="bg-transparent border-none p-0 text-[10px] font-black text-primary focus:ring-0">
                    <span class="text-slate-600 text-[9px] font-bold">A</span>
                    <input type="time" value="22:00" class="bg-transparent border-none p-0 text-[10px] font-black text-primary focus:ring-0">
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" checked class="sr-only peer">
                    <div class="w-7 h-4 bg-slate-800 rounded-full peer peer-checked:bg-primary after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:after:translate-x-3"></div>
                </label>
            </div>
        `;
    });

    function confirmExit() {
        if(confirm("¿Desea cerrar la sesión administrativa?")) {
            window.location.href = "../../index.html"; // Ajustar ruta según tu login
        }
    }
</script>

</body>
</html>
