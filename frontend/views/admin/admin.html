<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="../../assets/js/config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#39FF14", /* VERDE TÓXICO */
                        "background-black": "#000000",
                        "surface-grey": "#1a1a1a",
                        "accent-grey": "#757575",
                        "urgent-purple": "#FF00FF", /* MAGENTA */
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; }
        .text-toxic { color: #39FF14; }
        .nav-active { color: #39FF14; }
        .nav-active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
        #modal-viewer { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
    </style>
</head>
<body class="text-white">
    <div class="relative flex flex-col min-h-screen pb-24">
        
        <div class="flex items-center bg-black/90 backdrop-blur-md p-4 sticky top-0 z-50 border-b border-white/10 justify-between">
            <div class="text-toxic flex size-12 items-center justify-start">
                <span class="material-symbols-outlined text-3xl">menu</span>
            </div>
            <div class="flex-1 text-center">
                <h2 class="text-base font-bold uppercase tracking-tight">Panel Kilómetro Cero</h2>
            </div>
            <div class="flex w-12 justify-end">
                <button onclick="init()" class="text-toxic"><span id="sync-icon" class="material-symbols-outlined">sync</span></button>
            </div>
        </div>

        <div class="px-4 pt-6">
            <p class="text-accent-grey text-sm">Bienvenido, Administrador</p>
            <h1 class="text-2xl font-bold">Panel de Control</h1>
        </div>

        <div class="flex flex-wrap gap-3 p-4">
            <div class="flex-1 min-w-[140px] bg-surface-grey p-4 rounded-xl border-l-4 border-primary">
                <span class="material-symbols-outlined text-toxic">delivery_dining</span>
                <p class="text-accent-grey text-[10px] uppercase font-bold mt-2">Motorizados Online</p>
                <p class="text-2xl font-bold">18</p>
            </div>
            <div class="flex-1 min-w-[140px] bg-surface-grey p-4 rounded-xl border-l-4 border-urgent-purple">
                <span class="material-symbols-outlined text-urgent-purple">shopping_cart</span>
                <p class="text-accent-grey text-[10px] uppercase font-bold mt-2">Pedidos Hoy</p>
                <p class="text-2xl font-bold">42</p>
            </div>
        </div>

        <div class="flex items-center justify-between px-4 py-4">
            <h2 class="text-xl font-bold">Tareas Prioritarias</h2>
            <div class="flex gap-3">
                <button onclick="cambiarTab('motorizados')" id="btn-m" class="text-toxic text-xs font-bold border-b border-toxic">MOTOS</button>
                <button onclick="cambiarTab('tiendas')" id="btn-t" class="text-accent-grey text-xs font-bold">TIENDAS</button>
            </div>
        </div>

        <div id="main-content" class="px-4 space-y-3">
            <p class="text-center text-accent-grey py-10 animate-pulse">Sincronizando...</p>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-black border-t border-white/10 px-6 py-3 flex justify-between items-center z-50">
            <div class="flex flex-col items-center nav-active"><span class="material-symbols-outlined">dashboard</span><span class="text-[10px] mt-1">Panel</span></div>
            <div class="flex flex-col items-center text-accent-grey"><span class="material-symbols-outlined">group</span><span class="text-[10px] mt-1">Usuarios</span></div>
            <div class="flex flex-col items-center text-accent-grey"><span class="material-symbols-outlined">account_balance_wallet</span><span class="text-[10px] mt-1">Finanzas</span></div>
            <div class="flex flex-col items-center text-accent-grey"><span class="material-symbols-outlined">settings</span><span class="text-[10px] mt-1">Config</span></div>
        </nav>
    </div>

    <div id="modal-viewer" onclick="this.style.display='none'"><img id="modal-img" src="" class="max-w-[90%] border-2 border-primary rounded-xl"></div>

    <script>
        let db = { motorizados: [], tiendas: [] };
        let currentTab = 'motorizados';

        async function init() {
            document.getElementById('sync-icon').classList.add('animate-spin');
            try {
                const response = await fetch(API_URL);
                db = await response.json();
                render();
            } catch (e) { console.error(e); }
            finally { document.getElementById('sync-icon').classList.remove('animate-spin'); }
        }

        function cambiarTab(tab) {
            currentTab = tab;
            document.getElementById('btn-m').className = tab === 'motorizados' ? 'text-toxic text-xs font-bold border-b border-toxic' : 'text-accent-grey text-xs font-bold';
            document.getElementById('btn-t').className = tab === 'tiendas' ? 'text-toxic text-xs font-bold border-b border-toxic' : 'text-accent-grey text-xs font-bold';
            render();
        }

        function render() {
            const list = currentTab === 'motorizados' ? db.motorizados : db.tiendas;
            const container = document.getElementById('main-content');
            container.innerHTML = '';

            if(list.length === 0) {
                container.innerHTML = '<p class="text-center text-accent-grey py-10">Sin tareas pendientes</p>';
                return;
            }

            list.forEach(item => {
                if(currentTab === 'motorizados') {
                    container.innerHTML += `
                    <div class="bg-surface-grey p-4 rounded-xl border border-white/5 space-y-4">
                        <div class="flex items-center gap-4">
                            <img src="${item.urlFoto}" class="h-12 w-12 rounded-full border border-primary/50" onclick="document.getElementById('modal-img').src=this.src; document.getElementById('modal-viewer').style.display='flex'">
                            <div class="flex-1">
                                <p class="font-bold">${item.nombre}</p>
                                <p class="text-toxic text-[10px] font-black tracking-widest uppercase italic">Placa: ${item.placa}</p>
                            </div>
                            <button onclick="window.open('${item.urlVideo}')" class="text-urgent-purple material-symbols-outlined">videocam</button>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="procesar('${item.id}', 'RECHAZADO')" class="flex-1 bg-white/5 text-red-500 text-[10px] font-bold py-3 rounded-lg uppercase">Rechazar</button>
                            <button onclick="procesar('${item.id}', 'ACTIVO')" class="flex-[2] bg-primary text-black text-[10px] font-bold py-3 rounded-lg uppercase">Autorizar</button>
                        </div>
                    </div>`;
                } else {
                    container.innerHTML += `
                    <div class="bg-surface-grey p-4 rounded-xl flex justify-between items-center border-l-4 border-urgent-purple">
                        <div><p class="font-bold">${item.nombreTienda}</p><p class="text-accent-grey text-xs">${item.representante}</p></div>
                        <button onclick="procesar('${item.id}', 'ACTIVO')" class="bg-primary text-black px-4 py-2 rounded-lg text-[10px] font-bold">APROBAR</button>
                    </div>`;
                }
            });
        }

        async function procesar(id, estado) {
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        accion: "gestionar_solicitud",
                        token: "KM0_SECURE_TOKEN_2026_XYZ",
                        id: id,
                        nuevoEstado: estado
                    })
                });
                init(); // Refrescar
            } catch (e) { alert("Error"); }
        }

        window.onload = init;
    </script>
</body>
</html>
