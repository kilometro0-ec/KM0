<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>CENTRO 360 - Operativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec1313",
                        "accent-fuchsia": "#ff00ff",
                        "toxic-green": "#39FF14",
                        "card-dark": "#1a0a0a",
                        "background-dark": "#0a0505",
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0505; color: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glow-green { filter: drop-shadow(0 0 5px #39FF14); }
        .material-icons { vertical-align: middle; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

<header class="sticky top-0 z-50 bg-black/90 backdrop-blur-md px-4 py-4 border-b border-white/5 flex justify-between items-center">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center">
            <i class="material-icons text-white text-2xl">smart_toy</i>
        </div>
        <div>
            <h1 class="text-lg font-black italic tracking-tighter uppercase leading-none">Centro 360</h1>
            <p class="text-[9px] text-toxic-green font-bold glow-green">SISTEMA OPERATIVO</p>
        </div>
    </div>
    <div class="flex gap-2">
        <button onclick="init()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 text-toxic-green">
            <i class="material-icons">sync</i>
        </button>
        <div class="w-10 h-10 rounded-full border-2 border-toxic-green p-0.5">
            <img src="https://ui-avatars.com/api/?name=Admin&background=000&color=39FF14" class="rounded-full" />
        </div>
    </div>
</header>

<main class="flex-1 overflow-y-auto pb-32">
    <div class="flex gap-3 p-4 overflow-x-auto no-scrollbar">
        <div class="min-w-[120px] bg-white/5 border border-white/10 rounded-2xl p-3">
            <p class="text-gray-500 text-[9px] font-black uppercase">Motos</p>
            <p id="stat-m" class="text-xl font-black">0</p>
        </div>
        <div class="min-w-[120px] bg-white/5 border border-white/10 rounded-2xl p-3">
            <p class="text-gray-500 text-[9px] font-black uppercase">Tiendas</p>
            <p id="stat-t" class="text-xl font-black text-accent-fuchsia">0</p>
        </div>
        <div class="min-w-[120px] bg-toxic-green/5 border border-toxic-green/20 rounded-2xl p-3">
            <p class="text-toxic-green text-[9px] font-black uppercase">Total</p>
            <p id="stat-total" class="text-xl font-black text-toxic-green">0</p>
        </div>
    </div>

    <section class="px-4 py-2">
        <h2 class="text-[10px] font-black uppercase tracking-widest text-gray-500 mb-4">Solicitudes Pendientes</h2>
        <div id="contenedor-solicitudes" class="flex gap-4 overflow-x-auto no-scrollbar pb-4 min-h-[160px]">
            <div class="w-full text-center py-10 text-gray-700 font-bold uppercase text-xs">Conectando con base de datos...</div>
        </div>
    </section>

    <section class="px-4 py-6">
        <h2 class="text-[10px] font-black uppercase tracking-widest text-gray-500 mb-4">Usuarios Activos en Sesión</h2>
        <div id="lista-activos" class="space-y-3">
            </div>
    </section>

    <section class="px-4 grid grid-cols-2 gap-3">
        <div class="bg-card-dark p-4 rounded-2xl border border-white/5">
            <p class="text-[8px] font-black text-gray-500 uppercase mb-2">Pedidos Libres</p>
            <div class="flex items-center gap-2">
                <i class="material-icons text-accent-fuchsia text-sm">local_mall</i>
                <p class="text-[11px] font-bold">Sushi Garden</p>
            </div>
        </div>
        <div class="bg-card-dark p-4 rounded-2xl border border-white/5">
            <p class="text-[8px] font-black text-gray-500 uppercase mb-2">Motos Libres</p>
            <div class="flex items-center gap-2 text-toxic-green glow-green">
                <i class="material-icons text-sm">directions_bike</i>
                <p class="text-[11px] font-bold">Mario V.</p>
            </div>
        </div>
    </section>
</main>

<nav class="fixed bottom-0 w-full bg-black/95 border-t border-white/5 px-6 py-4 pb-8 z-[100] flex justify-between items-end">
    <button class="flex flex-col items-center text-gray-600"><i class="material-icons">dashboard</i></button>
    <button class="flex flex-col items-center text-gray-600"><i class="material-icons">map</i></button>
    
    <button class="bg-toxic-green w-14 h-14 rounded-2xl shadow-[0_0_15px_#39FF1466] flex items-center justify-center -translate-y-4">
        <i class="material-icons text-black text-3xl font-bold">badge</i>
    </button>

    <button class="flex flex-col items-center text-gray-600"><i class="material-icons">payments</i></button>
    <button class="flex flex-col items-center text-gray-600"><i class="material-icons">settings</i></button>
</nav>

<script>
    let db = { motorizados: [], tiendas: [] };
    let activos = [];

    async function init() {
        const container = document.getElementById('contenedor-solicitudes');
        try {
            const res = await fetch(API_URL);
            db = await res.json();
            
            // Actualizar Stats
            document.getElementById('stat-m').innerText = (db.motorizados || []).length;
            document.getElementById('stat-t').innerText = (db.tiendas || []).length;
            document.getElementById('stat-total').innerText = ((db.motorizados || []).length + (db.tiendas || []).length);
            
            render();
        } catch (e) { 
            container.innerHTML = `<div class="w-full text-red-500 text-[10px] font-black uppercase">Error: Verifica el ID de tu Script</div>`;
        }
    }

    function render() {
        const container = document.getElementById('contenedor-solicitudes');
        container.innerHTML = "";
        
        let all = [...(db.motorizados || []), ...(db.tiendas || [])];

        if(all.length === 0) {
            container.innerHTML = `<div class="w-full py-10 bg-white/5 rounded-3xl border border-dashed border-white/10 text-center text-gray-600 text-[10px] font-black uppercase">Sin solicitudes pendientes</div>`;
            return;
        }

        all.forEach(item => {
            const isMoto = item.nombre !== undefined;
            const color = isMoto ? '#ec1313' : '#ff00ff'; 
            const icono = isMoto ? 'moped' : 'storefront';
            const nombre = item.nombre || item.nombreTienda || "Sin Nombre";

            container.innerHTML += `
                <div class="min-w-[240px] bg-card-dark border-l-4 rounded-3xl p-5 shadow-2xl" style="border-color: ${color}">
                    <div class="flex items-center gap-2 mb-3">
                        <i class="material-icons text-lg" style="color: ${color}">${icono}</i>
                        <span class="text-[9px] font-black uppercase tracking-widest text-gray-400">${isMoto ? 'Motorizado' : 'Tienda'}</span>
                    </div>
                    <p class="text-sm font-black text-white mb-1 truncate">${nombre}</p>
                    <p class="text-[9px] text-gray-500 mb-5 font-bold uppercase">${item.ciudad || 'Sector pendiente'}</p>
                    <div class="flex gap-2">
                        <button onclick="gestionar('${item.id}', 'RECHAZADO', '${item.telefono}', '${nombre}')" class="flex-1 bg-white/5 text-gray-500 text-[10px] font-black py-3 rounded-xl uppercase">Rechazar</button>
                        <button onclick="gestionar('${item.id}', 'ACTIVO', '${item.telefono}', '${nombre}', '${item.password}', '${item.cedula}', ${isMoto})" class="flex-[1.5] text-[10px] font-black py-3 rounded-xl uppercase text-white shadow-lg" style="background: ${color}">Aprobar</button>
                    </div>
                </div>`;
        });
        renderActivos();
    }

    function renderActivos() {
        const container = document.getElementById('lista-activos');
        if(activos.length === 0) {
            container.innerHTML = '<p class="text-[10px] text-gray-800 italic px-2">No hay usuarios aprobados en esta sesión</p>';
            return;
        }
        container.innerHTML = activos.map(u => `
            <div class="flex items-center justify-between bg-card-dark p-4 rounded-2xl border border-white/5">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: ${u.isMoto ? '#ec131320' : '#ff00ff20'}">
                        <i class="material-icons" style="color: ${u.isMoto ? '#ec1313' : '#ff00ff'}">${u.isMoto ? 'delivery_dining' : 'shopping_bag'}</i>
                    </div>
                    <div>
                        <p class="text-sm font-black text-white">${u.nombre}</p>
                        <p class="text-[9px] text-toxic-green font-bold uppercase">Habilitado</p>
                    </div>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input checked class="sr-only peer" type="checkbox">
                    <div class="w-11 h-6 bg-gray-800 rounded-full peer peer-checked:bg-toxic-green after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div>
                </label>
            </div>`).join('');
    }

    async function gestionar(id, estado, telf, nombre, pass, user, isMoto) {
        if(!confirm(`¿Deseas ${estado.toLowerCase()} a ${nombre}?`)) return;
        
        let msg = (estado === 'ACTIVO') 
            ? `*KM0 - ACCESO*%0A👤 *User:* ${user}%0A🔑 *Pass:* ${pass}`
            : `*KM0 - RECHAZADO*%0A*Motivo:* Perfil no cumple requerimientos.`;

        if(estado === 'ACTIVO') activos.unshift({ nombre, isMoto });

        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ accion: "gestionar_solicitud", id, nuevoEstado: estado }) });
        window.open(`https://api.whatsapp.com/send?phone=${telf}&text=${msg}`, '_blank');
        init();
    }

    init();
</script>
</body>
</html>
