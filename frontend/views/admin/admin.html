<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>KM0 ADMIN CONTROL</title>
    <script src="../../assets/js/config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        :root { 
            --naranja: #ff6600; 
            --azul: #0047AB; 
            --magenta: #E200F7; 
            --verde-toxico: #39FF14; 
        }
        body { font-family: 'Inter', sans-serif; background: #000; color: white; overflow-x: hidden; }

        /* EFECTO SOBREPOSICIÓN TABS */
        .tab-btn { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        .tab-btn.active { transform: scale(1.08); z-index: 50; }
        .tab-btn.inactive { opacity: 0.3; transform: scale(0.95); z-index: 10; }

        /* BORDES SIMÉTRICOS */
        .border-gradient-round { position: relative; background: #0f0f0f; border-radius: 2.5rem; }
        .active-store::before {
            content: ""; position: absolute; inset: -2px; border-radius: 2.5rem; padding: 2px;
            background: linear-gradient(90deg, var(--azul), var(--magenta));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
        }

        /* NAVEGACIÓN TOXIC */
        .bottom-nav { background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(25px); border-top: 1px solid rgba(57, 255, 20, 0.15); }
        .icon-toxic { color: var(--verde-toxico); text-shadow: 0 0 12px rgba(57, 255, 20, 0.5); }
        
        /* SIDEBAR CAMPANA */
        .sidebar-notif { transform: translateX(100%); transition: transform 0.4s ease-out; }
        .sidebar-notif.open { transform: translateX(0); }

        .detalle-hidden { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
        .detalle-open { max-height: 850px; }
        
        /* Efecto de pulso para la campana cuando hay notif */
        .pulse-tox { animation: pulse-toxic 2s infinite; }
        @keyframes pulse-toxic {
            0% { box-shadow: 0 0 0 0 rgba(57, 255, 20, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(57, 255, 20, 0); }
            100% { box-shadow: 0 0 0 0 rgba(57, 255, 20, 0); }
        }
    </style>
</head>
<body class="pb-32">

    <div id="side-notif" class="fixed inset-y-0 right-0 w-[85%] bg-black/95 z-[200] sidebar-notif border-l border-white/5 backdrop-blur-3xl">
        <div class="p-8 border-b border-white/5 flex justify-between items-center">
            <h3 class="font-black text-xs uppercase tracking-[0.2em] text-white">Solicitudes Nuevas</h3>
            <button onclick="toggleCampana()" class="material-symbols-outlined text-gray-400">close</button>
        </div>
        <div id="lista-resumen" class="p-6 space-y-4"></div>
    </div>

    <header class="p-6 sticky top-0 z-[100] bg-black/80 backdrop-blur-md flex justify-between items-center border-b border-white/5">
        <div>
            <p class="text-[9px] font-black tracking-[0.4em] text-gray-500 uppercase">Km0 Admin</p>
            <h1 class="text-xl font-black italic tracking-tighter uppercase">Panel <span class="text-white">Operativo</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="toggleCampana()" class="relative p-2 rounded-full active:scale-95 transition-all">
                <span class="material-symbols-outlined text-gray-400 text-3xl">notifications</span>
                <span id="badge-campana" class="absolute top-1 right-1 bg-[#39FF14] text-black text-[9px] font-black w-5 h-5 flex items-center justify-center rounded-full hidden border-2 border-black pulse-tox">0</span>
            </button>
            <button onclick="init()" class="bg-white/5 p-2 rounded-full"><span id="sync-icon" class="material-symbols-outlined icon-toxic">sync</span></button>
        </div>
    </header>

    <div class="flex p-6 gap-3 items-center justify-center h-48">
        <button onclick="cambiarTab('motorizados')" id="btn-moto" class="tab-btn active flex-1 h-full border-gradient-round border-2 border-[#ff6600] flex flex-col items-center justify-center shadow-2xl">
            <span class="material-symbols-outlined text-4xl text-[#ff6600] mb-2">motorcycle</span>
            <p id="count-m" class="text-4xl font-black italic">0</p>
            <p class="text-[9px] font-bold uppercase tracking-widest text-gray-500">Motos</p>
        </button>

        <button onclick="cambiarTab('tiendas')" id="btn-store" class="tab-btn inactive flex-1 h-full border-gradient-round flex flex-col items-center justify-center">
            <span class="material-symbols-outlined text-4xl text-[#0047AB] mb-2">storefront</span>
            <p id="count-t" class="text-4xl font-black italic">0</p>
            <p class="text-[9px] font-bold uppercase tracking-widest text-gray-500">Tiendas</p>
        </button>
    </div>

    <main id="main-content" class="p-4 space-y-4"></main>

    <nav class="fixed bottom-0 inset-x-0 h-20 bottom-nav z-[150] flex items-center justify-around px-2">
        <button onclick="init()" class="flex flex-col items-center gap-1 w-14">
            <span class="material-symbols-outlined icon-toxic text-2xl font-variation-fill">dashboard</span>
            <span class="text-[7px] font-black uppercase text-white/40">Panel</span>
        </button>
        
        <button class="flex flex-col items-center gap-1 w-14">
            <span class="material-symbols-outlined icon-toxic text-2xl">local_shipping</span>
            <span class="text-[7px] font-black uppercase text-white/40">Logística</span>
        </button>

        <button onclick="alert('Módulo de Control de Accesos')" class="bg-[#39FF14] text-black w-14 h-14 rounded-[1.8rem] shadow-[0_0_25px_rgba(57,255,20,0.5)] flex flex-col items-center justify-center -translate-y-5 active:scale-90 transition-transform">
            <span class="material-symbols-outlined font-black text-2xl">group_active</span>
            <span class="text-[6px] font-black uppercase leading-none mt-0.5">Usuarios</span>
        </button>

        <button class="flex flex-col items-center gap-1 w-14">
            <span class="material-symbols-outlined icon-toxic text-2xl">payments</span>
            <span class="text-[7px] font-black uppercase text-white/40">Finanzas</span>
        </button>

        <button class="flex flex-col items-center gap-1 w-14">
            <span class="material-symbols-outlined icon-toxic text-2xl">account_circle</span>
            <span class="text-[7px] font-black uppercase text-white/40">Perfil</span>
        </button>
    </nav>

    <script>
        let db = { motorizados: [], tiendas: [] };
        let currentTab = 'motorizados';

        function toggleCampana() { document.getElementById('side-notif').classList.toggle('open'); }

        async function init() {
            const sync = document.getElementById('sync-icon');
            sync.classList.add('animate-spin');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                db = data;
                
                const nM = data.motorizados?.length || 0;
                const nT = data.tiendas?.length || 0;
                document.getElementById('count-m').innerText = nM;
                document.getElementById('count-t').innerText = nT;

                // Actualizar Campana
                const badge = document.getElementById('badge-campana');
                const listResumen = document.getElementById('lista-resumen');
                listResumen.innerHTML = '';
                
                if((nM + nT) > 0) {
                    badge.innerText = nM + nT;
                    badge.classList.remove('hidden');
                    [...db.motorizados, ...db.tiendas].forEach(item => {
                        const esM = item.nombre !== undefined;
                        listResumen.innerHTML += `
                            <div class="bg-white/5 p-4 rounded-3xl border-l-4 ${esM ? 'border-[#ff6600]' : 'border-[#0047AB]'}">
                                <p class="text-[10px] font-black uppercase text-white">${item.nombre || item.nombreTienda}</p>
                                <p class="text-[8px] text-gray-500 font-bold mt-1 uppercase italic">${esM ? 'Motorizado' : 'Tienda'} en espera</p>
                            </div>
                        `;
                    });
                } else { badge.classList.add('hidden'); }
                render();
            } catch (e) { console.error(e); }
            finally { setTimeout(() => sync.classList.remove('animate-spin'), 800); }
        }

        function render() {
            const list = currentTab === 'motorizados' ? db.motorizados : db.tiendas;
            const container = document.getElementById('main-content');
            container.innerHTML = '';

            list.forEach((item, index) => {
                const isMoto = currentTab === 'motorizados';
                container.innerHTML += `
                <div class="bg-[#0f0f0f] rounded-[2.5rem] p-6 border border-white/5 shadow-2xl">
                    <div onclick="document.getElementById('det-${index}').classList.toggle('detalle-open')" class="flex justify-between items-center cursor-pointer">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center border border-white/5">
                                <span class="material-symbols-outlined ${isMoto ? 'text-[#ff6600]' : 'text-[#0047AB]'}">${isMoto ? 'motorcycle' : 'store'}</span>
                            </div>
                            <div>
                                <p class="font-black text-[13px] uppercase leading-tight">${item.nombre || item.nombreTienda}</p>
                                <p class="text-[9px] text-gray-500 font-bold uppercase mt-1 tracking-widest">${item.ciudad || 'Pendiente'}</p>
                            </div>
                        </div>
                        <span class="material-symbols-outlined text-gray-700">keyboard_arrow_down</span>
                    </div>
                    
                    <div id="det-${index}" class="detalle-hidden">
                        <div class="pt-6 mt-6 border-t border-white/5 grid grid-cols-2 gap-3">
                            <div class="bg-black/60 p-4 rounded-[1.5rem] border border-white/5">
                                <p class="text-gray-500 text-[8px] font-black uppercase mb-1">Cédula</p>
                                <p class="font-bold text-white text-[11px]">${item.cedula}</p>
                            </div>
                            <div class="bg-black/60 p-4 rounded-[1.5rem] border border-white/5">
                                <p class="text-gray-500 text-[8px] font-black uppercase mb-1">Pass</p>
                                <p class="font-bold text-white text-[11px]">${item.password}</p>
                            </div>
                            <div class="col-span-2 bg-black/60 p-4 rounded-[1.5rem] border border-white/5 flex justify-between items-center">
                                <div><p class="text-gray-500 text-[8px] font-black uppercase mb-1">Teléfono</p><p class="font-bold text-white text-[11px]">${item.telefono}</p></div>
                                <div class="text-right"><p class="text-gray-500 text-[8px] font-black uppercase mb-1">Tipo</p><p class="font-bold text-white text-[11px] uppercase">${item.vehiculo || item.categoria || 'S/N'}</p></div>
                            </div>
                        </div>
                        <div class="flex gap-2 mt-6">
                            <button onclick="gestionar('${item.id}', 'RECHAZADO', '${item.telefono}', '${item.nombre || item.nombreTienda}')" class="flex-1 bg-white/5 text-red-500 py-4 rounded-2xl font-black uppercase text-[10px]">Rechazar</button>
                            <button onclick="gestionar('${item.id}', 'ACTIVO', '${item.telefono}', '${item.nombre || item.nombreTienda}', '${item.password}', '${item.cedula}')" class="flex-[2] ${isMoto ? 'bg-[#ff6600]' : 'bg-gradient-to-r from-[#0047AB] to-[#E200F7]'} text-white py-4 rounded-2xl font-black uppercase text-[10px] shadow-xl shadow-black">Habilitar Socio</button>
                        </div>
                    </div>
                </div>`;
            });
        }

        function cambiarTab(tab) {
            currentTab = tab;
            const btnMoto = document.getElementById('btn-moto');
            const btnStore = document.getElementById('btn-store');
            if(tab === 'motorizados') {
                btnMoto.className = "tab-btn active flex-1 h-full border-gradient-round border-2 border-[#ff6600] flex flex-col items-center justify-center shadow-2xl";
                btnStore.className = "tab-btn inactive flex-1 h-full border-gradient-round flex flex-col items-center justify-center";
            } else {
                btnStore.className = "tab-btn active flex-1 h-full border-gradient-round active-store flex flex-col items-center justify-center shadow-2xl";
                btnMoto.className = "tab-btn inactive flex-1 h-full border-gradient-round flex flex-col items-center justify-center";
            }
            render();
        }

        async function gestionar(id, estado, telf, nombre, pass, user) {
            if(!confirm(`¿Habilitar acceso para ${nombre}?`)) return;
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ accion: "gestionar_solicitud", id, nuevoEstado: estado }) });
            init();
        }

        init();
    </script>
</body>
</html>
