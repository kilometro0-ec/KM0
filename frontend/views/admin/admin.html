<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>KM0 ADMIN CONTROL</title>
    <script src="../../assets/js/config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: white; -webkit-tap-highlight-color: transparent; }
        
        /* 🔵 ESTILO TIENDA (Degradado Azul a Magenta) */
        .gradiente-tienda { background: linear-gradient(90deg, #0047AB 0%, #E200F7 100%); }
        .border-tienda { border-image: linear-gradient(90deg, #0047AB, #E200F7) 1; border-width: 2px; border-style: solid; }
        .text-tienda { color: #0047AB; }

        /* 🟠 ESTILO MOTORIZADO (Naranja KM0) */
        .bg-motorizado { background-color: #ff6600; }
        .border-motorizado { border-color: #ff6600; }
        .text-motorizado { color: #ff6600; }

        .detalle-hidden { display: none; }
        .modal-notif { transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-notif.open { transform: translateX(0); }
    </style>
</head>
<body>

    <audio id="notif-sound" preload="auto">
        <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
    </audio>

    <div id="panel-notif" class="fixed inset-y-0 right-0 w-80 bg-[#0a0a0a] z-[150] modal-notif border-l border-white/10 shadow-2xl">
        <div class="p-6 border-b border-white/5 flex justify-between items-center">
            <h3 class="font-black text-sm uppercase tracking-widest">Notificaciones</h3>
            <button onclick="toggleNotificaciones()" class="material-symbols-outlined text-gray-500">close</button>
        </div>
        <div id="lista-notif-resumen" class="p-4 space-y-3 overflow-y-auto max-h-[80vh]">
            </div>
    </div>

    <div id="modal-audio" class="fixed inset-0 z-[200] bg-black flex items-center justify-center p-6 text-center hidden">
        <div class="bg-[#111] p-10 rounded-[3rem] border-2 border-white/10 max-w-xs">
            <span class="material-symbols-outlined text-7xl text-[#39FF14]">sensors</span>
            <h3 class="text-2xl font-black mt-6 uppercase">Sistema KM0</h3>
            <button onclick="activarMonitor()" class="w-full gradiente-tienda text-white font-black py-5 rounded-2xl mt-8 uppercase btn-active">CONECTAR</button>
        </div>
    </div>

    <div class="relative flex flex-col min-h-screen pb-32">
        
        <div class="flex items-center bg-black/95 p-6 sticky top-0 z-50 border-b border-white/5 justify-between">
            <h2 class="text-sm font-black uppercase italic tracking-widest text-white">ADMIN CONTROL</h2>
            <div class="flex items-center gap-4">
                <button onclick="toggleNotificaciones()" class="relative">
                    <span class="material-symbols-outlined text-gray-400 text-3xl">notifications</span>
                    <span id="badge-notif" class="absolute -top-1 -right-1 bg-[#39FF14] text-black text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full hidden">0</span>
                </button>
                <button onclick="init()" class="bg-white/5 p-2 rounded-xl"><span id="sync-icon" class="material-symbols-outlined">sync</span></button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 p-4">
            <div onclick="cambiarTab('motorizados')" id="card-moto" class="bg-[#0f0f0f] p-6 rounded-[2.5rem] border-2 border-motorizado cursor-pointer transition-all">
                <div class="flex justify-between items-center text-motorizado">
                    <span class="material-symbols-outlined text-4xl">motorcycle</span>
                    <span class="text-[9px] bg-motorizado text-white font-black px-2 py-0.5 rounded-full">NEW</span>
                </div>
                <p id="count-m" class="text-4xl font-black mt-4">0</p>
                <p class="text-[10px] font-bold text-gray-400 uppercase">Solicitudes</p>
            </div>
            
            <div onclick="cambiarTab('tiendas')" id="card-store" class="bg-[#0f0f0f] p-6 rounded-[2.5rem] border-2 border-transparent cursor-pointer opacity-30 transition-all shadow-lg" style="border-image: linear-gradient(90deg, #0047AB, #E200F7) 1;">
                <div class="flex justify-between items-center">
                    <span class="material-symbols-outlined text-4xl text-tienda">storefront</span>
                    <span class="text-[9px] gradiente-tienda text-white font-black px-2 py-0.5 rounded-full">NEW</span>
                </div>
                <p id="count-t" class="text-4xl font-black mt-4">0</p>
                <p class="text-[10px] font-bold text-gray-400 uppercase">Comercios</p>
            </div>
        </div>

        <div id="main-content" class="p-4 space-y-4"></div>
    </div>

    <script>
        let db = { motorizados: [], tiendas: [] };
        let currentTab = 'motorizados';

        window.onload = () => {
            if (localStorage.getItem('km0_v4_admin') !== 'true') document.getElementById('modal-audio').classList.remove('hidden');
            else init();
        };

        function activarMonitor() {
            localStorage.setItem('km0_v4_admin', 'true');
            document.getElementById('modal-audio').classList.add('hidden');
            init();
        }

        function toggleNotificaciones() {
            document.getElementById('panel-notif').classList.toggle('open');
        }

        async function init(silent = false) {
            if(!silent) document.getElementById('sync-icon').classList.add('animate-spin');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                db = data;

                const nM = data.motorizados?.length || 0;
                const nT = data.tiendas?.length || 0;
                document.getElementById('count-m').innerText = nM;
                document.getElementById('count-t').innerText = nT;

                // Actualizar Badge y Resumen de Notificaciones
                const badge = document.getElementById('badge-notif');
                const listResumen = document.getElementById('lista-notif-resumen');
                listResumen.innerHTML = '';
                
                if((nM + nT) > 0) {
                    badge.innerText = nM + nT;
                    badge.classList.remove('hidden');
                    
                    // Llenar resumen lateral
                    [...db.motorizados, ...db.tiendas].forEach(item => {
                        const isMoto = item.nombre !== undefined;
                        listResumen.innerHTML += `
                            <div class="bg-white/5 p-3 rounded-xl border-l-4 ${isMoto ? 'border-motorizado' : 'border-[#0047AB]'}">
                                <p class="text-[10px] font-black uppercase">${item.nombre || item.nombreTienda}</p>
                                <p class="text-[8px] text-gray-500 uppercase">${isMoto ? 'Nuevo Motorizado' : 'Nuevo Comercio'}</p>
                            </div>
                        `;
                    });
                } else { badge.classList.add('hidden'); }

                render();
            } catch (e) { console.error(e); }
            finally { document.getElementById('sync-icon').classList.remove('animate-spin'); }
        }

        function render() {
            const list = currentTab === 'motorizados' ? db.motorizados : db.tiendas;
            const container = document.getElementById('main-content');
            container.innerHTML = '';

            list.forEach((item, index) => {
                const isMoto = currentTab === 'motorizados';
                const accentClass = isMoto ? 'border-motorizado' : 'border-tienda';
                const btnClass = isMoto ? 'bg-motorizado' : 'gradiente-tienda';

                container.innerHTML += `
                <div class="bg-[#0a0a0a] p-5 rounded-[2rem] border border-white/10">
                    <div onclick="document.getElementById('det-${index}').classList.toggle('detalle-hidden')" class="flex justify-between items-center cursor-pointer">
                        <div class="flex items-center gap-4">
                            <div class="p-3 rounded-2xl ${isMoto ? 'bg-motorizado/10' : 'bg-blue-600/10'}">
                                <span class="material-symbols-outlined ${isMoto ? 'text-motorizado' : 'text-tienda'}">${isMoto ? 'motorcycle' : 'store'}</span>
                            </div>
                            <div>
                                <p class="font-black text-sm uppercase tracking-tight">${item.nombre || item.nombreTienda}</p>
                                <p class="text-[10px] text-gray-500 font-bold">${item.telefono || 'S/N'}</p>
                            </div>
                        </div>
                        <span class="material-symbols-outlined text-gray-700">expand_more</span>
                    </div>
                    
                    <div id="det-${index}" class="detalle-hidden mt-6 pt-6 border-t border-white/5 space-y-4">
                        <div class="grid grid-cols-2 gap-2 text-[10px] font-bold">
                            <div class="bg-white/5 p-3 rounded-xl uppercase"><p class="text-gray-500 text-[8px]">Usuario</p>${item.cedula || '---'}</div>
                            <div class="bg-white/5 p-3 rounded-xl uppercase"><p class="text-gray-500 text-[8px]">Clave</p>${item.password || '---'}</div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="gestionar('${item.id}', 'RECHAZADO', '${item.telefono}', '${item.nombre || item.nombreTienda}')" class="flex-1 bg-red-600/10 text-red-500 py-4 rounded-2xl text-[10px] font-black uppercase">Rechazar</button>
                            <button onclick="gestionar('${item.id}', 'ACTIVO', '${item.telefono}', '${item.nombre || item.nombreTienda}', '${item.password}', '${item.cedula}')" class="flex-[2] ${btnClass} text-white py-4 rounded-2xl text-[10px] font-black uppercase shadow-lg">Aprobar Socio</button>
                        </div>
                    </div>
                </div>`;
            });
        }

        async function gestionar(id, estado, telf, nombre, pass, user) {
            let msg = estado === 'RECHAZADO' ? `*KM0 - RECHAZADO*%0AAtención *${nombre}*, solicitud denegada.` : `*KM0 - APROBADO*%0A👤 *User:* ${user}%0A🔑 *Pass:* ${pass}`;
            if(estado === 'RECHAZADO' && !prompt("Escriba RECHAZAR para confirmar:")) return;
            if(estado === 'ACTIVO' && !confirm("¿Confirmar activación?")) return;

            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ accion: "gestionar_solicitud", id: id, nuevoEstado: estado }) });
            window.open(`https://api.whatsapp.com/send?phone=${telf}&text=${msg}`, '_blank');
            init();
        }

        function cambiarTab(tab) {
            currentTab = tab;
            document.getElementById('card-moto').style.opacity = tab === 'motorizados' ? '1' : '0.3';
            document.getElementById('card-store').style.opacity = tab === 'tiendas' ? '1' : '0.3';
            render();
        }

        setInterval(() => init(true), 20000);
    </script>
</body>
</html>
