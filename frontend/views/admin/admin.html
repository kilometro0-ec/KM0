<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="../../assets/js/config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#39FF14", 
                        "moto-orange": "#ff6600", 
                        "store-blue": "#0047AB",
                        "surface-grey": "#1a1a1a",
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: white; overflow-x: hidden; }
        .tab-moto.active { color: #ff6600; border-bottom: 3px solid #ff6600; }
        .tab-store.active { color: #0047AB; border-bottom: 3px solid #0047AB; }
        .card-selected-moto { border: 1px solid #ff6600; background: rgba(255, 102, 0, 0.05); }
        .card-selected-store { border: 1px solid #0047AB; background: rgba(0, 71, 171, 0.05); }
        #notificacion-push { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .detalle-hidden { display: none; }
    </style>
</head>
<body>
    <audio id="notif-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <div id="notificacion-push" class="fixed top-4 inset-x-4 z-[100] transform -translate-y-64">
        <div id="notif-box" class="p-4 rounded-2xl shadow-2xl border-l-8 flex items-center gap-4 bg-surface-grey border-white/10">
            <div id="notif-icon-bg" class="p-3 rounded-xl"><span id="notif-icon" class="material-symbols-outlined text-white">notifications</span></div>
            <div class="flex-1">
                <p id="notif-titulo" class="text-[10px] font-black uppercase tracking-widest text-gray-400"></p>
                <p id="notif-mensaje" class="text-sm font-bold"></p>
            </div>
        </div>
    </div>

    <div class="relative flex flex-col min-h-screen pb-32">
        <div class="flex items-center bg-black/95 p-4 sticky top-0 z-50 border-b border-white/10 justify-between">
            <div class="text-primary flex size-12 items-center"><span class="material-symbols-outlined text-3xl">menu</span></div>
            <h2 class="text-base font-black uppercase italic tracking-widest text-primary">KM0 ADMIN</h2>
            <button onclick="init()" class="text-primary"><span id="sync-icon" class="material-symbols-outlined">sync</span></button>
        </div>

        <div class="grid grid-cols-2 gap-3 p-4">
            <div id="card-moto" onclick="cambiarTab('motorizados')" class="bg-surface-grey p-4 rounded-2xl border-b-4 border-moto-orange card-selected-moto">
                <span class="material-symbols-outlined text-moto-orange text-3xl">motorcycle</span>
                <p class="text-[10px] font-bold text-gray-500 mt-2 uppercase">Motos en Espera</p>
                <p id="count-m" class="text-3xl font-black">0</p>
            </div>
            <div id="card-store" onclick="cambiarTab('tiendas')" class="bg-surface-grey p-4 rounded-2xl border-b-4 border-store-blue">
                <span class="material-symbols-outlined text-store-blue text-3xl">storefront</span>
                <p class="text-[10px] font-bold text-gray-500 mt-2 uppercase">Tiendas en Espera</p>
                <p id="count-t" class="text-3xl font-black">0</p>
            </div>
        </div>

        <div class="flex px-4 border-b border-white/10">
            <button onclick="cambiarTab('motorizados')" id="btn-m" class="tab-moto active flex-1 py-4 text-[11px] font-black uppercase">SOCIOS MOTO</button>
            <button onclick="cambiarTab('tiendas')" id="btn-t" class="tab-store flex-1 py-4 text-[11px] font-black uppercase text-gray-500">TIENDAS</button>
        </div>

        <div id="main-content" class="p-4 space-y-4"></div>

        <nav class="fixed bottom-0 inset-x-0 bg-black/95 border-t border-white/10 px-6 py-4 flex justify-between items-center z-50 text-gray-600">
            <div class="flex flex-col items-center text-primary"><span class="material-symbols-outlined">dashboard</span><p class="text-[9px] font-bold mt-1">Panel</p></div>
            <div class="flex flex-col items-center"><span class="material-symbols-outlined">local_shipping</span><p class="text-[9px] font-bold mt-1">Logística</p></div>
            <div class="flex flex-col items-center"><span class="material-symbols-outlined">group</span><p class="text-[9px] font-bold mt-1">Usuarios</p></div>
            <div class="flex flex-col items-center"><span class="material-symbols-outlined">account_balance_wallet</span><p class="text-[9px] font-bold mt-1">Finanzas</p></div>
            <div class="flex flex-col items-center"><span class="material-symbols-outlined">settings</span><p class="text-[9px] font-bold mt-1">Config</p></div>
        </nav>
    </div>

    <script>
        let db = { motorizados: [], tiendas: [] };
        let currentTab = 'motorizados';

        async function init(silent = false) {
            if(!silent) document.getElementById('sync-icon').classList.add('animate-spin');
            try {
                const res = await fetch(API_URL);
                db = await res.json();
                document.getElementById('count-m').innerText = db.motorizados.length;
                document.getElementById('count-t').innerText = db.tiendas.length;
                render();
            } catch (e) { console.error(e); }
            finally { document.getElementById('sync-icon').classList.remove('animate-spin'); }
        }

        function cambiarTab(tab) {
            currentTab = tab;
            document.getElementById('btn-m').classList.toggle('active', tab === 'motorizados');
            document.getElementById('btn-t').classList.toggle('active', tab === 'tiendas');
            document.getElementById('card-moto').classList.toggle('card-selected-moto', tab === 'motorizados');
            document.getElementById('card-store').classList.toggle('card-selected-store', tab === 'tiendas');
            render();
        }

        function render() {
            const list = currentTab === 'motorizados' ? db.motorizados : db.tiendas;
            const container = document.getElementById('main-content');
            container.innerHTML = '';

            list.forEach((item, index) => {
                const color = currentTab === 'motorizados' ? 'border-moto-orange' : 'border-store-blue';
                const btnColor = currentTab === 'motorizados' ? 'bg-moto-orange' : 'bg-store-blue';
                
                // Formar el bloque de detalles según sea Moto o Tienda
                let detallesHTML = currentTab === 'motorizados' ? `
                    <div class="grid grid-cols-2 gap-2 mt-4 text-[10px] border-t border-white/5 pt-4">
                        <p><span class="text-gray-500">CÉDULA:</span><br>${item.cedula}</p>
                        <p><span class="text-gray-500">PLACA:</span><br>${item.placa}</p>
                        <p><span class="text-gray-500">TELÉFONO:</span><br>${item.telefono}</p>
                        <p><span class="text-gray-500">ID SISTEMA:</span><br>${item.id}</p>
                    </div>
                    <div class="flex gap-2 mt-4">
                        <a href="${item.urlVideo}" target="_blank" class="bg-zinc-800 p-2 rounded-lg text-xs flex-1 text-center">VER VIDEO</a>
                        <a href="${item.urlFoto}" target="_blank" class="bg-zinc-800 p-2 rounded-lg text-xs flex-1 text-center">VER CÉDULA</a>
                    </div>
                ` : `
                    <div class="grid grid-cols-2 gap-2 mt-4 text-[10px] border-t border-white/5 pt-4">
                        <p><span class="text-gray-500">RUC/CED:</span><br>${item.cedula}</p>
                        <p><span class="text-gray-500">RESPONSABLE:</span><br>${item.representante}</p>
                        <p><span class="text-gray-500">TELÉFONO:</span><br>${item.telefono}</p>
                        <p><span class="text-gray-500">CIUDAD:</span><br>${item.ciudad || 'No reg.'}</p>
                    </div>
                `;

                container.innerHTML += `
                <div class="bg-surface-grey p-4 rounded-2xl border-l-4 ${color} shadow-xl animate-in fade-in">
                    <div onclick="document.getElementById('det-${index}').classList.toggle('detalle-hidden')" class="cursor-pointer">
                        <div class="flex justify-between items-center">
                            <p class="font-black uppercase text-sm">${item.nombre || item.nombreTienda}</p>
                            <span class="material-symbols-outlined text-gray-500">expand_more</span>
                        </div>
                    </div>
                    
                    <div id="det-${index}" class="detalle-hidden">
                        ${detallesHTML}
                        <div class="flex gap-2 mt-6">
                            <button onclick="rechazar('${item.id}', '${item.telefono}', '${item.nombre || item.nombreTienda}')" 
                                    class="flex-1 bg-red-600/20 text-red-500 py-3 rounded-xl text-[10px] font-black uppercase">RECHAZAR</button>
                            <button onclick="autorizar('${item.id}', '${item.telefono}', '${item.nombre || item.nombreTienda}', '${item.password}')" 
                                    class="flex-[2] ${btnColor} text-white py-3 rounded-xl text-[10px] font-black uppercase">AUTORIZAR Y ENVIAR CLAVES</button>
                        </div>
                    </div>
                </div>`;
            });
        }

        async function autorizar(id, telf, nombre, pass) {
            if(!confirm("¿Confirmas la activación de este usuario?")) return;
            
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ accion: "gestionar_solicitud", token: "KM0_SECURE_TOKEN_2026_XYZ", id: id, nuevoEstado: "ACTIVO" })
                });

                const msg = `¡BIENVENIDO A KM0! 🏁\n\nHola ${nombre}, tu solicitud ha sido APROBADA. Ya puedes empezar a generar ingresos.\n\n🔐 TUS CREDENCIALES:\n👤 Usuario: ${id}\n🔑 Clave: ${pass}\n\nDescarga la App aquí: [LINK_APP]`;
                window.open(`https://api.whatsapp.com/send?phone=${telf}&text=${encodeURIComponent(msg)}`, '_blank');
                init();
            } catch (e) { alert("Error"); }
        }

        async function rechazar(id, telf, nombre) {
            const motivo = prompt("Indique el motivo del rechazo (Ej: Documentos ilegibles):");
            if(!motivo) return;

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ accion: "gestionar_solicitud", token: "KM0_SECURE_TOKEN_2026_XYZ", id: id, nuevoEstado: "RECHAZADO" })
                });

                const msg = `SOLICITUD KM0 ⚠️\n\nHola ${nombre}, lamentamos informarte que tu solicitud no pudo ser procesada en este momento.\n\n❌ MOTIVO: ${motivo}\n\nPor favor, corrige este punto y vuelve a intentarlo.`;
                window.open(`https://api.whatsapp.com/send?phone=${telf}&text=${encodeURIComponent(msg)}`, '_blank');
                init();
            } catch (e) { alert("Error"); }
        }

        window.onload = () => {
            init();
            if ("Notification" in window) Notification.requestPermission();
        };
    </script>
</body>
</html>
