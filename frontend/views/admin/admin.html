<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>KM0 ADMIN CONTROL</title>
    <script src="../../assets/js/config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --naranja: #ff6600;
            --verde: #39FF14;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #000; 
            color: white; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        /* Glow Naranja idéntico al Login */
        .border-naranja { border-color: var(--naranja); }
        .text-naranja { color: var(--naranja); }
        .bg-naranja { background-color: var(--naranja); }
        .shadow-neon-naranja { box-shadow: 0 0 15px rgba(255, 102, 0, 0.3); }

        .detalle-hidden { display: none; }
        .btn-active:active { transform: scale(0.96); }
        
        /* Animación suave */
        .card-anim { animation: fadeInUp 0.3s ease-out; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <audio id="notif-sound" preload="auto">
        <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
    </audio>

    <div id="modal-audio" class="fixed inset-0 z-[200] bg-black flex items-center justify-center p-6 text-center hidden">
        <div class="bg-[#111] p-10 rounded-[3rem] border border-naranja shadow-neon-naranja max-w-xs">
            <span class="material-symbols-outlined text-7xl text-naranja">sensors</span>
            <h3 class="text-2xl font-black mt-6 uppercase tracking-tighter">KM0 CONTROL</h3>
            <p class="text-gray-500 text-xs mt-3 leading-relaxed">Activa el monitor operativo para recibir alertas con sonido.</p>
            <button onclick="activarMonitor()" class="w-full bg-naranja text-white font-black py-5 rounded-2xl mt-8 uppercase tracking-widest btn-active shadow-lg">
                CONECTAR
            </button>
        </div>
    </div>

    <div class="relative flex flex-col min-h-screen pb-32">
        
        <div class="flex items-center bg-black/95 p-6 sticky top-0 z-50 border-b border-white/5 justify-between backdrop-blur-md">
            <h2 class="text-sm font-black uppercase italic tracking-widest text-naranja">KM0 ADMIN</h2>
            <div class="flex items-center gap-4">
                <div class="relative">
                    <span class="material-symbols-outlined text-gray-500 text-3xl">notifications</span>
                    <span id="badge-notif" class="absolute -top-1 -right-1 bg-[#39FF14] text-black text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full hidden">0</span>
                </div>
                <button onclick="init()" class="text-naranja bg-white/5 p-2 rounded-xl active:rotate-180 transition-all">
                    <span id="sync-icon" class="material-symbols-outlined">sync</span>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 p-4">
            <div onclick="cambiarTab('motorizados')" id="card-moto" class="bg-[#0f0f0f] p-6 rounded-[2.5rem] border-2 border-naranja shadow-neon-naranja cursor-pointer transition-all">
                <div class="flex justify-between items-center text-naranja">
                    <span class="material-symbols-outlined text-4xl">motorcycle</span>
                    <span class="text-[9px] bg-naranja text-white font-black px-2 py-0.5 rounded-full">LIVE</span>
                </div>
                <p id="count-m" class="text-4xl font-black mt-4">0</p>
                <p class="text-[10px] font-bold text-gray-400 uppercase mt-1 tracking-tighter">Motorizados</p>
            </div>
            
            <div onclick="cambiarTab('tiendas')" id="card-store" class="bg-[#0f0f0f] p-6 rounded-[2.5rem] border-2 border-white/5 cursor-pointer opacity-30 transition-all">
                <div class="flex justify-between items-center text-gray-600">
                    <span class="material-symbols-outlined text-4xl">storefront</span>
                    <span class="text-[9px] bg-gray-800 text-white font-black px-2 py-0.5 rounded-full">LIVE</span>
                </div>
                <p id="count-t" class="text-4xl font-black mt-4">0</p>
                <p class="text-[10px] font-bold text-gray-400 uppercase mt-1 tracking-tighter">Tiendas</p>
            </div>
        </div>

        <div id="main-content" class="p-4 space-y-4"></div>
    </div>

    <script>
        let db = { motorizados: [], tiendas: [] };
        let currentTab = 'motorizados';

        window.onload = () => {
            if (localStorage.getItem('km0_monitor_v2') !== 'true') {
                document.getElementById('modal-audio').classList.remove('hidden');
            } else {
                init();
            }
        };

        function activarMonitor() {
            localStorage.setItem('km0_monitor_v2', 'true');
            document.getElementById('modal-audio').classList.add('hidden');
            document.getElementById('notif-sound').play().then(() => document.getElementById('notif-sound').pause());
            init();
        }

        async function init(silent = false) {
            if(!silent) document.getElementById('sync-icon').classList.add('animate-spin');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                document.getElementById('count-m').innerText = data.motorizados ? data.motorizados.length : 0;
                document.getElementById('count-t').innerText = data.tiendas ? data.tiendas.length : 0;

                // Campana (Nuevos registros)
                let total = (data.motorizados?.length || 0) + (data.tiendas?.length || 0);
                const badge = document.getElementById('badge-notif');
                if(total > 0) {
                    badge.innerText = total;
                    badge.classList.remove('hidden');
                    if(!silent) document.getElementById('notif-sound').play();
                } else { badge.classList.add('hidden'); }

                db = data;
                render();
            } catch (e) { console.error(e); }
            finally { document.getElementById('sync-icon').classList.remove('animate-spin'); }
        }

        function render() {
            const list = currentTab === 'motorizados' ? db.motorizados : db.tiendas;
            const container = document.getElementById('main-content');
            container.innerHTML = '';

            if(!list || list.length === 0) {
                container.innerHTML = `<p class="text-center py-20 opacity-10 text-[10px] font-black uppercase">Operación Limpia</p>`;
                return;
            }

            list.forEach((item, index) => {
                container.innerHTML += `
                <div class="bg-[#0a0a0a] p-5 rounded-[2rem] border border-white/10 card-anim">
                    <div onclick="document.getElementById('det-${index}').classList.toggle('detalle-hidden')" class="flex justify-between items-center cursor-pointer">
                        <div class="flex items-center gap-4">
                            <div class="bg-naranja/10 p-3 rounded-2xl"><span class="material-symbols-outlined text-naranja">person</span></div>
                            <div>
                                <p class="font-black text-sm uppercase tracking-tight leading-none">${item.nombre || item.nombreTienda}</p>
                                <p class="text-[10px] text-naranja font-black mt-1">${item.telefono || '---'}</p>
                            </div>
                        </div>
                        <span class="material-symbols-outlined text-gray-700">keyboard_arrow_down</span>
                    </div>
                    
                    <div id="det-${index}" class="detalle-hidden mt-6 pt-6 border-t border-white/5 space-y-4">
                        <div class="grid grid-cols-2 gap-2 text-[11px]">
                            <div class="bg-white/5 p-3 rounded-xl"><p class="text-gray-500 font-bold uppercase text-[8px]">ID/Cédula</p><p class="font-bold">${item.cedula || '---'}</p></div>
                            <div class="bg-white/5 p-3 rounded-xl"><p class="text-gray-500 font-bold uppercase text-[8px]">Clave</p><p class="font-bold">${item.password || '---'}</p></div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="gestionar('${item.id}', 'RECHAZADO', '${item.telefono}', '${item.nombre || item.nombreTienda}')" class="flex-1 bg-red-600/10 text-red-500 py-4 rounded-2xl text-[10px] font-black uppercase btn-active">Rechazar</button>
                            <button onclick="gestionar('${item.id}', 'ACTIVO', '${item.telefono}', '${item.nombre || item.nombreTienda}', '${item.password}', '${item.cedula}')" class="flex-[2] bg-naranja text-white py-4 rounded-2xl text-[10px] font-black uppercase shadow-neon-naranja btn-active">Autorizar</button>
                        </div>
                    </div>
                </div>`;
            });
        }

        async function gestionar(id, estado, telf, nombre, pass, user) {
            let msg = "";
            if(estado === 'RECHAZADO') {
                const motivo = prompt("Motivo:"); if(!motivo) return;
                msg = `*KM0 - ALERTA*%0AHola *${nombre}*, solicitud rechazada por: ${motivo}`;
            } else {
                if(!confirm("¿Autorizar?")) return;
                msg = `*KM0 - BIENVENIDO* 🏁%0A👤 *User:* ${user}%0A🔑 *Pass:* ${pass}`;
            }
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ accion: "gestionar_solicitud", id: id, nuevoEstado: estado }) });
            window.open(`https://api.whatsapp.com/send?phone=${telf}&text=${msg}`, '_blank');
            init();
        }

        function cambiarTab(tab) {
            currentTab = tab;
            const m = document.getElementById('card-moto'), s = document.getElementById('card-store');
            if(tab === 'motorizados') {
                m.classList.remove('opacity-30', 'border-white/5'); m.classList.add('border-naranja', 'shadow-neon-naranja');
                s.classList.add('opacity-30', 'border-white/5'); s.classList.remove('border-naranja', 'shadow-neon-naranja');
            } else {
                s.classList.remove('opacity-30', 'border-white/5'); s.classList.add('border-naranja', 'shadow-neon-naranja');
                m.classList.add('opacity-30', 'border-white/5'); m.classList.remove('border-naranja', 'shadow-neon-naranja');
            }
            render();
        }

        setInterval(() => init(true), 20000);
    </script>
</body>
</html>
