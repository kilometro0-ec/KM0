<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KM0 ADMIN CONTROL</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIktNMCBBRE1JTiIsCiAgInNob3J0X25hbWUiOiAiS00wIiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwMDAwMDAiLAogICJ0aGVtZV9jbG9yIjogIiMzOUZGMTQiCn0=">
    
    <script src="../../assets/js/config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: white; -webkit-tap-highlight-color: transparent; }
        .detalle-hidden { display: none; }
        #notificacion-push { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bg-surface { background: #151515; }
        .btn-active:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <audio id="notif-sound" preload="auto">
        <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
    </audio>

    <div id="modal-audio" class="fixed inset-0 z-[200] bg-black/95 flex items-center justify-center p-6 text-center transition-opacity duration-300">
        <div class="bg-surface p-8 rounded-3xl border border-[#39FF14]/20 max-w-xs shadow-2xl shadow-[#39FF14]/10">
            <span class="material-symbols-outlined text-7xl text-[#39FF14] animate-bounce">notifications_active</span>
            <h3 class="text-2xl font-black mt-6">SISTEMA KM0</h3>
            <p class="text-gray-400 text-sm mt-3 leading-relaxed">Active el monitor para recibir alertas con <b>Sonido y Vibración</b>.</p>
            <button onclick="activarMonitor()" class="w-full bg-[#39FF14] text-black font-extrabold py-5 rounded-2xl mt-8 uppercase tracking-tighter shadow-xl shadow-[#39FF14]/20 btn-active">
                INICIAR MONITOR
            </button>
        </div>
    </div>

    <div id="notificacion-push" class="fixed top-4 inset-x-4 z-[100] transform -translate-y-64">
        <div id="notif-box" class="p-4 rounded-2xl shadow-2xl border-l-[10px] flex items-center gap-4 bg-[#1a1a1a] border-white/10">
            <div id="notif-icon-bg" class="p-3 rounded-xl"><span id="notif-icon" class="material-symbols-outlined text-white text-2xl">notifications</span></div>
            <div class="flex-1">
                <p id="notif-titulo" class="text-[10px] font-black uppercase tracking-widest text-gray-400"></p>
                <p id="notif-mensaje" class="text-sm font-bold leading-tight"></p>
            </div>
        </div>
    </div>

    <div class="relative flex flex-col min-h-screen pb-32">
        <div class="flex items-center bg-black/95 p-5 sticky top-0 z-50 border-b border-white/10 justify-between backdrop-blur-lg">
            <h2 class="text-base font-black uppercase italic tracking-tighter text-[#39FF14]">ADMIN CONTROL <span class="text-white opacity-30 text-[10px]">v3.0</span></h2>
            <button onclick="init()" class="text-[#39FF14] bg-white/5 p-2 rounded-full"><span id="sync-icon" class="material-symbols-outlined">sync</span></button>
        </div>

        <div class="grid grid-cols-2 gap-4 p-4">
            <div onclick="cambiarTab('motorizados')" id="card-moto" class="bg-surface p-5 rounded-3xl border-b-8 border-[#ff6600] cursor-pointer transition-all duration-300">
                <div class="flex justify-between items-center">
                    <span class="material-symbols-outlined text-[#ff6600] text-4xl">motorcycle</span>
                    <span class="text-[10px] bg-[#ff6600] text-black font-black px-2 py-0.5 rounded-md">PEND</span>
                </div>
                <p id="count-m" class="text-4xl font-black mt-3">0</p>
                <p class="text-[9px] font-bold text-gray-500 uppercase mt-1 tracking-widest">SOCIOS MOTO</p>
            </div>
            <div onclick="cambiarTab('tiendas')" id="card-store" class="bg-surface p-5 rounded-3xl border-b-8 border-[#0047AB] cursor-pointer opacity-30 transition-all duration-300">
                <div class="flex justify-between items-center">
                    <span class="material-symbols-outlined text-[#0047AB] text-4xl">storefront</span>
                    <span class="text-[10px] bg-[#0047AB] text-white font-black px-2 py-0.5 rounded-md">PEND</span>
                </div>
                <p id="count-t" class="text-4xl font-black mt-3">0</p>
                <p class="text-[9px] font-bold text-gray-500 uppercase mt-1 tracking-widest">TIENDAS</p>
            </div>
        </div>

        <div id="main-content" class="p-4 space-y-4">
            <div class="py-20 text-center opacity-20"><p class="text-xs font-black uppercase animate-pulse">Cargando...</p></div>
        </div>
    </div>

    <script>
        let db = { motorizados: [], tiendas: [], alertas: [] };
        let currentTab = 'motorizados';
        let lastCounts = { m: 0, t: 0, a: 0 };

        function activarMonitor() {
            const sound = document.getElementById('notif-sound');
            const modal = document.getElementById('modal-audio');
            
            modal.style.opacity = '0';
            setTimeout(() => modal.style.display = 'none', 300);

            sound.play().then(() => {
                sound.pause();
                sound.currentTime = 0;
            }).catch(e => console.log("Audio en espera"));

            if ("Notification" in window) Notification.requestPermission();
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            
            init();
        }

        async function init(silent = false) {
            if(!silent) document.getElementById('sync-icon').classList.add('animate-spin');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                // Actualización Forzada de Contadores
                const nMotos = data.motorizados ? data.motorizados.length : 0;
                const nTiendas = data.tiendas ? data.tiendas.length : 0;

                document.getElementById('count-m').innerText = nMotos;
                document.getElementById('count-t').innerText = nTiendas;

                // Lanzar alertas si hay nuevos
                if (nMotos > lastCounts.m && lastCounts.m > 0) lanzarPush("NUEVA MOTO", "Pendiente de aprobación", "#ff6600", "motorcycle");
                if (nTiendas > lastCounts.t && lastCounts.t > 0) lanzarPush("NUEVA TIENDA", "Solicitud de ingreso", "#0047AB", "store");

                db = data;
                lastCounts = { m: nMotos, t: nTiendas, a: (data.alertas ? data.alertas.length : 0) };
                render();
            } catch (e) { 
                console.error(e);
                document.getElementById('count-m').innerText = "err";
            } finally { 
                document.getElementById('sync-icon').classList.remove('animate-spin'); 
            }
        }

        function lanzarPush(titulo, msg, color, icono) {
            const box = document.getElementById('notificacion-push');
            const sound = document.getElementById('notif-sound');
            
            document.getElementById('notif-titulo').innerText = titulo;
            document.getElementById('notif-mensaje').innerText = msg;
            document.getElementById('notif-icon').innerText = icono;
            document.getElementById('notif-icon-bg').style.backgroundColor = color;
            document.getElementById('notif-box').style.borderLeftColor = color;
            
            sound.play().catch(() => {});
            if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
            
            box.classList.remove('-translate-y-64');
            setTimeout(() => box.classList.add('-translate-y-64'), 6000);
        }

        function render() {
            const list = currentTab === 'motorizados' ? db.motorizados : db.tiendas;
            const container = document.getElementById('main-content');
            container.innerHTML = '';

            if(!list || list.length === 0) {
                container.innerHTML = `<div class="py-20 text-center opacity-10"><span class="material-symbols-outlined text-6xl">verified</span><p class="text-xs font-black mt-2">OPERACIÓN LIMPIA</p></div>`;
                return;
            }

            list.forEach((item, index) => {
                const color = currentTab === 'motorizados' ? 'border-[#ff6600]' : 'border-[#0047AB]';
                const btn = currentTab === 'motorizados' ? 'bg-[#ff6600]' : 'bg-[#0047AB]';
                container.innerHTML += `
                <div class="bg-surface p-5 rounded-3xl border-l-8 ${color} shadow-xl mb-4">
                    <div onclick="document.getElementById('det-${index}').classList.toggle('detalle-hidden')" class="flex justify-between items-center cursor-pointer">
                        <div>
                            <p class="font-black text-base uppercase tracking-tight">${item.nombre || item.nombreTienda}</p>
                            <p class="text-[10px] text-gray-500 font-bold">${item.cedula || 'S/N'}</p>
                        </div>
                        <span class="material-symbols-outlined text-gray-700">expand_more</span>
                    </div>
                    <div id="det-${index}" class="detalle-hidden mt-5 pt-5 border-t border-white/5 space-y-4">
                        <div class="flex gap-2">
                            <button onclick="gestionar('${item.id}', 'RECHAZADO', '${item.telefono}', '${item.nombre || item.nombreTienda}')" class="flex-1 bg-red-600/10 text-red-500 py-4 rounded-2xl text-[10px] font-black uppercase">Rechazar</button>
                            <button onclick="gestionar('${item.id}', 'ACTIVO', '${item.telefono}', '${item.nombre || item.nombreTienda}', '${item.password}', '${item.cedula}')" class="flex-[2] ${btn} text-white py-4 rounded-2xl text-[10px] font-black uppercase">Autorizar</button>
                        </div>
                    </div>
                </div>`;
            });
        }

        function cambiarTab(tab) {
            currentTab = tab;
            document.getElementById('card-moto').classList.toggle('opacity-30', tab !== 'motorizados');
            document.getElementById('card-store').classList.toggle('opacity-30', tab !== 'tiendas');
            render();
        }

        setInterval(() => init(true), 15000);
    </script>
</body>
</html>
