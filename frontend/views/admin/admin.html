<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KM0 - TOXIC COMMAND</title>
    
    <script src="../../assets/js/config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

    <style>
        :root {
            --toxic: #39FF14;
            --magenta: #FF00FF;
            --dark: #000000;
        }

        body {
            background-color: var(--dark);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: linear-gradient(135deg, #0a0f02 0%, #000000 50%, #0f020f 100%);
            min-height: 100vh;
        }

        /* Card con Neón Tóxico */
        .toxic-card {
            background: rgba(10, 10, 10, 0.9);
            border: 2px solid var(--toxic);
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.15), inset 0 0 10px rgba(57, 255, 20, 0.05);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }

        .toxic-card::before {
            content: ""; position: absolute; top: 0; right: 0;
            width: 100px; height: 100px;
            background: var(--magenta);
            filter: blur(80px); opacity: 0.3;
        }

        /* Tabs */
        .tab-btn { border-bottom: 2px solid transparent; transition: 0.3s; opacity: 0.5; }
        .tab-btn.active { 
            opacity: 1; 
            color: var(--toxic); 
            border-color: var(--magenta); 
            text-shadow: 0 0 8px var(--toxic);
        }

        /* Modal */
        #modal-viewer {
            display: none; position: fixed; inset: 0; z-index: 999;
            background: rgba(0,0,0,0.98); align-items: center; justify-content: center;
        }
        #modal-img { max-width: 90%; max-height: 85vh; border: 3px solid var(--toxic); box-shadow: 0 0 30px var(--toxic); }

        /* Botón Confirmar */
        .btn-approve {
            background: var(--toxic); color: black; font-weight: 900;
            box-shadow: 0 0 15px var(--toxic);
        }

        /* Animación de carga */
        @keyframes spin-sync { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .sync-active { animation: spin-sync 1s linear infinite; color: var(--magenta) !important; }
    </style>
</head>
<body class="pb-64">

    <header class="p-5 border-b-2 border-toxic/20 bg-black/90 sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-toxic text-3xl">radioactive</span>
            <h1 class="font-black text-xl tracking-tighter italic">KM0 <span class="text-magenta">CONTROL</span></h1>
        </div>
        <button onclick="init()" class="flex items-center gap-2 bg-zinc-900 px-4 py-2 rounded-full border border-toxic/30">
            <span id="icon-refresh" class="material-symbols-outlined text-toxic text-sm">sync</span>
            <span class="text-[9px] font-bold uppercase tracking-widest text-zinc-400">Refrescar DB</span>
        </button>
    </header>

    <nav class="flex justify-center mt-6 gap-8">
        <button onclick="cambiarTab('motorizados')" id="btn-tab-m" class="tab-btn active py-2 px-6 font-black uppercase text-[10px] tracking-widest">Motorizados</button>
        <button onclick="cambiarTab('tiendas')" id="btn-tab-t" class="tab-btn py-2 px-6 font-black uppercase text-[10px] tracking-widest">Tiendas</button>
    </nav>

    <main id="content" class="max-w-xl mx-auto p-6">
        <div id="loader" class="hidden text-center py-20 text-toxic font-bold animate-pulse uppercase tracking-[0.5em]">Accediendo al Servidor...</div>
        <div id="data-container"></div>
    </main>

    <div id="modal-viewer" onclick="this.style.display='none'">
        <img id="modal-img" src="">
    </div>

    <footer id="footer" class="fixed bottom-0 inset-x-0 p-6 bg-black border-t-2 border-magenta/30 hidden z-50">
        <div class="max-w-xl mx-auto">
            <textarea id="notas" class="w-full bg-zinc-900 border-2 border-toxic/20 rounded-xl p-4 text-sm mb-4 outline-none focus:border-magenta text-white" placeholder="REPORTE DE SEGURIDAD..."></textarea>
            <div class="flex gap-4">
                <button onclick="procesar(false)" class="flex-1 py-4 border-2 border-red-600 text-red-600 font-black uppercase text-[10px] rounded-xl hover:bg-red-600 hover:text-white transition-all">Rechazar</button>
                <button onclick="procesar(true)" class="btn-approve flex-[2] py-4 rounded-xl uppercase text-[10px] hover:scale-105 transition-all">Autorizar Acceso</button>
            </div>
        </div>
    </footer>

    <script>
        let db = { motorizados: [], tiendas: [] };
        let currentTab = 'motorizados';

        // FUNCIÓN CLAVE: CORRECCIÓN DE SINCRONIZACIÓN
        async function init() {
            const icon = document.getElementById('icon-refresh');
            const dataContainer = document.getElementById('data-container');
            const loader = document.getElementById('loader');
            
            icon.classList.add('sync-active');
            loader.classList.remove('hidden');
            dataContainer.innerHTML = '';

            try {
                // Fetch directo a la URL de Google Script
                const response = await fetch(API_URL);
                const result = await response.json();
                
                // Asignar los datos recibidos
                db.motorizados = result.motorizados || [];
                db.tiendas = result.tiendas || [];
                
                console.log("Datos cargados:", db);
                actualizarUI();
            } catch (error) {
                console.error("Error de Sync:", error);
                dataContainer.innerHTML = `<p class="text-red-500 text-center font-bold">FALLO DE CONEXIÓN AL SERVIDOR</p>`;
            } finally {
                icon.classList.remove('sync-active');
                loader.classList.add('hidden');
            }
        }

        function actualizarUI() {
            const list = currentTab === 'motorizados' ? db.motorizados : db.tiendas;
            const container = document.getElementById('data-container');
            const footer = document.getElementById('footer');

            if (!list || list.length === 0) {
                container.innerHTML = `<div class="py-20 text-center text-zinc-600 font-bold uppercase tracking-widest text-[10px]">Sin Solicitudes Pendientes</div>`;
                footer.classList.add('hidden');
                return;
            }

            footer.classList.remove('hidden');
            const item = list[0];

            if (currentTab === 'motorizados') {
                container.innerHTML = `
                    <div class="toxic-card p-6 animate-in fade-in duration-500">
                        <div class="flex justify-between items-start mb-6">
                            <h2 class="text-2xl font-black uppercase italic">${item.nombre}</h2>
                            <span class="text-[9px] font-bold text-magenta uppercase">ID: ${item.id}</span>
                        </div>

                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <img src="${item.urlFoto || 'https://via.placeholder.com/300?text=PERFIL'}" class="h-40 w-full object-cover rounded-lg border border-toxic/30 cursor-pointer" onclick="verImg(this.src)">
                            <img src="${item.urlCedula || 'https://via.placeholder.com/300?text=DOCUMENTO'}" class="h-40 w-full object-cover rounded-lg border border-toxic/30 cursor-pointer" onclick="verImg(this.src)">
                        </div>

                        <div class="bg-black/60 p-4 border-l-4 border-toxic rounded-r-xl mb-4">
                            <p class="text-[9px] text-zinc-500 font-bold uppercase">Placa Detectada</p>
                            <p class="text-xl font-black text-toxic">${item.placa}</p>
                        </div>

                        <button onclick="window.open('${item.urlVideo}')" class="w-full py-3 bg-zinc-900 border border-magenta/40 text-[10px] font-black uppercase text-magenta flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined text-sm">videocam</span> Play Verificación
                        </button>
                    </div>`;
            } else {
                container.innerHTML = `
                    <div class="toxic-card p-6 border-magenta shadow-[0_0_15px_rgba(255,0,255,0.1)]">
                        <h2 class="text-2xl font-black uppercase italic mb-4">${item.nombreTienda}</h2>
                        <p class="text-xs text-zinc-400 font-bold uppercase mb-2">Responsable: ${item.representante}</p>
                        <p class="text-xs text-toxic font-bold uppercase">RUC: ${item.cedula}</p>
                    </div>`;
            }
        }

        function verImg(url) {
            document.getElementById('modal-img').src = url;
            document.getElementById('modal-viewer').style.display = 'flex';
        }

        function cambiarTab(tab) {
            currentTab = tab;
            document.getElementById('btn-tab-m').classList.toggle('active', tab === 'motorizados');
            document.getElementById('btn-tab-t').classList.toggle('active', tab === 'tiendas');
            actualizarUI();
        }

        async function procesar(aprobado) {
            const list = currentTab === 'motorizados' ? db.motorizados : db.tiendas;
            const item = list[0];
            const footer = document.getElementById('footer');

            footer.style.opacity = "0.3";
            footer.style.pointerEvents = "none";

            try {
                // Quitamos el 'no-cors' para ver si hay errores, o usamos una técnica de redirección
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        accion: "gestionar_solicitud",
                        token: API_KEY,
                        id: item.id,
                        nuevoEstado: aprobado ? "ACTIVO" : "RECHAZADO",
                        motivo: document.getElementById('notas').value || "ADMIN_OK"
                    })
                });

                // Simulamos éxito para limpiar la lista localmente
                list.shift();
                document.getElementById('notas').value = "";
                actualizarUI();
                alert(aprobado ? "ACCESO AUTORIZADO" : "SOLICITUD RECHAZADA");
            } catch (e) {
                alert("ERROR EN LA OPERACIÓN");
            } finally {
                footer.style.opacity = "1";
                footer.style.pointerEvents = "all";
            }
        }

        // Ejecutar al cargar
        window.onload = init;
    </script>
</body>
</html>
