<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>KM0 ADMIN CONTROL</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIktNMCBBRE1JTiIsCiAgInNob3J0X25hbWUiOiAiS00wIiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwMDAwMDAiLAogICJ0aGVtZV9jbG9yIjogIiMzOUZGMTQiCn0=">
    
    <script src="../../assets/js/config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: white; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .detalle-hidden { display: none; }
        #notificacion-push { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bg-surface { background: #121212; }
        .btn-active:active { transform: scale(0.96); }
        
        /* Animación suave para las cards */
        .card-entry { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <audio id="notif-sound" preload="auto">
        <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
    </audio>

    <div id="modal-audio" class="fixed inset-0 z-[200] bg-black/95 flex items-center justify-center p-6 text-center backdrop-blur-md transition-opacity duration-300">
        <div class="bg-surface p-8 rounded-[2.5rem] border border-[#39FF14]/20 max-w-xs shadow-2xl shadow-[#39FF14]/10">
            <span class="material-symbols-outlined text-7xl text-[#39FF14] animate-bounce">notifications_active</span>
            <h3 class="text-2xl font-black mt-6 tracking-tighter">SISTEMA KM0</h3>
            <p class="text-gray-400 text-sm mt-3 leading-relaxed">Active el monitor operativo para recibir alertas de <b>Nuevos Socios</b> y pedidos en tiempo real.</p>
            <button onclick="activarMonitor()" class="w-full bg-[#39FF14] text-black font-extrabold py-5 rounded-2xl mt-8 uppercase tracking-tighter shadow-xl shadow-[#39FF14]/30 btn-active">
                INICIAR MONITOR
            </button>
        </div>
    </div>

    <div id="notificacion-push" class="fixed top-4 inset-x-4 z-[100] transform -translate-y-64">
        <div id="notif-box" class="p-4 rounded-2xl shadow-2xl border-l-[10px] flex items-center gap-4 bg-[#1a1a1a] border-white/10">
            <div id="notif-icon-bg" class="p-3 rounded-xl"><span id="notif-icon" class="material-symbols-outlined text-white text-2xl">notifications</span></div>
            <div class="flex-1">
                <p id="notif-titulo" class="text-[10px] font-black uppercase tracking-widest text-gray-400"></p>
                <p id="notif-mensaje" class="text-sm font-bold leading-tight"></p>
            </div>
        </div>
    </div>

    <div class="relative flex flex-col min-h-screen pb-32">
        
        <div class="flex items-center bg-black/90 p-5 sticky top-0 z-50 border-b border-white/5 justify-between backdrop-blur-xl">
            <div>
                <h2 class="text-base font-black uppercase italic tracking-tighter text-[#39FF14]">ADMIN CONTROL</h2>
                <p class="text-[9px] font-bold text-gray-500 tracking-[0.3em] uppercase">Security Panel v3.0</p>
            </div>
            <button onclick="init()" class="text-[#39FF14] bg-white/5 p-2 rounded-full active:rotate-180 transition-transform duration-500">
                <span id="sync-icon" class="material-symbols-outlined">sync</span>
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4 p-4">
            <div onclick="cambiarTab('motorizados')" id="card-moto" class="bg-surface p-5 rounded-3xl border-b-8 border-[#ff6600] cursor-pointer transition-all duration-300 active:scale-95">
                <div class="flex justify-between items-center text-[#ff6600]">
                    <span class="material-symbols-outlined text-4xl">motorcycle</span>
                    <span class="text-[10px] bg-[#ff6600] text-black font-black px-2 py-0.5 rounded-md">PEND</span>
                </div>
                <p id="count-m" class="text-4xl font-black mt-3">0</p>
                <p class="text-[9px] font-bold text-gray-500 uppercase mt-1 tracking-widest">SOCIOS MOTO</p>
            </div>
            <div onclick="cambiarTab('tiendas')" id="card-store" class="bg-surface p-5 rounded-3xl border-b-8 border-[#0047AB] cursor-pointer opacity-40 transition-all duration-300 active:scale-95">
                <div class="flex justify-between items-center text-[#0047AB]">
                    <span class="material-symbols-outlined text-4xl">storefront</span>
                    <span class="text-[10px] bg-[#0047AB] text-white font-black px-2 py-0.5 rounded-md">PEND</span>
                </div>
                <p id="count-t" class="text-4xl font-black mt-3">0</p>
                <p class="text-[9px] font-bold text-gray-500 uppercase mt-1 tracking-widest">TIENDAS</p>
            </div>
        </div>

        <div id="main-content" class="p-4 space-y-4">
            <div class="py-20 text-center opacity-20">
                <p class="text-xs font-black uppercase animate-pulse">Esperando acción...</p>
            </div>
        </div>
    </div>

    <script>
        let db = { motorizados: [], tiendas: [], alertas: [] };
        let currentTab = 'motorizados';
        let lastCounts = { m: 0, t: 0, a: 0 };

        // 📳 FUNCION MONITOR
        function activarMonitor() {
            const modal = document.getElementById('modal-audio');
            const sound = document.getElementById('notif-sound');
            
            modal.style.opacity = '0';
            setTimeout(() => modal.style.display = 'none', 300);

            sound.play().then(() => { sound.pause(); sound.currentTime = 0; }).catch(e => console.log("Audio Lock"));

            if ("Notification" in window) Notification.requestPermission();
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            
            init();
        }

        // 📡 CARGA DE DATOS
        async function init(silent = false) {
            const syncIcon = document.getElementById('sync-icon');
            if(!silent) syncIcon.classList.add('animate-spin');
            
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                const nMotos = data.motorizados ? data.motorizados.length : 0;
                const nTiendas = data.tiendas ? data.tiendas.length : 0;

                // Actualizar números en pantalla
                document.getElementById('count-m').innerText = nMotos;
                document.getElementById('count-t').innerText = nTiendas;

                // Alertas Push por nuevos registros
                if (nMotos > lastCounts.m && lastCounts.m > 0) lanzarPush("NUEVA MOTO", "Revisar documentación", "#ff6600", "motorcycle");
                if (nTiendas > lastCounts.t && lastCounts.t > 0) lanzarPush("NUEVA TIENDA", "Solicitud pendiente", "#0047AB", "store");

                db = data;
                lastCounts = { m: nMotos, t: nTiendas };
                render();
            } catch (e) { 
                console.error("Error API:", e);
                document.getElementById('count-m').innerText = "!!";
            } finally { 
                syncIcon.classList.remove('animate-spin'); 
            }
        }

        // 📢 SISTEMA DE ALERTAS
        function lanzarPush(titulo, msg, color, icono) {
            const box = document.getElementById('notificacion-push');
            const sound = document.getElementById('notif-sound');
            
            document.getElementById('notif-titulo').innerText = titulo;
            document.getElementById('notif-mensaje').innerText = msg;
            document.getElementById('notif-icon').innerText = icono;
            document.getElementById('notif-icon-bg').style.backgroundColor = color;
            document.getElementById('notif-box').style.borderLeftColor = color;
            
            sound.play().catch(() => {});
            if (navigator.vibrate) navigator.vibrate([500, 100, 500]);
            
            box.classList.remove('-translate-y-64');
            setTimeout(() => box.classList.add('-translate-y-64'), 6000);
        }

        // 🎨 RENDERIZADO DE SOLICITUDES
        function render() {
            const list = currentTab === 'motorizados' ? db.motorizados : db.tiendas;
            const container = document.getElementById('main-content');
            container.innerHTML = '';

            if(!list || list.length === 0) {
                container.innerHTML = `<div class="py-20 text-center opacity-10"><span class="material-symbols-outlined text-7xl">verified</span><p class="text-xs font-black mt-2 tracking-widest">SISTEMA LIMPIO</p></div>`;
                return;
            }

            list.forEach((item, index) => {
                const accentColor = currentTab === 'motorizados' ? 'border-[#ff6600]' : 'border-[#0047AB]';
                const btnColor = currentTab === 'motorizados' ? 'bg-[#ff6600]' : 'bg-[#0047AB]';
                
                // Mapeo de documentos
                const urlFoto = item.urlFoto || item.foto || "#";
                const urlVideo = item.urlVideo || item.video || "#";

                container.innerHTML += `
                <div class="bg-surface p-5 rounded-[2rem] border-l-8 ${accentColor} shadow-xl card-entry">
                    <div onclick="document.getElementById('det-${index}').classList.toggle('detalle-hidden')" class="flex justify-between items-center cursor-pointer">
                        <div class="flex-1">
                            <p class="font-black text-base uppercase tracking-tight leading-none">${item.nombre || item.nombreTienda}</p>
                            <p class="text-[10px] text-gray-500 font-bold mt-1 tracking-tighter">${item.cedula || 'ID: ' + item.id} • ${item.telefono || ''}</p>
                        </div>
                        <span class="material-symbols-outlined text-gray-700">expand_more</span>
                    </div>
                    
                    <div id="det-${index}" class="detalle-hidden mt-5 pt-5 border-t border-white/5 space-y-4">
                        
                        <p class="text-[9px] font-black text-gray-500 uppercase tracking-[0.2em]">Documentación Adjunta</p>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <a href="${urlFoto}" target="_blank" class="bg-white/5 p-4 rounded-2xl text-center border border-white/10 active:bg-white/10 transition-all">
                                <span class="material-symbols-outlined block mb-1 text-blue-400">badge</span>
                                <p class="text-[9px] font-black uppercase">Ver Cédula</p>
                            </a>
                            <a href="${urlVideo}" target="_blank" class="bg-white/5 p-4 rounded-2xl text-center border border-white/10 active:bg-white/10 transition-all">
                                <span class="material-symbols-outlined block mb-1 text-purple-400">videocam</span>
                                <p class="text-[9px] font-black uppercase">Ver Video</p>
                            </a>
                        </div>

                        <div class="flex gap-2 pt-2">
                            <button onclick="gestionar('${item.id}', 'RECHAZADO', '${item.telefono}', '${item.nombre || item.nombreTienda}')" class="flex-1 bg-red-600/10 text-red-500 py-4 rounded-2xl text-[10px] font-black uppercase btn-active border border-red-500/20">Rechazar</button>
                            <button onclick="gestionar('${item.id}', 'ACTIVO', '${item.telefono}', '${item.nombre || item.nombreTienda}', '${item.password}', '${item.cedula}')" class="flex-[2] ${btnColor} text-white py-4 rounded-2xl text-[10px] font-black uppercase shadow-lg btn-active font-black">Autorizar Socio</button>
                        </div>
                    </div>
                </div>`;
            });
        }

        // ⚙️ GESTIÓN DE APROBACIÓN
        async function gestionar(id, estado, telf, nombre, pass, user) {
            let msg = "";
            if(estado === 'RECHAZADO') {
                const motivo = prompt("Motivo del rechazo:");
                if(!motivo) return;
                msg = `*KM0 - NOTIFICACIÓN* ⚠️%0A%0AHola *${nombre}*, tu solicitud ha sido rechazada.%0A%0A❌ *MOTIVO:* ${motivo}`;
            } else {
                if(!confirm("¿Autorizar registro y enviar credenciales?")) return;
                msg = `*KM0 - BIENVENIDO* 🏁%0A%0AHola *${nombre}*, tu solicitud ha sido *APROBADA*.%0A%0A🔐 *CREDENCIALES:*%0A👤 *Usuario:* ${user}%0A🔑 *Clave:* ${pass}`;
            }

            // Llamada al backend
            await fetch(API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ accion: "gestionar_solicitud", id: id, nuevoEstado: estado }) 
            });

            window.open(`https://api.whatsapp.com/send?phone=${telf}&text=${msg}`, '_blank');
            init();
        }

        function cambiarTab(tab) {
            currentTab = tab;
            document.getElementById('card-moto').classList.toggle('opacity-40', tab !== 'motorizados');
            document.getElementById('card-store').classList.toggle('opacity-40', tab !== 'tiendas');
            render();
        }

        // Auto-refresh cada 20 segundos
        setInterval(() => init(true), 20000);
    </script>
</body>
</html>
