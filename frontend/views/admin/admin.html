<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="../../assets/js/config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: white; }
        .tab-moto.active { color: #ff6600; border-bottom: 3px solid #ff6600; }
        .tab-store.active { color: #0047AB; border-bottom: 3px solid #0047AB; }
        .detalle-hidden { display: none; }
        #notificacion-push { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bg-surface { background: #1a1a1a; }
    </style>
</head>
<body>
    <audio id="notif-sound" preload="auto">
        <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
    </audio>

    <div id="modal-audio" class="fixed inset-0 z-[200] bg-black/90 flex items-center justify-center p-6 text-center">
        <div class="bg-surface p-8 rounded-3xl border border-primary/20 max-w-xs">
            <span class="material-symbols-outlined text-6xl text-primary animate-pulse">notifications_active</span>
            <h3 class="text-xl font-black mt-4">KM0 CONTROL</h3>
            <p class="text-gray-400 text-sm mt-2">Para recibir alertas sonoras en tiempo real, activa el monitor.</p>
            <button onclick="activarAudio()" class="w-full bg-primary text-black font-black py-4 rounded-2xl mt-6 uppercase tracking-widest shadow-lg shadow-primary/20">
                Activar Monitor
            </button>
        </div>
    </div>

    <div id="notificacion-push" class="fixed top-4 inset-x-4 z-[100] transform -translate-y-64">
        <div id="notif-box" class="p-4 rounded-2xl shadow-2xl border-l-8 flex items-center gap-4 bg-surface border-white/10">
            <div id="notif-icon-bg" class="p-3 rounded-xl"><span id="notif-icon" class="material-symbols-outlined text-white">notifications</span></div>
            <div class="flex-1">
                <p id="notif-titulo" class="text-[10px] font-black uppercase tracking-widest text-gray-400"></p>
                <p id="notif-mensaje" class="text-sm font-bold"></p>
            </div>
        </div>
    </div>

    <div class="relative flex flex-col min-h-screen pb-32">
        <div class="flex items-center bg-black/95 p-4 sticky top-0 z-50 border-b border-white/10 justify-between">
            <h2 class="text-base font-black uppercase italic tracking-widest text-[#39FF14]">KM0 ADMIN</h2>
            <button onclick="init()" class="text-[#39FF14]"><span id="sync-icon" class="material-symbols-outlined">sync</span></button>
        </div>

        <div class="grid grid-cols-2 gap-3 p-4">
            <div onclick="cambiarTab('motorizados')" id="card-moto" class="bg-surface p-4 rounded-2xl border-b-4 border-[#ff6600] cursor-pointer">
                <span class="material-symbols-outlined text-[#ff6600] text-3xl">motorcycle</span>
                <p id="count-m" class="text-3xl font-black mt-2">0</p>
            </div>
            <div onclick="cambiarTab('tiendas')" id="card-store" class="bg-surface p-4 rounded-2xl border-b-4 border-[#0047AB] cursor-pointer opacity-50">
                <span class="material-symbols-outlined text-[#0047AB] text-3xl">storefront</span>
                <p id="count-t" class="text-3xl font-black mt-2">0</p>
            </div>
        </div>

        <div id="main-content" class="p-4 space-y-4"></div>
    </div>

    <script>
        let db = { motorizados: [], tiendas: [], alertas: [] };
        let currentTab = 'motorizados';
        let lastCounts = { m: 0, t: 0, a: 0 };

        // 🔊 FUNCIÓN PARA DESBLOQUEAR EL AUDIO
        function activarAudio() {
            const sound = document.getElementById('notif-sound');
            sound.play().then(() => {
                sound.pause(); // Reproduce y pausa para ganar el permiso
                document.getElementById('modal-audio').style.display = 'none';
                init();
            }).catch(e => console.log("Error de audio:", e));
        }

        async function init(silent = false) {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                // DETECTAR NOVEDADES Y SONAR
                if (data.motorizados.length > lastCounts.m) {
                    lanzarPush("NUEVO MOTORIZADO", "Solicitud pendiente de revisión", "#ff6600", "motorcycle");
                }
                if (data.tiendas.length > lastCounts.t) {
                    lanzarPush("NUEVA TIENDA", "Nueva solicitud de afiliación", "#0047AB", "store");
                }
                
                // Alertas de Pedidos (Novedades)
                data.alertas.forEach(alerta => {
                    if (!localStorage.getItem('visto_' + alerta.id)) {
                        lanzarPush(alerta.estado, `Pedido ${alerta.id}: ${alerta.tienda}`, "#ff0000", "warning");
                        localStorage.setItem('visto_' + alerta.id, 'true');
                    }
                });

                db = data;
                lastCounts = { m: db.motorizados.length, t: db.tiendas.length, a: db.alertas.length };
                
                document.getElementById('count-m').innerText = db.motorizados.length;
                document.getElementById('count-t').innerText = db.tiendas.length;
                render();
            } catch (e) { console.error(e); }
        }

        function lanzarPush(titulo, msg, color, icono) {
            const box = document.getElementById('notificacion-push');
            const sound = document.getElementById('notif-sound');
            
            document.getElementById('notif-titulo').innerText = titulo;
            document.getElementById('notif-mensaje').innerText = msg;
            document.getElementById('notif-icon').innerText = icono;
            document.getElementById('notif-box').style.borderLeftColor = color;
            
            sound.currentTime = 0;
            sound.play().catch(e => console.log("Audio bloqueado"));
            
            box.classList.remove('-translate-y-64');
            setTimeout(() => box.classList.add('-translate-y-64'), 6000);

            // Notificación de sistema (para pantalla apagada)
            if (Notification.permission === "granted") {
                new Notification("KM0: " + titulo, { body: msg });
            }
        }

        function render() {
            const list = currentTab === 'motorizados' ? db.motorizados : db.tiendas;
            const container = document.getElementById('main-content');
            container.innerHTML = '';

            list.forEach((item, index) => {
                const color = currentTab === 'motorizados' ? 'border-[#ff6600]' : 'border-[#0047AB]';
                const btn = currentTab === 'motorizados' ? 'bg-[#ff6600]' : 'bg-[#0047AB]';
                
                container.innerHTML += `
                <div class="bg-surface p-4 rounded-2xl border-l-4 ${color} shadow-lg">
                    <div onclick="document.getElementById('det-${index}').classList.toggle('detalle-hidden')" class="flex justify-between items-center cursor-pointer">
                        <p class="font-black text-sm uppercase">${item.nombre || item.nombreTienda}</p>
                        <span class="material-symbols-outlined text-gray-600">expand_more</span>
                    </div>
                    <div id="det-${index}" class="detalle-hidden mt-4 pt-4 border-t border-white/5">
                        <div class="grid grid-cols-2 gap-3 text-[10px] mb-4">
                            <p><span class="text-gray-500">USER:</span><br>${item.cedula}</p>
                            <p><span class="text-gray-500">ID:</span><br>${item.id}</p>
                        </div>
                        <div class="flex gap-2 mb-4">
                            <a href="${item.urlFoto}" target="_blank" class="bg-white/5 p-2 rounded-lg text-[9px] flex-1 text-center">FOTO CÉDULA</a>
                            <a href="${item.urlVideo}" target="_blank" class="bg-white/5 p-2 rounded-lg text-[9px] flex-1 text-center">VIDEO SELFIE</a>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="gestionar('${item.id}', 'RECHAZADO', '${item.telefono}', '${item.nombre || item.nombreTienda}')" class="flex-1 bg-red-600/20 text-red-500 py-3 rounded-xl text-[10px] font-black uppercase">Rechazar</button>
                            <button onclick="gestionar('${item.id}', 'ACTIVO', '${item.telefono}', '${item.nombre || item.nombreTienda}', '${item.password}', '${item.cedula}')" class="flex-[2] ${btn} text-white py-3 rounded-xl text-[10px] font-black uppercase">Autorizar</button>
                        </div>
                    </div>
                </div>`;
            });
        }

        async function gestionar(id, estado, telf, nombre, pass, user) {
            let msg = "";
            if(estado === 'RECHAZADO') {
                const motivo = prompt("Motivo del rechazo:");
                if(!motivo) return;
                msg = `*KM0 - NOTIFICACIÓN* ⚠️%0A%0A` +
                      `Hola *${nombre}*, tu solicitud no pudo ser aprobada.%0A%0A` +
                      `❌ *MOTIVO:* ${motivo}`;
            } else {
                if(!confirm("¿Aprobar y enviar claves?")) return;
                msg = `*KM0 - BIENVENIDO* 🏁%0A%0A` +
                      `Hola *${nombre}*, tu solicitud ha sido *APROBADA*.%0A%0A` +
                      `🔐 *CREDENCIALES:*%0A` +
                      `👤 *Usuario:* ${user}%0A` +
                      `🔑 *Clave:* ${pass}`;
            }

            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ accion: "gestionar_solicitud", token: "KM0_SECURE_TOKEN_2026_XYZ", id: id, nuevoEstado: estado }) });
            window.open(`https://api.whatsapp.com/send?phone=${telf}&text=${msg}`, '_blank');
            init();
        }

        function cambiarTab(tab) {
            currentTab = tab;
            document.getElementById('card-moto').classList.toggle('opacity-50', tab !== 'motorizados');
            document.getElementById('card-store').classList.toggle('opacity-50', tab !== 'tiendas');
            render();
        }

        setInterval(() => init(true), 20000); // Revisar cada 20s
    </script>
</body>
</html>
