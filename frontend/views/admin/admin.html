<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="../../assets/js/config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#39FF14", 
                        "moto-orange": "#ff6600", /* NARANJA LOGIN */
                        "store-blue": "#0047AB", /* AZUL ELÉCTRICO */
                        "surface-grey": "#1a1a1a",
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; overflow-x: hidden; }
        .text-toxic { color: #39FF14; }
        .nav-active { color: #39FF14; font-variation-settings: 'FILL' 1; }
        
        /* Pestañas Activas dinámicas */
        .tab-moto.active { color: #ff6600; border-bottom: 3px solid #ff6600; }
        .tab-store.active { color: #0047AB; border-bottom: 3px solid #0047AB; }
        
        /* Efecto de Card Seleccionada */
        .card-selected-moto { border: 1px solid #ff6600; background: rgba(255, 102, 0, 0.05); }
        .card-selected-store { border: 1px solid #0047AB; background: rgba(0, 71, 171, 0.05); }

        .badge-new { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="text-white">
    <audio id="notif-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <div class="relative flex flex-col min-h-screen pb-32">
        
        <div class="flex items-center bg-black/95 backdrop-blur-md p-4 sticky top-0 z-50 border-b border-white/10 justify-between">
            <div class="text-toxic flex size-12 items-center"><span class="material-symbols-outlined text-3xl">menu</span></div>
            <h2 class="text-base font-black uppercase tracking-widest italic">KM0 ADMIN</h2>
            <div class="flex w-12 justify-end relative">
                <button onclick="init()" class="text-toxic"><span id="sync-icon" class="material-symbols-outlined">sync</span></button>
                <div id="realtime-dot" class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full hidden border-2 border-black"></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 p-4">
            <div id="card-moto" onclick="cambiarTab('motorizados')" class="bg-surface-grey p-4 rounded-2xl border-b-4 border-moto-orange transition-all active:scale-95 cursor-pointer card-selected-moto">
                <div class="flex justify-between items-start">
                    <span class="material-symbols-outlined text-moto-orange text-3xl">motorcycle</span>
                    <span id="badge-m" class="bg-moto-orange text-black text-[10px] font-black px-2 py-0.5 rounded-full badge-new">0</span>
                </div>
                <p class="text-[10px] font-bold text-gray-500 mt-2 uppercase tracking-tight">Solicitudes Moto</p>
                <p id="count-m" class="text-3xl font-black">0</p>
            </div>

            <div id="card-store" onclick="cambiarTab('tiendas')" class="bg-surface-grey p-4 rounded-2xl border-b-4 border-store-blue transition-all active:scale-95 cursor-pointer">
                <div class="flex justify-between items-start">
                    <span class="material-symbols-outlined text-store-blue text-3xl">storefront</span>
                    <span id="badge-t" class="bg-store-blue text-white text-[10px] font-black px-2 py-0.5 rounded-full badge-new">0</span>
                </div>
                <p class="text-[10px] font-bold text-gray-500 mt-2 uppercase tracking-tight">Solicitudes Tienda</p>
                <p id="count-t" class="text-3xl font-black">0</p>
            </div>
        </div>

        <div class="flex px-4 border-b border-white/10">
            <button onclick="cambiarTab('motorizados')" id="btn-m" class="tab-moto active flex-1 py-4 text-[11px] font-black uppercase tracking-widest">Logística Moto</button>
            <button onclick="cambiarTab('tiendas')" id="btn-t" class="tab-store flex-1 py-4 text-[11px] font-black uppercase tracking-widest text-gray-500">Gestión Tiendas</button>
        </div>

        <div id="main-content" class="p-4 space-y-4">
            </div>

        <nav class="fixed bottom-0 inset-x-0 bg-black/95 border-t border-white/10 px-4 py-4 flex justify-between items-center z-50">
            <div class="flex flex-col items-center nav-active"><span class="material-symbols-outlined">dashboard</span><p class="text-[9px] font-bold mt-1">Panel</p></div>
            <div class="flex flex-col items-center text-gray-600"><span class="material-symbols-outlined">local_shipping</span><p class="text-[9px] font-bold mt-1">Logística</p></div>
            <div class="flex flex-col items-center text-gray-600"><span class="material-symbols-outlined">group</span><p class="text-[9px] font-bold mt-1">Usuarios</p></div>
            <div class="flex flex-col items-center text-gray-600"><span class="material-symbols-outlined">account_balance_wallet</span><p class="text-[9px] font-bold mt-1">Finanzas</p></div>
            <div class="flex flex-col items-center text-gray-600"><span class="material-symbols-outlined">settings</span><p class="text-[9px] font-bold mt-1">Config</p></div>
        </nav>
    </div>

    <script>
        let db = { motorizados: [], tiendas: [] };
        let currentTab = 'motorizados';

        async function init(silent = false) {
            if(!silent) document.getElementById('sync-icon').classList.add('animate-spin');
            try {
                const res = await fetch(API_URL);
                db = await res.json();
                updateUI();
                render();
            } catch (e) { console.error(e); }
            finally { document.getElementById('sync-icon').classList.remove('animate-spin'); }
        }

        function updateUI() {
            document.getElementById('count-m').innerText = db.motorizados.length;
            document.getElementById('count-t').innerText = db.tiendas.length;
            document.getElementById('badge-m').innerText = db.motorizados.length;
            document.getElementById('badge-t').innerText = db.tiendas.length;
        }

        function cambiarTab(tab) {
            currentTab = tab;
            // Actualizar Botones
            document.getElementById('btn-m').classList.toggle('active', tab === 'motorizados');
            document.getElementById('btn-t').classList.toggle('active', tab === 'tiendas');
            
            // Actualizar Estilo visual de la Card Superior
            document.getElementById('card-moto').classList.toggle('card-selected-moto', tab === 'motorizados');
            document.getElementById('card-store').classList.toggle('card-selected-store', tab === 'tiendas');
            
            render();
        }

        function render() {
            const list = currentTab === 'motorizados' ? db.motorizados : db.tiendas;
            const container = document.getElementById('main-content');
            container.innerHTML = '';

            list.forEach(item => {
                const color = currentTab === 'motorizados' ? 'border-moto-orange' : 'border-store-blue';
                const btn = currentTab === 'motorizados' ? 'bg-moto-orange' : 'bg-store-blue';
                
                container.innerHTML += `
                <div class="bg-surface-grey p-5 rounded-2xl border-l-[6px] ${color} shadow-xl animate-in fade-in slide-in-from-bottom-2">
                    <div class="flex justify-between items-center mb-4">
                        <p class="text-sm font-black uppercase">${item.nombre || item.nombreTienda}</p>
                        <p class="text-[9px] text-gray-500 font-bold">${item.placa || item.cedula}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="procesar('${item.id}', 'RECHAZADO', '${item.telefono}')" class="flex-1 bg-zinc-900 text-red-500 py-3 rounded-xl text-[10px] font-black uppercase">Rechazar</button>
                        <button onclick="procesar('${item.id}', 'ACTIVO', '${item.telefono}')" class="flex-[2] ${btn} text-white py-3 rounded-xl text-[10px] font-black uppercase shadow-lg">Autorizar</button>
                    </div>
                </div>`;
            });
        }

        async function procesar(id, estado, telf) {
            // Lógica de WhatsApp y Base de Datos igual a la anterior...
            const msg = `Tu solicitud en Kilómetro Cero ha sido: ${estado}.`;
            window.open(`https://api.whatsapp.com/send?phone=${telf}&text=${encodeURIComponent(msg)}`, '_blank');
            // ... resto del fetch ...
            init();
        }

        window.onload = init;
    </script>
</body>
</html>
