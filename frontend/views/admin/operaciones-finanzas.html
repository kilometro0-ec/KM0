<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KM0 Admin: Engine Finanzas</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF00FF", // FUCSIA NEÓN
                        "background-dark": "#120512",
                        "surface-dark": "#1f0a1f",
                    },
                    fontFamily: { "display": ["Space Grotesk", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #120512; color: white; -webkit-tap-highlight-color: transparent; }
        .neon-fucsia { text-shadow: 0 0 15px rgba(255, 0, 255, 0.6); }
        .ios-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0; }
        .filled { font-variation-settings: 'FILL' 1; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-32">

<header class="sticky top-0 z-50 bg-background-dark/80 ios-blur border-b border-primary/30 px-4 py-3 flex items-center justify-between">
    <button onclick="alert('Menú Finanzas')" class="p-2 text-primary">
        <span class="material-symbols-outlined text-3xl">menu</span>
    </button>
    
    <div class="text-center">
        <h1 class="text-[10px] font-black uppercase tracking-[0.3em] text-primary neon-fucsia">Kilómetro Cero</h1>
        <p class="text-xs font-bold text-white uppercase">Engine Finanzas</p>
    </div>

    <div class="flex items-center gap-1">
        <button onclick="window.location.reload()" class="p-2 text-slate-400">
            <span class="material-symbols-outlined text-2xl">refresh</span>
        </button>
        <button class="p-2 text-primary">
            <span class="material-symbols-outlined text-2xl">account_balance_wallet</span>
        </button>
    </div>
</header>

<main class="p-4 space-y-6">
    <section class="grid grid-cols-2 gap-3">
        <div class="bg-surface-dark border border-primary/20 rounded-2xl p-4 shadow-xl">
            <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Pendiente Tiendas</p>
            <p class="text-xl font-black text-white">$4,250.00</p>
            <div class="mt-2 text-[9px] text-primary font-bold uppercase tracking-tighter">
                ▲ Flujo Crítico
            </div>
        </div>
        <div class="bg-surface-dark border border-primary/20 rounded-2xl p-4 shadow-xl">
            <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Caja Motorizados</p>
            <p class="text-xl font-black text-white">$1,820.50</p>
            <div class="mt-2 text-[9px] text-primary font-bold uppercase tracking-tighter">
                8 por liquidar
            </div>
        </div>
    </section>

    <section class="space-y-4">
        <div class="flex items-center justify-between">
            <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-primary">Validación de Depósitos</h2>
            <span class="text-[9px] bg-primary/10 text-primary px-2 py-0.5 rounded font-bold uppercase">Urgente</span>
        </div>

        <div class="bg-surface-dark border border-primary/20 rounded-2xl overflow-hidden shadow-2xl">
            <div class="p-4 flex items-center justify-between border-b border-white/5">
                <div class="flex items-center gap-3">
                    <img src="https://ui-avatars.com/api/?name=Carlos+Ruiz&background=FF00FF&color=fff" class="size-10 rounded-full border border-primary/30">
                    <div>
                        <p class="font-bold text-sm">Carlos Ruiz (M-42)</p>
                        <p class="text-[10px] text-slate-500 uppercase">Ref: #84920</p>
                    </div>
                </div>
                <p class="text-lg font-black text-primary">$145.00</p>
            </div>
            
            <div class="p-4 bg-black/20 flex gap-2">
                <button class="flex-1 py-3 bg-white/5 border border-white/10 rounded-xl text-[10px] font-black uppercase text-slate-400">Rechazar</button>
                <button class="flex-[2] py-3 bg-primary text-white rounded-xl text-[10px] font-black uppercase shadow-lg shadow-primary/30">Liquidar Ahora</button>
            </div>
        </div>
    </section>
</main>

<nav class="fixed bottom-0 left-0 right-0 bg-background-dark/95 ios-blur border-t border-white/10 px-2 pb-6 pt-2 z-50">
    <div class="flex justify-between items-center max-w-lg mx-auto">
        <a class="flex flex-1 flex-col items-center gap-1 text-slate-500" href="dashboard.html">
            <span class="material-symbols-outlined text-[24px]">dashboard</span>
            <span class="text-[9px] font-black uppercase">Panel</span>
        </a>
        <a class="flex flex-1 flex-col items-center gap-1 text-slate-500" href="tiendas.html">
            <span class="material-symbols-outlined text-[24px]">storefront</span>
            <span class="text-[9px] font-black uppercase">Tiendas</span>
        </a>
        <a class="flex flex-1 flex-col items-center gap-1 text-slate-500" href="motorizados.html">
            <span class="material-symbols-outlined text-[24px]">pedal_bike</span>
            <span class="text-[9px] font-black uppercase">Flota</span>
        </a>
        <a class="flex flex-1 flex-col items-center gap-1 text-primary" href="finanzas.html">
            <span class="material-symbols-outlined text-[24px] filled">account_balance_wallet</span>
            <span class="text-[9px] font-black uppercase">Finanzas</span>
        </a>
        <a class="flex flex-1 flex-col items-center gap-1 text-slate-500" href="configuracion.html">
            <span class="material-symbols-outlined text-[24px]">tune</span>
            <span class="text-[9px] font-black uppercase">Ajustes</span>
        </a>
    </div>
</nav>

</body>
</html>
