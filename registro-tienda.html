<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KM0 - Registro Oficial Tiendas</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;500;700" rel="stylesheet"/>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'deeper-blue': '#050505',
                        'electric-blue': '#0070FF',
                        'neon-fuchsia': '#FF00FF',
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        body {
            background: radial-gradient(circle at top center, #001A3D 0%, #050505 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100dvh;
        }
        .input-premium {
            @apply bg-white/5 border border-white/10 rounded-2xl w-full h-14 pl-12 pr-4 text-white focus:border-electric-blue focus:ring-1 focus:ring-electric-blue transition-all outline-none placeholder:text-white/20;
        }
        .btn-fusion {
            background: linear-gradient(90deg, #0070FF 0%, #FF00FF 100%);
            @apply shadow-[0_0_20px_rgba(0,112,255,0.3)] active:scale-95 disabled:opacity-30 disabled:grayscale transition-all;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .hidden { display: none; }
    </style>
</head>

<body class="text-white">

    <div id="contenedorForm" class="max-w-[480px] mx-auto flex flex-col min-h-screen">
        
        <header class="sticky top-0 z-50 p-6 flex items-center justify-between bg-black/20 ios-blur">
            <button onclick="window.history.back()" class="size-10 rounded-xl bg-white/5 flex items-center justify-center border border-white/10">
                <span class="material-symbols-outlined text-white">chevron_left</span>
            </button>
            <div class="text-right">
                <p class="text-[10px] tracking-[0.3em] font-extrabold text-electric-blue">KILÓMETRO CERO</p>
                <p class="text-[9px] text-white/40 uppercase">Registro de Alianza</p>
            </div>
        </header>

        <main class="flex-1 px-8 pt-8 pb-40">
            <div class="mb-10 text-center">
                <h1 class="text-4xl font-extrabold tracking-tight leading-none italic uppercase">
                    REGISTRA TU <br/>
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-electric-blue to-neon-fuchsia">TIENDA</span>
                </h1>
                <div class="h-1 w-12 bg-electric-blue mx-auto mt-4 rounded-full"></div>
            </div>

            <form id="formTienda" class="space-y-4">
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-4 text-electric-blue/50 text-xl">storefront</span>
                    <input id="nombreTienda" required class="input-premium" placeholder="Nombre Comercial" type="text"/>
                </div>

                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-4 text-electric-blue/50 text-xl">person</span>
                    <input id="representante" required class="input-premium" placeholder="Representante Legal" type="text"/>
                </div>

                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-4 text-electric-blue/50 text-xl">badge</span>
                    <input id="identificacion" minlength="10" maxlength="13" pattern="[0-9]+" required class="input-premium" placeholder="Cédula o RUC" type="text"/>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-4 text-electric-blue/50 text-xl">map</span>
                        <select id="provincia" required class="input-premium pl-10 text-[11px] appearance-none">
                            <option value="" disabled selected>Provincia</option>
                            <option value="Azuay">Azuay</option><option value="Bolívar">Bolívar</option>
                            <option value="Cañar">Cañar</option><option value="Carchi">Carchi</option>
                            <option value="Chimborazo">Chimborazo</option><option value="Cotopaxi">Cotopaxi</option>
                            <option value="El Oro">El Oro</option><option value="Esmeraldas">Esmeraldas</option>
                            <option value="Galápagos">Galápagos</option><option value="Guayas">Guayas</option>
                            <option value="Imbabura">Imbabura</option><option value="Loja">Loja</option>
                            <option value="Los Ríos">Los Ríos</option><option value="Manabí">Manabí</option>
                            <option value="Morona Santiago">Morona Santiago</option><option value="Napo">Napo</option>
                            <option value="Orellana">Orellana</option><option value="Pastaza">Pastaza</option>
                            <option value="Pichincha">Pichincha</option><option value="Santa Elena">Santa Elena</option>
                            <option value="Santo Domingo">Santo Domingo</option><option value="Sucumbíos">Sucumbíos</option>
                            <option value="Tungurahua">Tungurahua</option><option value="Zamora Chinchipe">Zamora Chinchipe</option>
                        </select>
                    </div>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-4 text-electric-blue/50 text-xl">location_city</span>
                        <input id="ciudad" required class="input-premium pl-10" placeholder="Ciudad" type="text"/>
                    </div>
                </div>

                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-4 text-electric-blue/50 text-xl">chat</span>
                    <input id="telefono" required pattern="^\+593[0-9]{9}$" class="input-premium" placeholder="WhatsApp (+593...)" type="tel"/>
                </div>

                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-4 text-electric-blue/50 text-xl">alternate_email</span>
                    <input id="correo" required class="input-premium" placeholder="Correo Corporativo" type="email"/>
                </div>
            </form>
        </main>

        <div class="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-black via-black/90 to-transparent">
            <div class="max-w-[480px] mx-auto">
                <button type="submit" form="formTienda" id="btnEnviar" disabled class="btn-fusion w-full h-16 rounded-2xl text-white font-black tracking-widest uppercase flex items-center justify-center gap-3">
                    <span id="btnText">FINALIZAR REGISTRO</span>
                    <span class="material-symbols-outlined font-bold">rocket_launch</span>
                </button>
                <p class="text-[9px] text-center text-white/20 mt-4 tracking-[0.2em]">KM0 BY CORPORACIÓN 360 • V 1.0.1</p>
            </div>
        </div>
    </div>

    <div id="successView" class="fixed inset-0 bg-black z-[100] hidden flex-col items-center justify-center p-10 text-center">
        <div class="size-24 rounded-full bg-electric-blue/20 border-2 border-electric-blue flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(0,112,255,0.4)]">
            <span class="material-symbols-outlined text-5xl text-electric-blue">done_all</span>
        </div>
        <h2 class="text-3xl font-black italic mb-2 uppercase">¡Registro Enviado!</h2>
        <p class="text-white/50 text-sm mb-10">Tu solicitud está en fase de validación. Recibirás un mensaje de confirmación en las próximas horas.</p>
        <button onclick="window.location.href='index.html'" class="px-10 h-14 border border-white/10 rounded-2xl text-xs font-bold uppercase tracking-widest hover:bg-white/5 transition-all">
            VOLVER AL INICIO
        </button>
    </div>

    <script>
        const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbzileiH-CN1fIYY7J_pPQIg3YHLXy9NKtAS_ULgNT3LtrPRZHrlGo49a58w-jTzmWm2/exec';
        const form = document.getElementById('formTienda');
        const btn = document.getElementById('btnEnviar');
        const btnText = document.getElementById('btnText');

        // Habilitar botón si el formulario es válido
        form.addEventListener('input', () => {
            btn.disabled = !form.checkValidity();
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btnText.innerText = 'ENVIANDO...';

            const datos = {
                accion: "registro_tienda",
                nombre: document.getElementById('nombreTienda').value,
                representante: document.getElementById('representante').value,
                ruc: document.getElementById('identificacion').value,
                provincia: document.getElementById('provincia').value,
                ciudad: document.getElementById('ciudad').value,
                telefono: document.getElementById('telefono').value,
                correo: document.getElementById('correo').value
            };

            try {
                await fetch(URL_SCRIPT, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                // Mostrar éxito
                document.getElementById('contenedorForm').classList.add('hidden');
                document.getElementById('successView').classList.remove('hidden');
                document.getElementById('successView').classList.add('flex');
                window.scrollTo(0,0);

            } catch (error) {
                console.error("Error:", error);
                alert("SISTEMA OCUPADO. Intenta de nuevo.");
                btn.disabled = false;
                btnText.innerText = 'FINALIZAR REGISTRO';
            }
        });
    </script>
</body>
</html>
