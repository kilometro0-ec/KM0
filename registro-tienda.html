<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KM0 - Registro Oficial</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'electric-blue': '#0055BB',
                        'neon-fuchsia': '#D100D1',
                        'deep-navy': '#020D1F',
                    },
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        body {
            background-color: #020D1F; /* Color exacto de tu imagen */
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100dvh;
        }
        .input-container {
            @apply relative w-full h-16 bg-[#0A192F] border border-white/10 rounded-2xl mb-4 flex items-center px-4 transition-all focus-within:border-electric-blue/50;
        }
        /* Ajuste para que el icono no se superponga al texto */
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined' !important;
            @apply text-electric-blue text-2xl mr-3 select-none;
            font-display: block;
        }
        .input-field {
            @apply bg-transparent border-none w-full text-white placeholder:text-white/20 focus:ring-0 text-base p-0;
        }
        .btn-fusion {
            background: linear-gradient(90deg, #0047AB 0%, #A000A0 100%);
            @apply shadow-lg active:scale-95 disabled:opacity-50 disabled:grayscale transition-all;
        }
        /* Animación de carga */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .hidden { display: none; }
    </style>
</head>

<body class="text-white">

    <div id="contenedorForm" class="max-w-[480px] mx-auto flex flex-col min-h-screen">
        
        <header class="p-6 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined !text-electric-blue !mr-0">storefront</span>
                <span class="material-symbols-outlined !text-white/30 !text-xl cursor-pointer" onclick="window.history.back()">arrow_back_ios</span>
            </div>
            <div class="text-right">
                <p class="text-[11px] font-black text-neon-fuchsia tracking-widest uppercase">KILÓMETRO CERO</p>
                <p class="text-[9px] text-white/40 font-bold uppercase tracking-tighter">Portal de Aliados</p>
            </div>
        </header>

        <main class="flex-1 px-8 pt-4 pb-40">
            <div class="mb-8 text-center">
                <h1 class="text-[38px] font-black italic tracking-tighter leading-none uppercase">
                    REGISTRA TU <br/>
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-electric-blue to-neon-fuchsia">TIENDA</span>
                </h1>
                <div class="h-1.5 w-14 bg-neon-fuchsia mx-auto mt-3 rounded-full shadow-[0_0_10px_#D100D1]"></div>
            </div>

            <form id="formTienda">
                <div class="input-container">
                    <span class="material-symbols-outlined">store</span>
                    <input id="nombreTienda" required class="input-field" placeholder="Nombre Comercial" type="text"/>
                </div>

                <div class="input-container">
                    <span class="material-symbols-outlined">person</span>
                    <input id="representante" required class="input-field" placeholder="Representante Legal" type="text"/>
                </div>

                <div class="input-container">
                    <span class="material-symbols-outlined">badge</span>
                    <input id="identificacion" minlength="10" maxlength="13" pattern="[0-9]{10,13}" required class="input-field" placeholder="Cédula o RUC" type="text"/>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="input-container !mb-0">
                        <span class="material-symbols-outlined">map</span>
                        <select id="provincia" required class="input-field !text-sm appearance-none">
                            <option value="" disabled selected>Provincia</option>
                            <option value="Azuay">Azuay</option><option value="Bolívar">Bolívar</option>
                            <option value="Cañar">Cañar</option><option value="Carchi">Carchi</option>
                            <option value="Chimborazo">Chimborazo</option><option value="Cotopaxi">Cotopaxi</option>
                            <option value="El Oro">El Oro</option><option value="Esmeraldas">Esmeraldas</option>
                            <option value="Galápagos">Galápagos</option><option value="Guayas">Guayas</option>
                            <option value="Imbabura">Imbabura</option><option value="Loja">Loja</option>
                            <option value="Los Ríos">Los Ríos</option><option value="Manabí">Manabí</option>
                            <option value="Morona Santiago">Morona Santiago</option><option value="Napo">Napo</option>
                            <option value="Orellana">Orellana</option><option value="Pastaza">Pastaza</option>
                            <option value="Pichincha">Pichincha</option><option value="Santa Elena">Santa Elena</option>
                            <option value="Santo Domingo">Santo Domingo</option><option value="Sucumbíos">Sucumbíos</option>
                            <option value="Tungurahua">Tungurahua</option><option value="Zamora Chinchipe">Zamora Chinchipe</option>
                        </select>
                    </div>
                    <div class="input-container !mb-0">
                        <span class="material-symbols-outlined">location_city</span>
                        <input id="ciudad" required class="input-field" placeholder="Ciudad" type="text"/>
                    </div>
                </div>

                <div class="input-container">
                    <span class="material-symbols-outlined">chat</span>
                    <input id="telefono" required pattern="^\+593[0-9]{9}$" class="input-field" placeholder="WhatsApp (+593...)" type="tel"/>
                </div>

                <div class="input-container">
                    <span class="material-symbols-outlined">mail</span>
                    <input id="correo" required class="input-field" placeholder="Email Corporativo" type="email"/>
                </div>
            </form>
        </main>

        <div class="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-deep-navy via-deep-navy/90 to-transparent">
            <div class="max-w-[480px] mx-auto">
                <button type="submit" form="formTienda" id="btnEnviar" disabled class="btn-fusion w-full h-16 rounded-[24px] text-white font-black tracking-tighter uppercase flex items-center justify-center gap-3">
                    <div id="loading" class="hidden"><div class="spinner"></div></div>
                    <span id="btnText">FINALIZAR REGISTRO</span>
                    <span id="btnIcon" class="material-symbols-outlined !mr-0">rocket_launch</span>
                </button>
                <p id="errorMsg" class="text-center text-[11px] text-red-500 font-bold mt-3 uppercase hidden"></p>
            </div>
        </div>
    </div>

    <script>
        const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbzileiH-CN1fIYY7J_pPQIg3YHLXy9NKtAS_ULgNT3LtrPRZHrlGo49a58w-jTzmWm2/exec';
        const form = document.getElementById('formTienda');
        const btn = document.getElementById('btnEnviar');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loading');
        const icon = document.getElementById('btnIcon');
        const errorMsg = document.getElementById('errorMsg');

        form.addEventListener('input', () => {
            btn.disabled = !form.checkValidity();
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Iniciar animación de carga
            btn.disabled = true;
            btnText.innerText = 'PROCESANDO...';
            loader.classList.remove('hidden');
            icon.classList.add('hidden');
            errorMsg.classList.add('hidden');

            const datos = {
                accion: "registro_tienda",
                nombre: document.getElementById('nombreTienda').value,
                representante: document.getElementById('representante').value,
                ruc: document.getElementById('identificacion').value,
                provincia: document.getElementById('provincia').value,
                ciudad: document.getElementById('ciudad').value,
                telefono: document.getElementById('telefono').value,
                correo: document.getElementById('correo').value
            };

            try {
                // Sin mode: 'no-cors' para detectar duplicados
                const response = await fetch(URL_SCRIPT, {
                    method: 'POST',
                    body: JSON.stringify(datos)
                });

                const res = await response.json();

                if (res.success) {
                    alert("¡Registro exitoso! ID: " + res.id);
                    window.location.reload();
                } else {
                    throw new Error(res.mensaje);
                }

            } catch (err) {
                // Detener carga y mostrar error
                btn.disabled = false;
                btnText.innerText = 'FINALIZAR REGISTRO';
                loader.classList.add('hidden');
                icon.classList.remove('hidden');
                
                errorMsg.innerText = "⚠️ " + err.message;
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
