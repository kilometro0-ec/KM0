<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KM0 - Registro Oficial</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.symbols.google.com/css2?family=Material+Symbols+Outlined:wght@300;500;700" rel="stylesheet"/>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'electric-blue': '#0070FF',
                        'neon-fuchsia': '#FF00FF',
                    },
                    animation: {
                        'spin-slow': 'spin 3s linear infinite',
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        body {
            background: radial-gradient(circle at top center, #001A3D 0%, #050505 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100dvh;
        }
        .input-premium {
            @apply bg-white/5 border border-white/10 rounded-2xl w-full h-14 pl-12 pr-4 text-white focus:border-electric-blue focus:ring-1 focus:ring-electric-blue transition-all outline-none placeholder:text-white/20;
        }
        .btn-fusion {
            background: linear-gradient(90deg, #0070FF 0%, #FF00FF 100%);
            @apply shadow-[0_0_20px_rgba(0,112,255,0.3)] active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed transition-all;
        }
        .loading-spinner {
            @apply animate-spin h-5 w-5 border-2 border-white/30 border-t-white rounded-full;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>

<body class="text-white selection:bg-neon-fuchsia selection:text-white">

    <div id="contenedorForm" class="max-w-[480px] mx-auto flex flex-col min-h-screen">
        
        <header class="sticky top-0 z-50 p-6 flex items-center justify-between bg-black/20 ios-blur">
            <div class="flex items-center gap-3">
                <div class="size-11 rounded-xl bg-electric-blue/10 border border-electric-blue/30 flex items-center justify-center">
                    <span class="material-symbols-outlined text-electric-blue text-2xl">storefront</span>
                </div>
                <div class="h-8 w-[1px] bg-white/10"></div>
                <button onclick="window.history.back()" class="text-white/40 hover:text-white transition-colors">
                    <span class="material-symbols-outlined">arrow_back_ios</span>
                </button>
            </div>
            <div class="text-right">
                <p class="text-[10px] tracking-[0.3em] font-extrabold text-neon-fuchsia">KILÓMETRO CERO</p>
                <p class="text-[9px] text-white/40 uppercase font-bold tracking-tighter">Portal de Aliados</p>
            </div>
        </header>

        <main class="flex-1 px-8 pt-8 pb-44">
            <div class="mb-10 text-center">
                <h1 class="text-4xl font-extrabold tracking-tight italic uppercase">
                    REGISTRA TU <br/>
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-electric-blue to-neon-fuchsia">TIENDA</span>
                </h1>
                <div class="h-1 w-12 bg-neon-fuchsia mx-auto mt-4 rounded-full"></div>
            </div>

            <form id="formTienda" class="space-y-4">
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-4 text-electric-blue/50 text-xl">store</span>
                    <input id="nombreTienda" required class="input-premium" placeholder="Nombre Comercial" type="text"/>
                </div>

                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-4 text-electric-blue/50 text-xl">person</span>
                    <input id="representante" required class="input-premium" placeholder="Representante Legal" type="text"/>
                </div>

                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-4 text-electric-blue/50 text-xl">badge</span>
                    <input id="identificacion" minlength="10" maxlength="13" pattern="[0-9]{10,13}" required title="Ingrese entre 10 y 13 números" class="input-premium" placeholder="Cédula o RUC" type="text"/>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-4 text-electric-blue/50 text-xl">map</span>
                        <select id="provincia" required class="input-premium pl-10 text-[11px] appearance-none">
                            <option value="" disabled selected>Provincia</option>
                            <option value="Azuay">Azuay</option><option value="Bolívar">Bolívar</option><option value="Cañar">Cañar</option>
                            <option value="Carchi">Carchi</option><option value="Chimborazo">Chimborazo</option><option value="Cotopaxi">Cotopaxi</option>
                            <option value="El Oro">El Oro</option><option value="Esmeraldas">Esmeraldas</option><option value="Galápagos">Galápagos</option>
                            <option value="Guayas">Guayas</option><option value="Imbabura">Imbabura</option><option value="Loja">Loja</option>
                            <option value="Los Ríos">Los Ríos</option><option value="Manabí">Manabí</option><option value="Morona Santiago">Morona Santiago</option>
                            <option value="Napo">Napo</option><option value="Orellana">Orellana</option><option value="Pastaza">Pastaza</option>
                            <option value="Pichincha">Pichincha</option><option value="Santa Elena">Santa Elena</option><option value="Santo Domingo">Santo Domingo</option>
                            <option value="Sucumbíos">Sucumbíos</option><option value="Tungurahua">Tungurahua</option><option value="Zamora Chinchipe">Zamora Chinchipe</option>
                        </select>
                    </div>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-4 text-electric-blue/50 text-xl">location_city</span>
                        <input id="ciudad" required class="input-premium pl-10" placeholder="Ciudad" type="text"/>
                    </div>
                </div>

                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-4 text-electric-blue/50 text-xl">chat</span>
                    <input id="telefono" required pattern="^\+593[0-9]{9}$" class="input-premium" placeholder="WhatsApp (+5939...)" type="tel"/>
                </div>

                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-4 text-electric-blue/50 text-xl">alternate_email</span>
                    <input id="correo" required class="input-premium" placeholder="Correo Corporativo" type="email"/>
                </div>
            </form>
        </main>

        <div class="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-black via-black/90 to-transparent">
            <div class="max-w-[480px] mx-auto">
                <button type="submit" form="formTienda" id="btnEnviar" disabled class="btn-fusion w-full h-16 rounded-2xl text-white font-black tracking-widest uppercase flex items-center justify-center gap-3">
                    <div id="loader" class="hidden"><div class="loading-spinner"></div></div>
                    <span id="btnText">FINALIZAR REGISTRO</span>
                    <span id="btnIcon" class="material-symbols-outlined font-bold">rocket_launch</span>
                </button>
                <div id="msgError" class="mt-4 p-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-500 text-[11px] text-center font-bold uppercase hidden"></div>
                <p class="text-[9px] text-center text-white/20 mt-4 tracking-[0.2em]">KM0 BY CORPORACIÓN 360 • V 11.0</p>
            </div>
        </div>
    </div>

    <div id="successView" class="fixed inset-0 bg-black z-[100] hidden flex-col items-center justify-center p-10 text-center">
        <div class="size-24 rounded-full bg-electric-blue/20 border-2 border-electric-blue flex items-center justify-center mb-6">
            <span class="material-symbols-outlined text-5xl text-electric-blue">verified</span>
        </div>
        <h2 class="text-3xl font-black italic mb-2 uppercase">¡REGISTRO ENVIADO!</h2>
        <p class="text-white/50 text-sm mb-10 leading-relaxed">Tus datos están en validación. Recibirás un mensaje de confirmación pronto.</p>
        <button onclick="window.location.reload()" class="px-10 h-14 border border-white/10 rounded-2xl text-[10px] font-bold uppercase tracking-widest">REGISTRAR OTRA</button>
    </div>

    <script>
        const URL_SCRIPT = 'TU_URL_DE_GOOGLE_APPS_SCRIPT'; // <--- PEGA AQUÍ TU URL ACTUALIZADA
        const form = document.getElementById('formTienda');
        const btn = document.getElementById('btnEnviar');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const loader = document.getElementById('loader');
        const msgError = document.getElementById('msgError');

        form.addEventListener('input', () => {
            btn.disabled = !form.checkValidity();
            msgError.classList.add('hidden');
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Iniciar Animación
            btn.disabled = true;
            btnText.innerText = 'PROCESANDO...';
            btnIcon.classList.add('hidden');
            loader.classList.remove('hidden');
            msgError.classList.add('hidden');

            const datos = {
                accion: "registro_tienda",
                nombre: document.getElementById('nombreTienda').value,
                representante: document.getElementById('representante').value,
                ruc: document.getElementById('identificacion').value,
                provincia: document.getElementById('provincia').value,
                ciudad: document.getElementById('ciudad').value,
                telefono: document.getElementById('telefono').value,
                correo: document.getElementById('correo').value
            };

            try {
                // IMPORTANTE: Sin mode: 'no-cors' para poder leer duplicados
                const response = await fetch(URL_SCRIPT, {
                    method: 'POST',
                    mode: 'cors', 
                    body: JSON.stringify(datos)
                });

                const res = await response.json();

                if (res.success) {
                    document.getElementById('contenedorForm').classList.add('hidden');
                    document.getElementById('successView').classList.remove('hidden');
                    document.getElementById('successView').classList.add('flex');
                } else {
                    throw new Error(res.mensaje);
                }

            } catch (error) {
                // Detener Animación en caso de error
                btn.disabled = false;
                btnText.innerText = 'FINALIZAR REGISTRO';
                btnIcon.classList.remove('hidden');
                loader.classList.add('hidden');
                
                msgError.innerText = "⚠️ " + error.message;
                msgError.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
