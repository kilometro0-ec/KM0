<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Acceso - KM0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { "primary": "#ef4444", "background-dark": "#0a0f16" },
                },
            },
        }
    </script>
    <style>
        .btn-loading { pointer-events: none; opacity: 0.7; background: linear-gradient(90deg, #ef4444, #b91c1c, #ef4444); background-size: 200% 100%; animation: move-bg 1.5s linear infinite; }
        @keyframes move-bg { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="bg-background-dark text-white font-['Inter'] flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-sm space-y-8">
        <div class="text-center">
            <div class="size-20 bg-primary/20 rounded-full flex items-center justify-center border border-primary/30 mx-auto mb-4 shadow-[0_0_30px_rgba(239,68,68,0.2)]">
                <span class="material-symbols-outlined text-primary text-5xl">pest_control_rodent</span>
            </div>
            <h1 class="text-3xl font-black italic tracking-tighter text-white uppercase leading-none">Kilómetro Cero</h1>
            <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] mt-2">v4.0 Motor Integral</p>
        </div>

        <div class="space-y-4">
            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Usuario / Correo</label>
                <input type="text" id="user" placeholder="Ingrese su usuario" class="w-full bg-white/5 border border-white/10 rounded-xl py-4 px-4 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-white">
            </div>
            
            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Contraseña</label>
                <div class="relative">
                    <input type="password" id="pass" placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-xl py-4 pl-4 pr-12 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-white">
                    <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-primary">
                        <span id="eye-icon" class="material-symbols-outlined text-xl">visibility</span>
                    </button>
                </div>
            </div>
            
            <button id="btn-login" onclick="validarYRedirigir()" class="w-full bg-primary hover:bg-red-500 text-white font-black py-4 rounded-xl shadow-xl shadow-primary/20 transition-all active:scale-95 flex items-center justify-center gap-2 mt-4">
                <span id="btn-text">INICIAR SESIÓN</span>
            </button>
        </div>

        <div id="error-msg" class="hidden text-center text-primary text-[10px] font-black uppercase bg-primary/10 py-3 rounded-lg border border-primary/20"></div>
    </div>

    <script>
        const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbzileiH-CN1fIYY7J_pPQIg3YHLXy9NKtAS_ULgNT3LtrPRZHrlGo49a58w-jTzmWm2/exec';

        function togglePassword() {
            const passInput = document.getElementById('pass');
            const eyeIcon = document.getElementById('eye-icon');
            passInput.type = passInput.type === "password" ? "text" : "password";
            eyeIcon.innerText = passInput.type === "password" ? "visibility" : "visibility_off";
        }

        async function validarYRedirigir() {
            const userField = document.getElementById('user').value.trim();
            const passField = document.getElementById('pass').value.trim();
            const error = document.getElementById('error-msg');
            const btn = document.getElementById('btn-login');

            if (!userField || !passField) {
                error.innerText = "Complete todos los campos";
                error.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `VERIFICANDO...`;
            btn.classList.add('btn-loading');
            error.classList.add('hidden');

            try {
                const response = await fetch(URL_SCRIPT, {
                    method: 'POST',
                    body: JSON.stringify({ accion: "login", usuario: userField, password: passField })
                });
                
                const result = await response.json();

                if (result.success) {
                    localStorage.setItem('km0_user_id', result.id);
                    localStorage.setItem('km0_user_rol', result.rol);
                    
                    // LÓGICA DE REDIRECCIÓN BASADA EN ROL DE LA HOJA
                    switch(result.rol) {
                        case 'TIENDAS': 
                            window.location.href = "panel-operativo-tienda.html"; 
                            break;
                        case 'MOTORIZADO': 
                            window.location.href = "panel-operativo-motorizado.html"; 
                            break;
                        case 'ADMINISTRADOR': 
                            window.location.href = "admin.html"; 
                            break;
                        case 'FINANZAS': 
                            window.location.href = "gestion-finanzas.html"; 
                            break;
                        default: 
                            error.innerText = "Rol no asignado. Contacte soporte.";
                            error.classList.remove('hidden');
                            resetBtn(btn);
                    }
                } else {
                    error.innerText = result.mensaje;
                    error.classList.remove('hidden');
                    resetBtn(btn);
                }
            } catch (e) {
                error.innerText = "Error de conexión con el servidor.";
                error.classList.remove('hidden');
                resetBtn(btn);
            }
        }

        function resetBtn(btn) {
            btn.disabled = false;
            btn.innerHTML = "INICIAR SESIÓN";
            btn.classList.remove('btn-loading');
        }

        document.addEventListener('keypress', (e) => { if (e.key === 'Enter') validarYRedirigir(); });
    </script>
</body>
</html>
