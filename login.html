<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Acceso - Kilómetro Cero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ef4444", 
                        "background-dark": "#0a0f16",
                    },
                },
            },
        }
    </script>
    <style>
        @keyframes pulse-red {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        .btn-loading {
            pointer-events: none;
            opacity: 0.7;
            background: linear-gradient(90deg, #ef4444, #b91c1c, #ef4444);
            background-size: 200% 100%;
            animation: move-bg 1.5s linear infinite;
        }
        @keyframes move-bg {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="bg-background-dark text-white font-['Inter'] flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-sm space-y-8">
        <div class="text-center">
            <div class="size-20 bg-primary/20 rounded-full flex items-center justify-center border border-primary/30 mx-auto mb-4 shadow-[0_0_30px_rgba(239,68,68,0.2)]">
                <span class="material-symbols-outlined text-primary text-5xl">pest_control_rodent</span>
            </div>
            <h1 class="text-3xl font-black italic tracking-tighter text-white uppercase leading-none">Kilómetro Cero</h1>
            <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] mt-2">Terminal de Acceso Seguro</p>
        </div>

        <div class="space-y-4">
            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Usuario / Cédula</label>
                <input type="text" id="user" placeholder="Ej: 12345" 
                    class="w-full bg-white/5 border border-white/10 rounded-xl py-4 px-4 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-white placeholder:text-slate-700">
            </div>
            
            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Contraseña</label>
                <div class="relative">
                    <input type="password" id="pass" placeholder="••••••••" 
                        class="w-full bg-white/5 border border-white/10 rounded-xl py-4 pl-4 pr-12 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-white placeholder:text-slate-700">
                    <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-primary transition-colors">
                        <span id="eye-icon" class="material-symbols-outlined text-xl">visibility</span>
                    </button>
                </div>
            </div>
            
            <button id="btn-login" onclick="ejecutarLogin()" 
                class="w-full bg-primary hover:bg-red-500 text-white font-black py-4 rounded-xl shadow-xl shadow-primary/20 transition-all active:scale-95 flex items-center justify-center gap-2 mt-4">
                <span id="btn-text">INICIAR SESIÓN</span>
                <span id="btn-spinner" class="material-symbols-outlined animate-spin hidden">sync</span>
            </button>
        </div>

        <div id="error-box" class="hidden">
            <p id="error-msg" class="text-center text-primary text-[10px] font-black uppercase bg-primary/10 py-3 rounded-lg border border-primary/20">
                Error: Credenciales no válidas
            </p>
        </div>

        <div class="text-center space-y-4 pt-4">
            <button onclick="window.location.href='registro-tienda.html'" class="text-slate-400 text-[10px] font-bold uppercase hover:text-white transition-all underline decoration-primary/50 tracking-wider">
                ¿Eres un comercio nuevo? Regístrate
            </button>
            <div class="flex items-center justify-center gap-4 text-slate-600">
                <div class="h-[1px] w-8 bg-white/10"></div>
                <span class="text-[9px] font-black uppercase">KM0 v4.0</span>
                <div class="h-[1px] w-8 bg-white/10"></div>
            </div>
        </div>
    </div>

    <script>
        // URL DE TU SCRIPT DE GOOGLE
        const URL_MAESTRA = 'https://script.google.com/macros/s/AKfycbzileiH-CN1fIYY7J_pPQIg3YHLXy9NKtAS_ULgNT3LtrPRZHrlGo49a58w-jTzmWm2/exec';

        function togglePassword() {
            const passInput = document.getElementById('pass');
            const eyeIcon = document.getElementById('eye-icon');
            if (passInput.type === "password") {
                passInput.type = "text";
                eyeIcon.innerText = "visibility_off";
            } else {
                passInput.type = "password";
                eyeIcon.innerText = "visibility";
            }
        }

        async function ejecutarLogin() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            const btn = document.getElementById('btn-login');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            const errorBox = document.getElementById('error-box');
            const errorMsg = document.getElementById('error-msg');

            if (!u || !p) {
                mostrarError("Complete los campos");
                return;
            }

            // UI Loading
            btn.classList.add('btn-loading');
            btnText.innerText = "AUTENTICANDO";
            btnSpinner.classList.remove('hidden');
            errorBox.classList.add('hidden');

            const payload = {
                accion: "login",
                usuario: u,
                password: p
            };

            try {
                // Enviar al Google Apps Script
                const response = await fetch(URL_MAESTRA, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.success) {
                    // Guardar Sesión Local
                    localStorage.setItem('km0_user_id', data.id);
                    localStorage.setItem('km0_user_rol', data.rol);
                    
                    // Redirección Exitosa
                    window.location.href = data.redirect;
                } else {
                    mostrarError(data.mensaje || "Acceso Denegado");
                    restablecerBoton();
                }

            } catch (err) {
                mostrarError("Error de Red / CORS");
                console.error(err);
                restablecerBoton();
            }
        }

        function mostrarError(txt) {
            const errorBox = document.getElementById('error-box');
            const errorMsg = document.getElementById('error-msg');
            errorMsg.innerText = "ERROR: " + txt;
            errorBox.classList.remove('hidden');
        }

        function restablecerBoton() {
            const btn = document.getElementById('btn-login');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            btn.classList.remove('btn-loading');
            btnText.innerText = "INICIAR SESIÓN";
            btnSpinner.classList.add('hidden');
        }

        // Tecla Enter para entrar rápido
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') ejecutarLogin();
        });
    </script>
</body>
</html>
