<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KM0 - Panel Operativo</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-dark": "#0a0f16",
                        "neutral-dark": "#121923",
                        "status-green": "#22c55e",
                        "status-fuchsia": "#ff00ff",
                        "status-orange": "#f97316"
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter'; background-color: #0a0f16; color: white; -webkit-tap-highlight-color: transparent; }
        @keyframes slideDown { from { transform: translateY(-120%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .notif-mobile { animation: slideDown 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .nav-center-btn { filter: drop-shadow(0 0 15px rgba(19, 127, 236, 0.6)); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

<div id="notif-root" class="fixed top-4 left-0 right-0 z-[100] px-4 pointer-events-none flex flex-col gap-3"></div>

<header class="sticky top-0 z-50 bg-background-dark/80 backdrop-blur-md border-b border-primary/20 px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
        <div class="size-10 rounded-full bg-primary/20 flex items-center justify-center border border-primary/30">
            <span class="material-symbols-outlined text-primary font-variation-fill">store</span>
        </div>
        <div>
            <h1 id="shop-name" class="text-sm font-black italic uppercase leading-none text-white">Cargando Tienda...</h1>
            <p class="text-[9px] text-primary font-black uppercase tracking-widest leading-none mt-1">Panel Operativo</p>
        </div>
    </div>
    
    <div class="flex items-center gap-2">
        <button onclick="location.href='catalogo-tienda.html'" class="size-10 flex items-center justify-center rounded-full bg-neutral-dark border border-white/10 active:scale-90 transition-transform">
            <span class="material-symbols-outlined text-primary font-variation-fill">inventory</span>
        </button>
        <button onclick="enviarNotif('Sistema OK', 'Conectado a KM0 Cloud')" class="size-10 flex items-center justify-center rounded-full bg-neutral-dark border border-white/10">
            <span class="material-symbols-outlined text-primary font-variation-fill">notifications_active</span>
        </button>
    </div>
</header>

<main class="flex-1 overflow-y-auto pb-40 p-4 space-y-6">
    
    <div class="grid grid-cols-2 gap-3">
        <button onclick="location.href='new-producto-tienda.html'" class="flex flex-col items-start justify-center p-5 bg-neutral-dark text-white rounded-2xl font-black border border-white/5 active:scale-95 transition-transform uppercase italic">
            <div class="flex items-center gap-2 mb-1">
                <span class="material-symbols-outlined text-primary text-xl font-variation-fill">add_box</span>
                <span class="text-[8px] tracking-widest text-slate-400">Inventario</span>
            </div>
            <p class="text-xs">NUEVO PRODUCTO</p>
        </button>

        <button onclick="location.href='finanzas-tienda.html'" class="flex flex-col items-start justify-center p-5 bg-neutral-dark text-white rounded-2xl font-black border border-primary/30 shadow-lg shadow-primary/5 active:scale-95 transition-transform uppercase italic">
            <div class="flex items-center gap-2 mb-1">
                <span class="material-symbols-outlined text-primary text-xl font-variation-fill">account_balance_wallet</span>
                <span class="text-[8px] tracking-widest text-slate-400">A Liquidar</span>
            </div>
            <p id="monto-finanzas" class="text-xl text-white font-black leading-none">$0.00</p>
        </button>
    </div>

    <div class="space-y-3">
        <div class="flex items-center justify-between px-1">
            <h2 class="text-xs font-black uppercase tracking-widest text-slate-500 italic flex items-center gap-2">
                <span class="material-symbols-outlined text-status-orange text-sm font-variation-fill">inventory_2</span> Control de Stock
            </h2>
            <button onclick="location.href='inventario-tienda.html'" class="text-primary text-[9px] font-black uppercase tracking-widest">Ver todo</button>
        </div>

        <div class="p-4 rounded-2xl bg-neutral-dark border border-white/5 flex items-center justify-between active:scale-[0.98] transition-all">
            <div class="flex items-center gap-4">
                <div class="size-12 rounded-xl bg-status-orange/10 flex items-center justify-center text-status-orange border border-status-orange/20">
                    <p class="text-xl font-black">148</p>
                </div>
                <div>
                    <p class="text-slate-400 text-[10px] font-black uppercase">Total Unidades</p>
                    <p class="text-[11px] text-white font-bold italic uppercase">En Bodega</p>
                </div>
            </div>
            <div class="text-right">
                <span class="px-2 py-0.5 rounded bg-status-orange text-black text-[10px] font-black italic">ALERTAS</span>
            </div>
        </div>
    </div>

    <div class="space-y-3">
        <h2 class="text-xs font-black uppercase tracking-widest text-slate-500 flex items-center gap-2 italic">
            <span class="material-symbols-outlined text-primary text-sm font-variation-fill">analytics</span> Entregas Activas
        </h2>
        
        <div class="grid grid-cols-2 gap-3">
            <button onclick="location.href='historial-entregas-tienda.html'" class="text-left p-4 rounded-2xl bg-neutral-dark border border-white/5">
                <p class="text-slate-400 text-[10px] font-black uppercase mb-1">Entregados</p>
                <div class="flex items-center justify-between">
                    <p class="text-2xl font-black text-status-green italic">45</p>
                    <span class="material-symbols-outlined text-status-green font-variation-fill">check_circle</span>
                </div>
            </button>
            <button onclick="location.href='resolver-novedades-tienda.html'" class="text-left p-4 rounded-2xl bg-neutral-dark border border-status-fuchsia/30">
                <p class="text-status-fuchsia text-[10px] font-black uppercase mb-1">Novedades</p>
                <div class="flex items-center justify-between">
                    <p class="text-2xl font-black text-white italic">03</p>
                    <span class="material-symbols-outlined text-status-fuchsia animate-pulse font-variation-fill">error</span>
                </div>
            </button>
        </div>
    </div>
</main>

<nav class="fixed bottom-0 left-0 right-0 border-t border-white/5 bg-background-dark/95 backdrop-blur-xl px-2 pb-8 pt-3 z-50">
    <div class="flex justify-around items-center max-w-lg mx-auto relative">
        <a class="flex flex-col items-center gap-1 text-primary" href="panel-operativo-tienda.html">
            <span class="material-symbols-outlined text-2xl font-variation-fill">grid_view</span>
            <span class="text-[8px] font-black uppercase">Panel</span>
        </a>
        
        <div class="relative -top-12">
            <button onclick="location.href='generar-orden-tienda.html'" class="nav-center-btn size-20 bg-primary rounded-full flex flex-col items-center justify-center border-[6px] border-background-dark text-white shadow-2xl active:scale-90 transition-transform">
                <span class="material-symbols-outlined text-4xl font-black">add_shopping_cart</span>
                <span class="text-[7px] font-black uppercase leading-none mt-1">VENDER</span>
            </button>
        </div>

        <a class="flex flex-col items-center gap-1 text-slate-500" href="perfil-tienda.html">
            <span class="material-symbols-outlined text-2xl font-variation-fill">person</span>
            <span class="text-[8px] font-black uppercase">Tienda</span>
        </a>
    </div>
</nav>

<script>
    // URL de tu Script de Google
    const WEB_APP_URL = "TU_URL_DE_IMPLEMENTACION_AQUI";

    window.onload = function() {
        // 1. Mostrar nombre de la tienda guardado en Login
        const nombreTienda = localStorage.getItem('tiendaNombre') || "KM0 PARTNER";
        document.getElementById('shop-name').innerText = nombreTienda;

        // 2. Cargar Saldo Real (opcional si ya tienes el script de saldo activo)
        cargarSaldo();
    };

    async function cargarSaldo() {
        const idTienda = localStorage.getItem('usuarioId');
        if (!idTienda) return;
        
        try {
            const resp = await fetch(`${WEB_APP_URL}?idTienda=${idTienda}`);
            const data = await resp.json();
            if(data.saldo) {
                document.getElementById('monto-finanzas').innerText = `$${data.saldo}`;
            }
        } catch (e) {
            console.log("Error al cargar saldo real.");
        }
    }

    function enviarNotif(titulo, msj) {
        const root = document.getElementById('notif-root');
        const card = document.createElement('div');
        card.className = "notif-mobile pointer-events-auto w-full max-w-sm mx-auto bg-neutral-dark/95 backdrop-blur-md rounded-2xl shadow-2xl border-l-4 border-primary p-3 flex items-center gap-4 border border-white/10";
        card.innerHTML = `
            <div class="size-10 rounded-full bg-primary flex items-center justify-center text-white">
                <span class="material-symbols-outlined font-variation-fill">notifications</span>
            </div>
            <div class="flex-1">
                <div class="flex justify-between items-center">
                    <p class="text-[10px] font-black uppercase text-primary">${titulo}</p>
                    <p class="text-[9px] text-slate-400 font-bold">Ahora</p>
                </div>
                <p class="text-xs font-bold text-slate-100">${msj}</p>
            </div>
        `;
        root.appendChild(card);
        setTimeout(() => { 
            card.style.opacity = "0"; 
            card.style.transform = "translateY(-20px)"; 
            setTimeout(() => card.remove(), 500); 
        }, 4000);
    }
</script>

</body>
</html>
