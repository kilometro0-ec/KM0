<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KM0 - COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'toxic-green': '#39FF14',
                        'warning-orange': '#FF6B00',
                        'deep-black': '#020202',
                        'cyber-gray': '#121212'
                    },
                    fontFamily: {
                        'cyber': ['Rajdhani', 'sans-serif'],
                        'display': ['Orbitron', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        :root { --neon: #39FF14; --orange: #FF6B00; }
        body { background-color: #020202; color: #e2e2e2; font-family: 'Rajdhani', sans-serif; }

        /* Tarjeta Cyberpunk de Alta Tecnología */
        .cyber-card {
            background: linear-gradient(165deg, rgba(25,25,25,1) 0%, rgba(10,10,10,1) 100%);
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.05);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }

        .cyber-card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon), transparent);
            animation: moveLine 3s linear infinite;
        }

        @keyframes moveLine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* Botones de Acción Volumétricos */
        .btn-action {
            position: relative; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase; font-weight: 700; letter-spacing: 2px;
        }
        .btn-action:active { transform: scale(0.96); }

        .btn-approve {
            background: var(--neon); color: #000;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.4);
        }
        
        .btn-reject {
            border: 1px solid var(--orange); color: var(--orange);
            background: rgba(255, 107, 0, 0.05);
        }

        /* Badge de Status */
        .status-badge {
            font-family: 'Orbitron'; font-size: 10px; padding: 4px 12px;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        /* Tabs con Glitch */
        .tab-btn { transition: all 0.3s; border-bottom: 2px solid transparent; opacity: 0.4; }
        .tab-btn.active-m { opacity: 1; border-color: var(--neon); color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .tab-btn.active-t { opacity: 1; border-color: var(--orange); color: var(--orange); text-shadow: 0 0 10px var(--orange); }

        .scan-anim {
            background: linear-gradient(to bottom, transparent, rgba(57, 255, 20, 0.1), transparent);
            height: 50px; width: 100%; position: absolute;
            animation: scanning 2s ease-in-out infinite;
        }
        @keyframes scanning { 0% { top: -50px; } 100% { top: 100%; } }
    </style>
</head>
<body class="min-h-screen selection:bg-toxic-green selection:text-black">

    <header class="p-5 border-b border-white/5 bg-black/60 backdrop-blur-md sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="font-display text-xl tracking-[0.2em] font-black italic">KM0<span class="text-toxic-green">SYSTEM</span></h1>
            <div class="flex items-center gap-2">
                <span class="w-1.5 h-1.5 bg-toxic-green rounded-full animate-pulse"></span>
                <span class="text-[9px] uppercase tracking-widest text-zinc-500 font-bold">Encrypted Connection: Active</span>
            </div>
        </div>
        <button onclick="init()" class="group relative p-3">
            <div class="absolute inset-0 bg-toxic-green/20 blur-lg rounded-full opacity-0 group-hover:opacity-100 transition-opacity"></div>
            <span id="icon-refresh" class="material-symbols-outlined text-toxic-green relative">sync_saved_locally</span>
        </button>
    </header>

    <nav class="flex bg-cyber-gray/50 border-b border-white/5">
        <button onclick="cambiarTab('motorizados')" id="btn-tab-m" class="tab-btn active-m flex-1 py-5 flex flex-col items-center">
            <span class="material-symbols-outlined mb-1">sports_motorsports</span>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Unidades Pendientes (<span id="count-m">0</span>)</span>
        </button>
        <button onclick="cambiarTab('tiendas')" id="btn-tab-t" class="tab-btn flex-1 py-5 flex flex-col items-center">
            <span class="material-symbols-outlined mb-1">account_balance</span>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Comercios Pendientes (<span id="count-t">0</span>)</span>
        </button>
    </nav>

    <main id="content" class="p-6 max-w-2xl mx-auto pb-80"></main>

    <footer id="footer" class="fixed bottom-0 inset-x-0 bg-black/80 backdrop-blur-2xl border-t border-white/10 p-6 hidden z-50">
        <div class="max-w-2xl mx-auto">
            <div class="flex items-center gap-2 mb-4">
                <span class="material-symbols-outlined text-zinc-500 text-sm">terminal</span>
                <span class="text-[10px] uppercase font-bold text-zinc-500 tracking-widest">Decision Terminal v12.0</span>
            </div>
            
            <textarea id="notas" 
                class="w-full bg-cyber-gray border border-white/10 rounded-xl p-4 text-sm mb-6 focus:border-toxic-green/50 outline-none transition-all placeholder:text-zinc-700"
                placeholder="Introducir reporte de validación..."></textarea>
            
            <div class="flex gap-4">
                <button onclick="procesar(false)" class="btn-action btn-reject flex-1 py-4 rounded-xl text-xs">Rechazar</button>
                <button onclick="procesar(true)" class="btn-action btn-approve flex-[2] py-4 rounded-xl text-xs flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-sm">verified</span> Confirmar Socio
                </button>
            </div>
        </div>
    </footer>

    <script>
        // CONFIGURACIÓN CLAVE (Debe coincidir con Apps Script)
        const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbzileiH-CN1fIYY7J_pPQIg3YHLXy9NKtAS_ULgNT3LtrPRZHrlGo49a58w-jTzmWm2/exec';
        const TOKEN_SEGURIDAD = 'KM0_SECURE_TOKEN_2026_XYZ'; 
        
        let db = { motorizados: [], tiendas: [] };
        let currentTab = 'motorizados';

        async function init() {
            const icon = document.getElementById('icon-refresh');
            icon.classList.add('refresh-spin');
            try {
                const resp = await fetch(URL_SCRIPT);
                db = await resp.json();
                actualizarUI();
            } catch (e) {
                console.error(e);
            } finally {
                icon.classList.remove('refresh-spin');
            }
        }

        function actualizarUI() {
            document.getElementById('count-m').innerText = db.motorizados.length;
            document.getElementById('count-t').innerText = db.tiendas.length;
            
            const btnM = document.getElementById('btn-tab-m');
            const btnT = document.getElementById('btn-tab-t');
            
            if(currentTab === 'motorizados') {
                btnM.classList.add('active-m'); btnT.classList.remove('active-t');
            } else {
                btnT.classList.add('active-t'); btnM.classList.remove('active-m');
            }
            render();
        }

        function cambiarTab(tab) {
            currentTab = tab;
            actualizarUI();
        }

        function render() {
            const list = currentTab === 'motorizados' ? db.motorizados : db.tiendas;
            const container = document.getElementById('content');
            const footer = document.getElementById('footer');

            if (!list || list.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-40 opacity-30">
                        <span class="material-symbols-outlined text-8xl mb-4">analytics</span>
                        <p class="font-display text-[10px] tracking-[0.4em] uppercase">No Data Records Found</p>
                    </div>`;
                footer.classList.add('hidden');
                return;
            }

            const item = list[0];
            footer.classList.remove('hidden');

            if (currentTab === 'motorizados') {
                container.innerHTML = `
                    <div class="cyber-card p-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                        <div class="scan-anim"></div>
                        <div class="flex justify-between items-start mb-10">
                            <span class="status-badge bg-toxic-green/10 text-toxic-green">PENDING_REVIEW</span>
                            <span class="text-[10px] font-bold text-zinc-600 tracking-widest font-display">ID: ${item.id}</span>
                        </div>

                        <h2 class="text-4xl font-display font-black uppercase mb-2 tracking-tighter">${item.nombre}</h2>
                        <p class="text-toxic-green text-xs font-bold tracking-[0.3em] uppercase mb-10 italic">Unidad de Entrega Autorizada</p>

                        <div class="grid grid-cols-2 gap-px bg-white/5 border border-white/5 rounded-2xl overflow-hidden mb-8 text-center">
                            <div class="p-6 bg-black/40">
                                <p class="text-[9px] uppercase text-zinc-500 mb-1 font-bold">Documento Identidad</p>
                                <p class="text-xl font-display font-bold">${item.cedula}</p>
                            </div>
                            <div class="p-6 bg-black/40 border-l border-white/5">
                                <p class="text-[9px] uppercase text-zinc-500 mb-1 font-bold">Registro Placa</p>
                                <p class="text-xl font-display font-bold text-toxic-green">${item.placa}</p>
                            </div>
                        </div>

                        <button onclick="window.open('${item.urlVideo}')" 
                            class="w-full py-5 rounded-2xl border border-toxic-green/30 bg-toxic-green/5 text-toxic-green flex items-center justify-center gap-4 hover:bg-toxic-green/10 transition-all group">
                            <span class="material-symbols-outlined animate-pulse">play_circle</span>
                            <span class="text-xs font-black uppercase tracking-widest font-display">Analizar Video de Identidad</span>
                        </button>
                    </div>`;
            } else {
                container.innerHTML = `
                    <div class="cyber-card p-8 border-warning-orange/20 animate-in fade-in slide-in-from-bottom-4 duration-500">
                        <div class="flex justify-between items-start mb-10">
                            <span class="status-badge bg-warning-orange/10 text-warning-orange font-display">MERCHANT_VERIFY</span>
                            <span class="text-[10px] font-bold text-zinc-600 tracking-widest font-display">REG: ${item.id}</span>
                        </div>

                        <h2 class="text-4xl font-display font-black uppercase mb-2 tracking-tighter">${item.nombreTienda}</h2>
                        <p class="text-warning-orange text-xs font-bold tracking-[0.3em] uppercase mb-10 italic">Socio Comercial Registrado</p>

                        <div class="space-y-4">
                            <div class="p-4 bg-white/5 rounded-xl flex justify-between items-center border-l-4 border-warning-orange">
                                <span class="text-[10px] uppercase text-zinc-500 font-bold">Titular</span>
                                <span class="text-sm font-bold">${item.representante}</span>
                            </div>
                            <div class="p-4 bg-white/5 rounded-xl flex justify-between items-center">
                                <span class="text-[10px] uppercase text-zinc-500 font-bold">Identificación RUC</span>
                                <span class="text-sm font-bold font-display">${item.cedula}</span>
                            </div>
                            <div class="p-4 bg-white/5 rounded-xl flex justify-between items-center">
                                <span class="text-[10px] uppercase text-zinc-500 font-bold">Sector Operativo</span>
                                <span class="text-sm font-bold text-warning-orange uppercase">${item.ciudad}</span>
                            </div>
                        </div>
                    </div>`;
            }
        }

        async function procesar(aprobado) {
            const list = currentTab === 'motorizados' ? db.motorizados : db.tiendas;
            const item = list[0];
            if(!item) return;

            const footer = document.getElementById('footer');
            footer.style.pointerEvents = "none";
            footer.style.opacity = "0.5";

            const payload = {
                accion: "gestionar_solicitud",
                token: TOKEN_SEGURIDAD, // 🛡️ Envío del Token al Servidor
                id: item.id,
                nuevoEstado: aprobado ? "ACTIVO" : "RECHAZADO",
                motivo: document.getElementById('notas').value || "Manual Approval By Admin"
            };

            try {
                await fetch(URL_SCRIPT, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });

                // Transición de salida
                const content = document.getElementById('content');
                content.style.opacity = "0";
                content.style.transform = "scale(0.95)";

                setTimeout(() => {
                    list.shift();
                    document.getElementById('notas').value = "";
                    content.style.opacity = "1";
                    content.style.transform = "scale(1)";
                    actualizarUI();
                    footer.style.pointerEvents = "all";
                    footer.style.opacity = "1";
                }, 500);

            } catch (e) {
                alert("CONECTION_FAILURE: Operación Abortada.");
                footer.style.pointerEvents = "all";
                footer.style.opacity = "1";
            }
        }

        init();
    </script>
</body>
</html>
