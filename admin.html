<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KM0 - Terminal de Aprobaciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'neon-green': '#39FF14',
                        'neon-orange': '#FF6B00',
                        'dark-void': '#080808'
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #080808; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .text-neon { color: #39FF14; text-shadow: 0 0 10px rgba(57, 255, 20, 0.5); }
        .text-warning { color: #FF6B00; text-shadow: 0 0 10px rgba(255, 107, 0, 0.5); }

        /* Tarjetas con borde de doble color */
        .glass-card { 
            background: rgba(15, 15, 15, 0.8); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            border-radius: 20px; 
            transition: all 0.3s ease;
        }
        .active-moto { border-left: 4px solid #39FF14; box-shadow: -10px 0 20px rgba(57, 255, 20, 0.1); }
        .active-tienda { border-left: 4px solid #FF6B00; box-shadow: -10px 0 20px rgba(255, 107, 0, 0.1); }

        /* Botones Especiales */
        .btn-approve {
            background: #39FF14; color: #000; font-weight: 900;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.4);
        }
        .btn-reject {
            background: transparent; border: 1px solid #FF6B00; color: #FF6B00;
        }
        .btn-reject:hover { background: rgba(255, 107, 0, 0.1); }

        /* Animaciones */
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .scanner {
            position: absolute; width: 100%; height: 2px;
            background: linear-gradient(to right, transparent, #39FF14, transparent);
            animation: scan 3s linear infinite; opacity: 0.3;
        }

        .refresh-spinning { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="p-6 flex justify-between items-center sticky top-0 bg-dark-void/90 backdrop-blur-md z-50 border-b border-white/5">
        <div>
            <h1 class="text-xl font-black italic uppercase tracking-tighter">KM0 <span class="text-neon">ADMIN</span></h1>
            <div class="flex items-center gap-2">
                <span class="w-1.5 h-1.5 bg-neon-green rounded-full animate-pulse"></span>
                <p class="text-[8px] text-zinc-500 font-bold uppercase tracking-[0.4em]">Terminal de Aprobaciones</p>
            </div>
        </div>
        <button id="btn-refresh" onclick="init()" class="w-10 h-10 rounded-full bg-zinc-900 border border-white/10 flex items-center justify-center">
            <span id="icon-refresh" class="material-symbols-outlined text-neon-green text-sm">sync</span>
        </button>
    </header>

    <div class="p-4 grid grid-cols-2 gap-4 max-w-lg mx-auto">
        <div onclick="cambiarTab('motorizados')" id="tab-m" class="glass-card p-4 active-moto cursor-pointer">
            <div class="flex justify-between items-center">
                <span class="material-symbols-outlined text-neon-green">delivery_dining</span>
                <span id="count-m" class="text-2xl font-black text-white">0</span>
            </div>
            <p class="text-[9px] font-black uppercase mt-2 text-zinc-500">Motos Pendientes</p>
        </div>

        <div onclick="cambiarTab('tiendas')" id="tab-t" class="glass-card p-4 opacity-50 cursor-pointer transition-all">
            <div class="flex justify-between items-center">
                <span class="material-symbols-outlined text-neon-orange">store</span>
                <span id="count-t" class="text-2xl font-black text-white">0</span>
            </div>
            <p class="text-[9px] font-black uppercase mt-2 text-zinc-500">Tiendas Pendientes</p>
        </div>
    </div>

    <main id="content" class="p-4 max-w-lg mx-auto pb-64"></main>

    <footer id="footer" class="fixed bottom-0 inset-x-0 p-6 bg-dark-void border-t border-white/10 hidden">
        <div class="max-w-lg mx-auto">
            <div class="flex items-center gap-2 mb-4">
                <span class="material-symbols-outlined text-[12px] text-neon-orange">gavel</span>
                <p class="text-[9px] font-black uppercase text-zinc-500 tracking-widest">Dictamen de acceso</p>
            </div>
            <textarea id="notas" class="w-full bg-zinc-900/50 border border-white/5 rounded-xl p-4 text-xs mb-4 outline-none text-white focus:border-neon-green/30" placeholder="Añadir nota de revisión..."></textarea>
            <div class="flex gap-4">
                <button onclick="procesar(false)" class="btn-reject flex-1 py-4 rounded-xl font-black text-[10px] uppercase tracking-widest">Rechazar</button>
                <button onclick="procesar(true)" class="btn-approve flex-[2] py-4 rounded-xl font-black text-[10px] uppercase tracking-widest">Aprobar Socio</button>
            </div>
        </div>
    </footer>

    <script>
        const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbzileiH-CN1fIYY7J_pPQIg3YHLXy9NKtAS_ULgNT3LtrPRZHrlGo49a58w-jTzmWm2/exec';
        let db = { motorizados: [], tiendas: [] };
        let currentTab = 'motorizados';

        async function init() {
            const icon = document.getElementById('icon-refresh');
            icon.classList.add('refresh-spinning');
            try {
                const resp = await fetch(URL_SCRIPT);
                db = await resp.json();
                actualizarUI();
            } catch (e) {
                document.getElementById('content').innerHTML = "<p class='text-center py-20 text-neon-orange font-black text-xs uppercase'>Fallo de enlace con base de datos</p>";
            } finally {
                icon.classList.remove('refresh-spinning');
            }
        }

        function actualizarUI() {
            document.getElementById('count-m').innerText = db.motorizados.length;
            document.getElementById('count-t').innerText = db.tiendas.length;
            
            // Estilos de Tab
            const tabM = document.getElementById('tab-m');
            const tabT = document.getElementById('tab-t');
            if(currentTab === 'motorizados'){
                tabM.classList.remove('opacity-50'); tabM.classList.add('active-moto');
                tabT.classList.add('opacity-50'); tabT.classList.remove('active-tienda');
            } else {
                tabT.classList.remove('opacity-50'); tabT.classList.add('active-tienda');
                tabM.classList.add('opacity-50'); tabM.classList.remove('active-moto');
            }
            render();
        }

        function cambiarTab(tab) {
            currentTab = tab;
            actualizarUI();
        }

        function render() {
            const list = currentTab === 'motorizados' ? db.motorizados : db.tiendas;
            const container = document.getElementById('content');
            const footer = document.getElementById('footer');

            if (!list || list.length === 0) {
                container.innerHTML = `<div class='py-32 text-center opacity-30'><p class='text-[10px] font-black uppercase'>Sin solicitudes pendientes</p></div>`;
                footer.classList.add('hidden');
                return;
            }

            const item = list[0];
            footer.classList.remove('hidden');

            if (currentTab === 'motorizados') {
                container.innerHTML = `
                    <div class="glass-card p-6 relative overflow-hidden">
                        <div class="scanner"></div>
                        <p class="text-neon-green text-[9px] font-black uppercase mb-2 tracking-widest italic">Solicitud Motorizado</p>
                        <h2 class="text-4xl font-black uppercase mb-4 tracking-tighter text-white">${item.nombre}</h2>
                        <div class="space-y-4">
                            <div class="flex justify-between border-b border-white/5 pb-2">
                                <span class="text-zinc-500 text-[10px] font-black uppercase">Placa</span>
                                <span class="text-white text-[10px] font-black">${item.placa}</span>
                            </div>
                            <div class="flex justify-between border-b border-white/5 pb-2">
                                <span class="text-zinc-500 text-[10px] font-black uppercase">Identificación</span>
                                <span class="text-white text-[10px] font-black">${item.cedula}</span>
                            </div>
                            <button onclick="window.open('${item.urlVideo}')" class="w-full bg-white/5 py-4 rounded-xl flex items-center justify-center gap-2 border border-white/10 hover:border-neon-green/50 transition-all">
                                <span class="material-symbols-outlined text-neon-green">play_circle</span>
                                <span class="text-[10px] font-black uppercase tracking-widest">Validar Video de Seguridad</span>
                            </button>
                        </div>
                    </div>`;
            } else {
                container.innerHTML = `
                    <div class="glass-card p-6 relative overflow-hidden">
                        <p class="text-neon-orange text-[9px] font-black uppercase mb-2 tracking-widest italic">Solicitud Comercial</p>
                        <h2 class="text-4xl font-black uppercase mb-4 tracking-tighter text-white">${item.nombreTienda}</h2>
                        <div class="space-y-4">
                            <div class="flex flex-col gap-1">
                                <span class="text-zinc-500 text-[9px] font-black uppercase">Responsable</span>
                                <span class="text-white text-lg font-black italic tracking-tight">${item.representante}</span>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-white/5 p-3 rounded-lg">
                                    <span class="text-zinc-500 text-[8px] font-black uppercase block mb-1">RUC</span>
                                    <span class="text-white text-[10px] font-black">${item.cedula}</span>
                                </div>
                                <div class="bg-white/5 p-3 rounded-lg border-l-2 border-neon-orange">
                                    <span class="text-zinc-500 text-[8px] font-black uppercase block mb-1">Ubicación</span>
                                    <span class="text-white text-[10px] font-black">${item.ciudad}</span>
                                </div>
                            </div>
                        </div>
                    </div>`;
            }
        }

        async function procesar(aprobado) {
            const lista = currentTab === 'motorizados' ? db.motorizados : db.tiendas;
            const item = lista[0];
            if(!item) return;

            const payload = {
                accion: "gestionar_solicitud",
                id: item.id,
                nuevoEstado: aprobado ? "ACTIVO" : "RECHAZADO",
                motivo: document.getElementById('notas').value || "Procesado por sistema"
            };

            // Animación de salida
            document.getElementById('content').style.opacity = "0.3";
            document.getElementById('content').style.transform = "scale(0.98)";

            try {
                await fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify(payload) });
                lista.shift(); // Elimina el procesado
                document.getElementById('notas').value = "";
                actualizarUI();
            } catch (e) {
                alert("Error de red al procesar");
            } finally {
                document.getElementById('content').style.opacity = "1";
                document.getElementById('content').style.transform = "scale(1)";
            }
        }

        init();
    </script>
</body>
</html>
