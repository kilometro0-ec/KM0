<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KM0 - Terminal de Aprobaciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'neon-green': '#39FF14',
                        'electric-orange': '#FF6B00',
                        'dark-bg': '#050505',
                        'card-bg': '#0F0F0F'
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #050505; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
        }

        /* Efectos de Brillo Neón */
        .glow-green { text-shadow: 0 0 12px rgba(57, 255, 20, 0.6); }
        .glow-orange { text-shadow: 0 0 12px rgba(255, 107, 0, 0.6); }
        
        .border-neon-green { border: 1px solid rgba(57, 255, 20, 0.2); }
        .border-neon-orange { border: 1px solid rgba(255, 107, 0, 0.2); }

        /* Tarjetas con Efecto Glass */
        .glass-card { 
            background: linear-gradient(145deg, rgba(20, 20, 20, 0.9), rgba(10, 10, 10, 0.95));
            backdrop-filter: blur(15px);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Tabs Activas */
        .tab-active-m { border-bottom: 3px solid #39FF14; background: rgba(57, 255, 20, 0.05); }
        .tab-active-t { border-bottom: 3px solid #FF6B00; background: rgba(255, 107, 0, 0.05); }

        /* Animación de Escaneo */
        .scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, transparent, #39FF14, transparent);
            box-shadow: 0 0 15px #39FF14;
            animation: scan 4s linear infinite;
            opacity: 0.2;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .refresh-spin { animation: spin 0.8s ease-in-out infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Botones Pro */
        .btn-confirm {
            background: #39FF14; color: #000;
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.3);
            transition: all 0.2s;
        }
        .btn-confirm:active { transform: scale(0.95); box-shadow: 0 0 10px #39FF14; }

        .btn-deny {
            background: transparent;
            border: 1px solid #FF6B00;
            color: #FF6B00;
        }
    </style>
</head>
<body class="min-h-screen">

    <header class="p-6 flex justify-between items-center sticky top-0 bg-dark-bg/80 backdrop-blur-xl z-50 border-b border-white/5">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter uppercase">KM0 <span class="text-neon-green glow-green">Admin</span></h1>
            <p class="text-[8px] text-zinc-500 font-bold uppercase tracking-[0.5em]">Central de Operaciones v4.0</p>
        </div>
        <button onclick="init()" class="w-12 h-12 rounded-2xl bg-zinc-900 border border-white/10 flex items-center justify-center hover:bg-zinc-800 transition-all">
            <span id="icon-refresh" class="material-symbols-outlined text-neon-green">autorenew</span>
        </button>
    </header>

    <nav class="flex border-b border-white/5 bg-zinc-900/30">
        <button onclick="cambiarTab('motorizados')" id="btn-tab-m" class="flex-1 py-4 flex flex-col items-center gap-1 tab-active-m transition-all">
            <span class="material-symbols-outlined text-neon-green">delivery_dining</span>
            <span class="text-[9px] font-black uppercase tracking-widest">Motorizados (<span id="count-m">0</span>)</span>
        </button>
        <button onclick="cambiarTab('tiendas')" id="btn-tab-t" class="flex-1 py-4 flex flex-col items-center gap-1 opacity-40 transition-all">
            <span class="material-symbols-outlined text-electric-orange">storefront</span>
            <span class="text-[9px] font-black uppercase tracking-widest">Tiendas (<span id="count-t">0</span>)</span>
        </button>
    </nav>

    <main id="content" class="p-6 max-w-xl mx-auto pb-72"></main>

    <footer id="footer" class="fixed bottom-0 inset-x-0 p-8 bg-dark-bg/95 border-t border-white/10 hidden backdrop-blur-md">
        <div class="max-w-xl mx-auto">
            <div class="flex items-center gap-3 mb-4">
                <span class="w-2 h-2 rounded-full bg-electric-orange animate-ping"></span>
                <p class="text-[10px] font-black uppercase text-zinc-400">Panel de Decisión Final</p>
            </div>
            
            <textarea id="notas" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm mb-6 outline-none text-white focus:border-neon-green/40 transition-all" placeholder="Escribe el motivo o nota de aprobación..."></textarea>
            
            <div class="flex gap-4">
                <button onclick="procesar(false)" class="btn-deny flex-1 py-5 rounded-2xl font-black text-[11px] uppercase tracking-widest hover:bg-electric-orange/10 transition-all">Rechazar</button>
                <button onclick="procesar(true)" class="btn-confirm flex-[2] py-5 rounded-2xl font-black text-[11px] uppercase tracking-widest">Aprobar Socio</button>
            </div>
        </div>
    </footer>

    <script>
        const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbzileiH-CN1fIYY7J_pPQIg3YHLXy9NKtAS_ULgNT3LtrPRZHrlGo49a58w-jTzmWm2/exec';
        let db = { motorizados: [], tiendas: [] };
        let currentTab = 'motorizados';

        async function init() {
            const icon = document.getElementById('icon-refresh');
            icon.classList.add('refresh-spin');
            try {
                const resp = await fetch(URL_SCRIPT);
                db = await resp.json();
                actualizarUI();
            } catch (e) {
                document.getElementById('content').innerHTML = `
                    <div class="text-center py-20 border-2 border-dashed border-electric-orange/30 rounded-3xl">
                        <p class="text-electric-orange font-black text-xs uppercase tracking-tighter">Error de Sincronización</p>
                    </div>`;
            } finally {
                icon.classList.remove('refresh-spin');
            }
        }

        function actualizarUI() {
            document.getElementById('count-m').innerText = db.motorizados.length;
            document.getElementById('count-t').innerText = db.tiendas.length;
            
            const btnM = document.getElementById('btn-tab-m');
            const btnT = document.getElementById('btn-tab-t');
            
            if(currentTab === 'motorizados') {
                btnM.classList.add('tab-active-m'); btnM.classList.remove('opacity-40');
                btnT.classList.remove('tab-active-t'); btnT.classList.add('opacity-40');
            } else {
                btnT.classList.add('tab-active-t'); btnT.classList.remove('opacity-40');
                btnM.classList.remove('tab-active-m'); btnM.classList.add('opacity-40');
            }
            render();
        }

        function cambiarTab(tab) {
            currentTab = tab;
            actualizarUI();
        }

        function render() {
            const list = currentTab === 'motorizados' ? db.motorizados : db.tiendas;
            const container = document.getElementById('content');
            const footer = document.getElementById('footer');

            if (!list || list.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-32 opacity-20">
                        <span class="material-symbols-outlined text-6xl">check_circle</span>
                        <p class="text-[10px] font-black uppercase mt-4">Bandeja de entrada limpia</p>
                    </div>`;
                footer.classList.add('hidden');
                return;
            }

            const item = list[0];
            footer.classList.remove('hidden');

            if (currentTab === 'motorizados') {
                container.innerHTML = `
                    <div class="glass-card p-6 border-neon-green relative overflow-hidden">
                        <div class="scan-line"></div>
                        <span class="text-neon-green text-[9px] font-black uppercase tracking-[0.3em] italic">Expediente Socio Moto</span>
                        <h2 class="text-5xl font-black uppercase leading-none my-4 tracking-tighter glow-green">${item.nombre}</h2>
                        
                        <div class="grid grid-cols-2 gap-4 mt-8">
                            <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                                <p class="text-zinc-500 text-[8px] font-black uppercase mb-1">Cédula</p>
                                <p class="text-white font-bold tracking-widest">${item.id}</p>
                            </div>
                            <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                                <p class="text-zinc-500 text-[8px] font-black uppercase mb-1">Placa</p>
                                <p class="text-neon-green font-bold tracking-widest">${item.placa}</p>
                            </div>
                        </div>

                        <button onclick="window.open('${item.urlVideo}')" class="w-full mt-6 py-5 bg-white/5 rounded-2xl border border-white/10 flex items-center justify-center gap-3 hover:bg-neon-green/10 transition-all group">
                            <span class="material-symbols-outlined text-neon-green animate-pulse">videocam</span>
                            <span class="text-[10px] font-black uppercase tracking-widest">Ver Video de Verificación</span>
                        </button>
                    </div>`;
            } else {
                container.innerHTML = `
                    <div class="glass-card p-6 border-neon-orange relative overflow-hidden">
                        <span class="text-electric-orange text-[9px] font-black uppercase tracking-[0.3em] italic">Registro Comercial</span>
                        <h2 class="text-5xl font-black uppercase leading-none my-4 tracking-tighter glow-orange">${item.nombreTienda}</h2>
                        <p class="text-zinc-400 text-xs font-bold mb-8 italic">Representante: ${item.representante}</p>
                        
                        <div class="space-y-3">
                            <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                                <span class="text-zinc-500 text-[9px] font-black uppercase">RUC / ID</span>
                                <span class="text-white font-bold tracking-widest">${item.cedula}</span>
                            </div>
                            <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                                <span class="text-zinc-500 text-[9px] font-black uppercase">Ubicación</span>
                                <span class="text-electric-orange font-bold uppercase">${item.ciudad}</span>
                            </div>
                        </div>
                    </div>`;
            }
        }

        async function procesar(aprobado) {
            const list = currentTab === 'motorizados' ? db.motorizados : db.tiendas;
            const item = list[0];
            if(!item) return;

            const footer = document.getElementById('footer');
            footer.style.pointerEvents = "none";
            footer.style.opacity = "0.5";

            const payload = {
                accion: "gestionar_solicitud",
                id: item.id,
                nuevoEstado: aprobado ? "ACTIVO" : "RECHAZADO",
                motivo: document.getElementById('notas').value || "Validado por Admin"
            };

            try {
                // Envío POST optimizado para Google Apps Script
                await fetch(URL_SCRIPT, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });

                // Efecto de salida visual
                const content = document.getElementById('content');
                content.style.transform = "translateX(100px)";
                content.style.opacity = "0";

                setTimeout(() => {
                    list.shift();
                    document.getElementById('notas').value = "";
                    content.style.transform = "translateX(0)";
                    content.style.opacity = "1";
                    actualizarUI();
                    footer.style.pointerEvents = "all";
                    footer.style.opacity = "1";
                }, 400);

            } catch (e) {
                alert("Error crítico de red");
                footer.style.pointerEvents = "all";
                footer.style.opacity = "1";
            }
        }

        init();
    </script>
</body>
</html>
