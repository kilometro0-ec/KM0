<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>KM0 - Panel Operativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter'; background-color: #0a0f16; color: white; -webkit-tap-highlight-color: transparent; }
        .ios-blur { backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); }
        
        /* Efecto de Resplandor Eléctrico */
        @keyframes electric-glow {
            0% { box-shadow: 0 0 5px rgba(19, 127, 236, 0.1); border-color: rgba(19, 127, 236, 0.2); }
            50% { box-shadow: 0 0 20px rgba(19, 127, 236, 0.4); border-color: #137fec; }
            100% { box-shadow: 0 0 5px rgba(19, 127, 236, 0.1); border-color: rgba(19, 127, 236, 0.2); }
        }
        .glow-alert { animation: electric-glow 2s infinite ease-in-out; border-width: 1px !important; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <header class="sticky top-0 z-50 bg-background-dark/80 ios-blur border-b border-white/5 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="size-10 rounded-full bg-[#137fec]/20 flex items-center justify-center border border-[#137fec]/40">
                <span class="material-symbols-outlined text-[#137fec] font-variation-fill">store</span>
            </div>
            <div>
                <h1 id="shop-name-display" class="text-sm font-black italic uppercase leading-none text-white tracking-tight">Cargando...</h1>
                <p class="text-[9px] text-[#137fec] font-black uppercase tracking-[0.2em] leading-none mt-1">KM0 Business</p>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <button class="size-10 flex items-center justify-center rounded-full bg-[#121923] border border-white/10">
                <span class="material-symbols-outlined text-[#137fec] font-variation-fill text-xl">notifications</span>
            </button>
            <button onclick="logout()" class="size-10 flex items-center justify-center rounded-full bg-[#121923] border border-red-500/30 active:scale-90 transition-all">
                <span class="material-symbols-outlined text-red-500 font-variation-fill text-xl">logout</span>
            </button>
        </div>
    </header>

    <main class="p-4 space-y-4 max-w-md mx-auto">
        <div id="card-saldo" class="p-6 bg-[#121923] rounded-[2.5rem] border border-white/5 transition-all">
            <div class="flex justify-between items-start mb-6">
                <div class="size-12 rounded-2xl bg-[#137fec]/10 flex items-center justify-center text-[#137fec]">
                    <span class="material-symbols-outlined text-3xl">payments</span>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-black uppercase text-slate-500 tracking-widest">Saldo Finanzas</p>
                    <p class="text-[9px] text-[#137fec] font-bold">DISPONIBLE</p>
                </div>
            </div>
            <h2 id="val-saldo" class="text-5xl font-black italic tracking-tighter">$0.00</h2>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div id="card-entregados" class="p-5 bg-[#121923] rounded-[2.2rem] border border-white/5">
                <p class="text-[10px] font-black uppercase text-slate-500 mb-2">Entregados</p>
                <div class="flex items-end justify-between">
                    <h3 id="val-entregados" class="text-3xl font-black italic">0</h3>
                    <span class="material-symbols-outlined text-[#137fec]">task_alt</span>
                </div>
            </div>

            <div id="card-novedades" class="p-5 bg-[#121923] rounded-[2.2rem] border border-white/5">
                <p class="text-[10px] font-black uppercase text-red-500/80 mb-2 tracking-tighter">Novedades</p>
                <div class="flex items-end justify-between">
                    <h3 id="val-novedades" class="text-3xl font-black italic text-red-500">0</h3>
                    <span class="material-symbols-outlined text-red-500">error</span>
                </div>
            </div>
        </div>

        <div id="card-stock" class="p-5 bg-[#121923] rounded-[2.2rem] border border-white/5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="size-10 rounded-xl bg-white/5 flex items-center justify-center text-slate-400">
                    <span class="material-symbols-outlined">inventory_2</span>
                </div>
                <div>
                    <p class="text-[10px] font-black uppercase text-slate-500">Stock en Catálogo</p>
                    <p class="text-xs font-bold text-white uppercase">Productos Activos</p>
                </div>
            </div>
            <h3 id="val-stock" class="text-2xl font-black italic text-[#137fec]">0</h3>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 p-4 z-50">
        <div class="max-w-md mx-auto bg-neutral-900/90 ios-blur border border-white/10 rounded-[2.5rem] h-20 flex items-center justify-around px-2 shadow-2xl">
            <button class="flex flex-col items-center text-[#137fec]">
                <span class="material-symbols-outlined font-variation-fill">grid_view</span>
                <span class="text-[9px] font-black uppercase mt-1">Panel</span>
            </button>
            <button onclick="location.href='pedidos.html'" class="size-14 rounded-full bg-[#137fec] text-white shadow-[0_0_20px_rgba(19,127,236,0.5)] -translate-y-6 border-4 border-[#0a0f16] flex items-center justify-center active:scale-90 transition-all">
                <span class="material-symbols-outlined text-3xl font-bold">add</span>
            </button>
            <button onclick="location.href='finanzas.html'" class="flex flex-col items-center text-slate-500">
                <span class="material-symbols-outlined">account_balance</span>
                <span class="text-[9px] font-black uppercase mt-1">Caja</span>
            </button>
        </div>
    </nav>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzileiH-CN1fIYY7J_pPQIg3YHLXy9NKtAS_ULgNT3LtrPRZHrlGo49a58w-jTzmWm2/exec'; // <--- PEGA AQUÍ TU URL

        window.onload = function() {
            // Mostrar nombre guardado en localStorage tras login
            const nombre = localStorage.getItem('tiendaNombre');
            if(nombre) document.getElementById('shop-name-display').innerText = nombre;
            
            sincronizar();
        };

        async function sincronizar() {
            const idTienda = localStorage.getItem('usuarioId');
            if(!idTienda) return;

            try {
                const res = await fetch(`${API_URL}?accion=obtener_resumen_panel&idTienda=${idTienda}`);
                const data = await res.json();
                
                if(data.success) {
                    updateCard('val-saldo', `$${data.saldo}`, 'card-saldo', data.saldo > 0);
                    updateCard('val-entregados', data.entregados, 'card-entregados', data.entregados > 0);
                    updateCard('val-novedades', data.novedades, 'card-novedades', data.novedades > 0);
                    updateCard('val-stock', data.totalStock, 'card-stock', false);
                }
            } catch(e) { console.error("Error de sincronización"); }
        }

        function updateCard(valId, valor, cardId, glow) {
            document.getElementById(valId).innerText = valor;
            const card = document.getElementById(cardId);
            if(glow) card.classList.add('glow-alert');
            else card.classList.remove('glow-alert');
        }

        function logout() {
            if(confirm("¿Deseas cerrar sesión en KM0?")) {
                localStorage.clear();
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
